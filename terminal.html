<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Terminal Access</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
    --amber:#ff9f07;
    --amberBright:#ffc861;
    --dark:#050505;
    --panel:#111;
    --line:rgba(255,159,7,.22);
}

*{box-sizing:border-box;}

body{
    margin:0;
    overflow:hidden;
    background:#000;
    color:var(--amber);
    font-family:'Share Tech Mono', monospace;
}

/* ======================================
   CRT POWER ON INTRO
====================================== */
#startup{
    position:fixed;
    inset:0;
    background:#000;
    z-index:5000;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

#crt-open{
    position:absolute;
    width:0%;
    height:4px;
    background:var(--amberBright);
    box-shadow:0 0 40px var(--amber);
    animation:crtOpen 1s ease forwards;
}

@keyframes crtOpen{
    0%{width:0;height:4px;opacity:1;}
    35%{width:80%;height:4px;}
    100%{width:80%;height:70%;opacity:1;}
}

#startup-panel{
    opacity:0;
    width:min(900px,80vw);
    height:min(500px,70vh);
    border:2px solid var(--amber);
    position:relative;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    animation:panelFade 0.4s ease forwards;
    animation-delay:0.8s;
    background:
        linear-gradient(rgba(255,159,7,.03),rgba(255,159,7,.015));
    box-shadow:
        0 0 50px rgba(255,159,7,.08),
        inset 0 0 40px rgba(255,159,7,.03);
}

@keyframes panelFade{
    to{opacity:1;}
}

/* segmented sci-fi border */
#startup-panel::before,
#startup-panel::after{
    content:"";
    position:absolute;
    inset:14px;
    border:1px solid rgba(255,159,7,.18);
    pointer-events:none;
}

.corner{
    position:absolute;
    width:40px;
    height:40px;
    border-color:var(--amber);
    border-style:solid;
}
.c1{top:-2px;left:-2px;border-width:4px 0 0 4px;}
.c2{top:-2px;right:-2px;border-width:4px 4px 0 0;}
.c3{bottom:-2px;left:-2px;border-width:0 0 4px 4px;}
.c4{bottom:-2px;right:-2px;border-width:0 4px 4px 0;}

#startup-title{
    font-size:clamp(2.5rem,6vw,5rem);
    letter-spacing:.4em;
    text-shadow:0 0 20px var(--amber);
}

#startup-sub{
    margin-top:20px;
    font-size:clamp(.8rem,1.5vw,1.2rem);
    letter-spacing:.3em;
    opacity:.8;
}

#welcome{
    position:absolute;
    opacity:0;
    font-size:3rem;
    letter-spacing:.5em;
    text-shadow:0 0 20px var(--amber);
}

/* ======================================
   MAIN TERMINAL
====================================== */
#crt-container{
    display:none;
    height:100vh;
    padding:30px;
    perspective:1000px;
}

#terminal-frame{
    width:100%;
    height:100%;
    border:2px solid var(--amber);
    background:
        linear-gradient(180deg,#111,#080808);
    box-shadow:
        inset 0 0 40px rgba(255,159,7,.03),
        0 0 40px rgba(255,159,7,.06);
    position:relative;
    padding:20px;
}

/* segmented outer decorations */
#terminal-frame::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid rgba(255,159,7,.15);
    pointer-events:none;
}

#terminal-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:18px;
    padding-bottom:12px;
    border-bottom:1px solid rgba(255,159,7,.18);
}

#terminal-title{
    font-size:28px;
    letter-spacing:.2em;
}

.status-lights{
    display:flex;
    gap:10px;
}

.light{
    width:12px;
    height:12px;
    border:1px solid var(--amber);
    background:rgba(255,159,7,.2);
    box-shadow:0 0 8px rgba(255,159,7,.4);
}

/* Terminal Well */
#terminal-wrapper{
    position:relative;
    height:calc(100% - 90px);
    border:1px solid rgba(255,159,7,.18);
    background:
        linear-gradient(180deg,rgba(255,159,7,.03),rgba(0,0,0,.2));
    box-shadow:
        inset 0 0 25px rgba(255,159,7,.03);
    overflow:hidden;
}

#terminal{
    position:absolute;
    inset:0;
    padding:20px 32px 20px 20px;
    overflow-y:scroll;
    scrollbar-width:none;
}
#terminal::-webkit-scrollbar{display:none;}

/* Fancy Scrollbar */
#scrollbar-track{
    position:absolute;
    right:0;
    top:0;
    width:18px;
    height:100%;
    border-left:1px solid rgba(255,159,7,.15);
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,159,7,.04) 0px,
            rgba(255,159,7,.04) 8px,
            transparent 8px,
            transparent 16px
        );
}

#scrollbar-thumb{
    position:absolute;
    width:14px;
    left:2px;
    min-height:50px;
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,240,200,.5) 0 2px,
            transparent 2px 6px
        ),
        linear-gradient(#ffc861,#ff9f07);
    border:1px solid rgba(255,220,150,.3);
    box-shadow:0 0 10px rgba(255,159,7,.3);
    cursor:pointer;
}

/* Prompt */
#prompt{
    display:flex;
    margin-top:10px;
    gap:10px;
}

#prompt input{
    flex:1;
    background:none;
    border:none;
    color:var(--amber);
    font:inherit;
    outline:none;
}

/* overlays */
#scanlines,
#amber{
    position:fixed;
    inset:0;
    pointer-events:none;
}

#scanlines{
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.04) 0 2px,
        transparent 2px 6px
    );
    opacity:.13;
}

#amber{
    background:rgba(255,159,7,.04);
}
</style>
</head>
<body>

<div id="startup">
    <div id="crt-open"></div>

    <div id="startup-panel">
        <div class="corner c1"></div>
        <div class="corner c2"></div>
        <div class="corner c3"></div>
        <div class="corner c4"></div>

        <div id="startup-title">U.I.C.</div>
        <div id="startup-sub">UNIVERSAL INTERSTELLAR COMPUTERS</div>
        <div id="welcome">WELCOME</div>
    </div>
</div>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">
    <div id="terminal-frame">

        <div id="terminal-header">
            <div id="terminal-title"></div>

            <div class="status-lights">
                <div class="light"></div>
                <div class="light"></div>
                <div class="light"></div>
            </div>
        </div>

        <div id="terminal-wrapper">
            <div id="terminal"></div>
            <div id="scrollbar-track">
                <div id="scrollbar-thumb"></div>
            </div>
        </div>

        <div id="prompt">
            <span>&gt;</span>
            <input id="cmd" disabled autocomplete="off">
        </div>

    </div>
</div>

<script>
const startupTitle = document.getElementById("startup-title");
const startupSub = document.getElementById("startup-sub");
const welcome = document.getElementById("welcome");
const startup = document.getElementById("startup");

const terminalContainer = document.getElementById("crt-container");
const terminalTitle = document.getElementById("terminal-title");
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");

const bootLines = [
  "Initializing U.I.C. Mainframe...",
  "Loading Security Protocols...",
  "Authenticating Terminal Node...",
  "Verifying User Clearance...",
  "System Online",
  "-----------------------------"
];

async function typeText(el,text,speed=50){
    el.textContent="";
    for(let i=0;i<text.length;i++){
        el.textContent += text[i];
        await new Promise(r=>setTimeout(r,speed));
    }
}

async function introSequence(){

    await new Promise(r=>setTimeout(r,2200));

    startupTitle.style.opacity="0";
    startupSub.style.opacity="0";

    welcome.style.opacity="1";

    await new Promise(r=>setTimeout(r,1400));

    startup.style.opacity="0";
    startup.style.transition="opacity .5s ease";

    await new Promise(r=>setTimeout(r,500));

    startup.remove();
    terminalContainer.style.display="block";

    await typeText(terminalTitle,"U.I.C. SYSTEMS TERMINAL ACCESS",40);

    await boot();
}

async function boot(){
    for(const line of bootLines){
        terminal.innerHTML += line + "<br>";
        terminal.scrollTop = terminal.scrollHeight;
        await new Promise(r=>setTimeout(r,250));
    }

    terminal.innerHTML += "<br>SYSTEM READY.<br>";
    input.disabled = false;
    input.focus();
}

introSequence();
</script>

</body>
</html>

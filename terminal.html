<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Terminal Access</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  perspective:1000px;
}

/* MAIN CONTAINER */
#crt-container {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  padding:40px;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
  box-sizing:border-box;
}

#terminal-title {
  font-size:28px;
  margin-bottom:20px;
  color:#FF9F07;
  text-shadow:0 0 8px #FF9F07;
}

/* TERMINAL AREA */
#terminal-box {
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

/* CUSTOM TERMINAL SCROLLER WRAPPER */
#terminal-wrapper {
  position:relative;
  flex:1;
  min-height:300px;
  border:1px solid rgba(255,159,7,.2);
  background:rgba(0,0,0,.25);
  overflow:hidden;
}

/* ACTUAL TERMINAL */
#terminal {
  position:absolute;
  inset:0;
  overflow-y:scroll;
  padding:20px;
  padding-right:32px;
  box-sizing:border-box;

  scrollbar-width:none;
  -ms-overflow-style:none;
}

#terminal::-webkit-scrollbar {
  display:none;
}

/* CUSTOM SCROLLBAR TRACK */
#scrollbar-track {
  position:absolute;
  top:0;
  right:0;
  width:16px;
  height:100%;
  background:
    linear-gradient(
      to right,
      rgba(255,159,7,.03),
      rgba(255,159,7,.12),
      rgba(255,159,7,.03)
    );
  border-left:1px solid rgba(255,159,7,.15);
  box-shadow:inset 0 0 8px rgba(255,159,7,.08);
}

/* CUSTOM SCROLLBAR THUMB */
#scrollbar-thumb {
  position:absolute;
  top:0;
  left:1px;
  width:14px;
  min-height:40px;
  border-radius:2px;
  cursor:pointer;

  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,240,200,.45) 0px,
      rgba(255,240,200,.45) 2px,
      transparent 2px,
      transparent 6px
    ),
    linear-gradient(
      to bottom,
      #ffbf4d 0%,
      #ff9f07 100%
    );

  border:1px solid rgba(255,210,120,.3);

  box-shadow:
    0 0 10px rgba(255,159,7,.35),
    inset 0 0 4px rgba(255,255,255,.15);
}

/* INPUT */
#prompt {
  display:flex;
  margin-top:10px;
}

#prompt input {
  background:transparent;
  border:none;
  outline:none;
  color:#FF9F07;
  font-family:inherit;
  flex:1;
  min-width:0;
}

/* OS LABEL */
#os {
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
  z-index:1002;
}

/* SCANLINES */
#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}

@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

/* AMBER OVERLAY */
#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
  z-index:1000;
}

/* RESPONSIVE */
@media (max-width:900px){
#crt-container{padding:20px;}
#terminal-title{font-size:22px;}
#terminal{padding:15px;padding-right:28px;}
}

@media (max-width:500px){
body{font-size:14px;}
#crt-container{padding:15px;}
#terminal-title{font-size:18px;}
#prompt{margin-top:8px;}
#prompt input{font-size:14px;}
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">

  <div id="terminal-title">U.I.C. Systems Terminal Access Point</div>

  <div id="terminal-box">

    <div id="terminal-wrapper">
      <div id="terminal"></div>

      <div id="scrollbar-track">
        <div id="scrollbar-thumb"></div>
      </div>
    </div>

    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off" disabled>
    </div>

  </div>

</div>

<div id="os">UIC OS v1.0.4</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const container = document.getElementById("crt-container");
const os = document.getElementById("os");

const thumb = document.getElementById("scrollbar-thumb");
const track = document.getElementById("scrollbar-track");

/* COMMAND SEQUENCES */
const sequences = {
  users: { cmds: ["init","access","grant"], page: "users.html" },
  stations: { cmds: ["station","alpha","open"], page: "folder_stations/stations.html" },
  projects: { cmds: ["proj","verify","unlock"], page: "projects.html" },
  ships: { cmds: ["fleet","engage","authorize"], page: "folder_ships/ships.html" },
  funding: { cmds: ["finance","review","approve"], page: "funding.html" },
  classified: { cmds: ["class","secure","enter"], page: "classified.html" },
  systemstatus: { cmds: ["sys","status","check"], page: "systemstatus.html" },
  communications: { cmds: ["comm","connect","link"], page: "communications.html" },
  personalmessanger: { cmds: ["pm","login","open"], page: "personalmessanger.html" },
  research: { cmds: ["res","start","execute"], page: "research.html" },
  map: { cmds: ["map","system","locate"], page: "maps/solarmap.html" },
  blackbox: { cmds: ["anomoly","detection","reports"], page: "blackbox.html" },
  deltav: { cmds: ["burn","prograde","hohmann"], page: "deltav.html" }
};

let currentSequence = null;
let step = 0;

/* BOOT TEXT */
const bootLines = [
  'U.I.C. Terminal Booting...',
  'Initializing Secure Modules...',
  'Loading Security Protocols...',
  'Verifying Access Permissions...',
  'System Online',
  '------------------------'
];

const fakeErrors = [
  'ERROR: Network desync',
  'WARNING: Unknown protocol detected',
  'ERROR: Authentication timeout',
  'ALERT: Module overload',
  'ERROR: Peripheral mismatch'
];

/* CUSTOM SCROLLBAR UPDATE */
function updateScrollbar() {
  const visibleRatio = terminal.clientHeight / terminal.scrollHeight;
  const thumbHeight = Math.max(40, track.clientHeight * visibleRatio);

  thumb.style.height = thumbHeight + "px";

  const scrollRatio = terminal.scrollTop / (terminal.scrollHeight - terminal.clientHeight);
  const maxThumbMove = track.clientHeight - thumbHeight;

  thumb.style.top = (scrollRatio * maxThumbMove) + "px";
}

terminal.addEventListener("scroll", updateScrollbar);
window.addEventListener("resize", updateScrollbar);

/* DRAG SCROLLBAR */
let dragging = false;
let dragOffset = 0;

thumb.addEventListener("mousedown", e => {
  dragging = true;
  dragOffset = e.clientY - thumb.getBoundingClientRect().top;
  e.preventDefault();
});

document.addEventListener("mousemove", e => {
  if (!dragging) return;

  const trackRect = track.getBoundingClientRect();
  const thumbHeight = thumb.offsetHeight;

  let newTop = e.clientY - trackRect.top - dragOffset;
  newTop = Math.max(0, Math.min(newTop, track.clientHeight - thumbHeight));

  const scrollRatio = newTop / (track.clientHeight - thumbHeight);
  terminal.scrollTop = scrollRatio * (terminal.scrollHeight - terminal.clientHeight);
});

document.addEventListener("mouseup", () => dragging = false);

/* BOOT SEQUENCE */
async function boot() {
  for (let line of bootLines) {
    const delay = 50 + Math.random()*100;

    if (Math.random() < 0.2) {
      const err = fakeErrors[Math.floor(Math.random()*fakeErrors.length)];
      terminal.innerHTML += `<span style="color:#ff6a00">${err}</span><br>`;
      terminal.scrollTop = terminal.scrollHeight;
      updateScrollbar();
      await new Promise(r => setTimeout(r, delay));
    }

    terminal.innerHTML += line + "<br>";
    terminal.scrollTop = terminal.scrollHeight;
    updateScrollbar();

    await new Promise(r => setTimeout(r, delay));
  }

  terminal.innerHTML += "<br>System Ready.<br>";
  input.disabled = false;
  input.focus();
  updateScrollbar();
}

boot();

/* INPUT HANDLER */
input.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;

  const value = input.value.toLowerCase().trim();
  terminal.innerHTML += `&gt; ${value}<br>`;
  input.value = "";

  if (!currentSequence) {
    let found = false;

    for (let key in sequences) {
      if (value === sequences[key].cmds[0]) {
        currentSequence = key;
        step = 1;
        terminal.innerHTML += `Step 1 complete. Enter next command.<br>`;
        found = true;
        break;
      }
    }

    if (!found) terminal.innerHTML += "Unknown command.<br>";

  } else {
    const seq = sequences[currentSequence];

    if (value === seq.cmds[step]) {
      step++;

      if (step === seq.cmds.length) {
        terminal.innerHTML += `<br>${currentSequence.toUpperCase()} Access Granted! Redirecting...<br>`;

        setTimeout(() => {
          window.location.href = seq.page;
        }, 500);

        currentSequence = null;
        step = 0;
      } else {
        terminal.innerHTML += `Step ${step} complete. Enter next command.<br>`;
      }

    } else {
      terminal.innerHTML += "Invalid command. Sequence reset.<br>";
      currentSequence = null;
      step = 0;
    }
  }

  terminal.scrollTop = terminal.scrollHeight;
  updateScrollbar();
});

/* DESKTOP TILT */
document.addEventListener("mousemove", e => {
  const x = (window.innerWidth/2 - e.clientX)/1000;
  const y = (window.innerHeight/2 - e.clientY)/1000;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});

/* MOBILE TILT */
document.addEventListener("touchmove", e => {
  const t = e.touches[0];
  const x = (window.innerWidth/2 - t.clientX)/1000;
  const y = (window.innerHeight/2 - t.clientY)/1000;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
},{passive:true});

/* INITIALIZE */
setTimeout(updateScrollbar, 50);
</script>

</body>
</html>

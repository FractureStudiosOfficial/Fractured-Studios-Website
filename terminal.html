<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Terminal Access</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  perspective:1000px;
}

/* MAIN CONTAINER */
#crt-container {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  padding:40px;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
  box-sizing:border-box;
}

#terminal-title {
  font-size:28px;
  margin-bottom:20px;
  color:#FF9F07;
  text-shadow:0 0 8px #FF9F07;
}

/* TERMINAL AREA */
#terminal-box {
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

#terminal {
  background:rgba(0,0,0,.25);
  padding:20px;
  border:1px solid rgba(255,159,7,.2);
  min-height:300px;
  overflow-y:auto;
  flex:1;

  scrollbar-width:auto;
  scrollbar-color:#FF9F07 #111;
}

/* FORCE CUSTOM SCROLLBAR */
#terminal::-webkit-scrollbar {
  width:18px;
  background:#111;
}

#terminal::-webkit-scrollbar-track {
  background:
    linear-gradient(to right,
      rgba(255,159,7,.04) 0%,
      rgba(255,159,7,.15) 50%,
      rgba(255,159,7,.04) 100%);
  border-left:1px solid rgba(255,159,7,.25);
  box-shadow:
    inset 0 0 10px rgba(255,159,7,.1);
}

#terminal::-webkit-scrollbar-thumb {
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,240,200,.45) 0px,
      rgba(255,240,200,.45) 2px,
      transparent 2px,
      transparent 6px
    ),
    linear-gradient(
      to bottom,
      #ffbf4d 0%,
      #ff9f07 100%
    );

  border:2px solid rgba(255,200,100,.25);
  border-radius:2px;

  box-shadow:
    0 0 12px rgba(255,159,7,.45),
    inset 0 0 6px rgba(255,255,255,.15);
}

#terminal::-webkit-scrollbar-thumb:hover {
  background:
    repeating-linear-gradient(
      to bottom,
      rgba(255,250,220,.55) 0px,
      rgba(255,250,220,.55) 2px,
      transparent 2px,
      transparent 6px
    ),
    linear-gradient(
      to bottom,
      #ffd07a 0%,
      #ffb020 100%
    );
}

/* INPUT */
#prompt {
  display:flex;
  margin-top:10px;
}

#prompt input {
  background:transparent;
  border:none;
  outline:none;
  color:#FF9F07;
  font-family:inherit;
  flex:1;
  min-width:0;
}

/* OS LABEL */
#os {
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
  z-index:1002;
}

/* SCANLINES */
#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

/* AMBER OVERLAY */
#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
  z-index:1000;
}

/* RESPONSIVE FIXES */
@media (max-width:900px){
#crt-container{padding:20px;}
#terminal-title{font-size:22px;}
#terminal{padding:15px;}
}

@media (max-width:500px){
body{font-size:14px;}
#crt-container{padding:15px;}
#terminal-title{font-size:18px;}
#prompt{margin-top:8px;}
#prompt input{font-size:14px;}
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">

  <div id="terminal-title">U.I.C. Systems Terminal Access Point</div>

  <div id="terminal-box">
    <div id="terminal"></div>

    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off" disabled>
    </div>
  </div>

</div>

<div id="os">UIC OS v1.0.4</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const container = document.getElementById("crt-container");
const os = document.getElementById("os");

const sequences = {
  users: { cmds: ["init","access","grant"], page: "users.html" },
  stations: { cmds: ["station","alpha","open"], page: "folder_stations/stations.html" },
  projects: { cmds: ["proj","verify","unlock"], page: "projects.html" },
  ships: { cmds: ["fleet","engage","authorize"], page: "folder_ships/ships.html" },
  funding: { cmds: ["finance","review","approve"], page: "funding.html" },
  classified: { cmds: ["class","secure","enter"], page: "classified.html" },
  systemstatus: { cmds: ["sys","status","check"], page: "systemstatus.html" },
  communications: { cmds: ["comm","connect","link"], page: "communications.html" },
  personalmessanger: { cmds: ["pm","login","open"], page: "personalmessanger.html" },
  research: { cmds: ["res","start","execute"], page: "research.html" },
  map: {cmds: ["map","system","locate"], page: "maps/solarmap.html" },
  blackbox: {cmds: ["anomoly", "detection", "reports"], page: "blackbox.html" },
  deltav: {cmds: ["burn", "prograde", "hohmann"], page: "deltav.html" }
};

let currentSequence = null;
let step = 0;

const bootLines = [
  'U.I.C. Terminal Booting...',
  'Initializing Secure Modules...',
  'Loading Security Protocols...',
  'Verifying Access Permissions...',
  'System Online',
  '------------------------'
];

async function boot() {
  for (let line of bootLines) {
    terminal.innerHTML += line + "<br>";
    terminal.scrollTop = terminal.scrollHeight;
    await new Promise(r => setTimeout(r, 80));
  }

  terminal.innerHTML += "<br>System Ready.<br>";
  input.disabled = false;
  input.focus();
}
boot();

input.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;

  const value = input.value.toLowerCase().trim();
  terminal.innerHTML += `&gt; ${value}<br>`;
  input.value = "";
  terminal.scrollTop = terminal.scrollHeight;
});

document.addEventListener("mousemove", e => {
  const x = (window.innerWidth/2 - e.clientX)/1000;
  const y = (window.innerHeight/2 - e.clientY)/1000;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});
</script>

</body>
</html>

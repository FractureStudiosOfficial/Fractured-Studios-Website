<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Terminal Access</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  perspective:1000px;
}

#crt-container {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  padding:40px;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
}

#terminal-title {
  font-size:28px;
  margin-bottom:20px;
  color:#FF9F07;
  text-shadow: 0 0 8px #FF9F07;
}

#terminal-box {
  flex:1;
  display:flex;
  flex-direction:column;
}

#terminal {
  background:rgba(0,0,0,.25);
  padding:20px;
  border:1px solid rgba(255,159,7,.2);
  min-height:300px;
  overflow-y:auto;
}

#prompt {
  display:flex;
  margin-top:10px;
}

#prompt input {
  background:transparent;
  border:none;
  outline:none;
  color:#FF9F07;
  font-family:inherit;
  flex:1;
}

#os {
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
}

#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">

  <div id="terminal-title">U.I.C. Systems Terminal Access Point</div>

  <div id="terminal-box">
    <div id="terminal"></div>

    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off" disabled>
    </div>
  </div>

</div>

<div id="os">UIC OS v1.0.4</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const container = document.getElementById("crt-container");
const os = document.getElementById("os");

// Define sequences with exact pages to redirect
const sequences = {
  users: { cmds: ["init","access","grant"], page: "users.html" },
  stations: { cmds: ["station","alpha","open"], page: "stations.html" },
  projects: { cmds: ["proj","verify","unlock"], page: "projects.html" },
  ships: { cmds: ["fleet","engage","authorize"], page: "ships.html" },
  funding: { cmds: ["finance","review","approve"], page: "funding.html" },
  classified: { cmds: ["class","secure","enter"], page: "classified.html" },
  systemstatus: { cmds: ["sys","status","check"], page: "systemstatus.html" },
  communications: { cmds: ["comm","connect","link"], page: "communications.html" },
  personalmessanger: { cmds: ["pm","login","open"], page: "personalmessanger.html" },
  research: { cmds: ["res","start","execute"], page: "research.html" },
  map: {cmds: ["map","system","locate"], page: "solarmap.html" },
  blackbox: {cmds: ["anomoly", "detection", "reports"], page: "blackbox.html" }
};

let currentSequence = null;
let step = 0;

// Startup sequence
const bootLines = [
  'U.I.C. Terminal Booting...',
  'Initializing Secure Modules...',
  'Loading Security Protocols...',
  'Verifying Access Permissions...',
  'System Online',
  '------------------------'
];

// Fake errors
const fakeErrors = [
  'ERROR: Network desync',
  'WARNING: Unknown protocol detected',
  'ERROR: Authentication timeout',
  'ALERT: Module overload',
  'ERROR: Peripheral mismatch'
];

// Boot function
async function boot() {
  for (let line of bootLines) {
    const delay = 50 + Math.random()*100;
    if (Math.random() < 0.2) {
      const err = fakeErrors[Math.floor(Math.random()*fakeErrors.length)];
      terminal.innerHTML += `<span style="color:#ff6a00">${err}</span><br>`;
      terminal.scrollTop = terminal.scrollHeight;
      await new Promise(r => setTimeout(r, delay));
    }
    terminal.innerHTML += line + "<br>";
    terminal.scrollTop = terminal.scrollHeight;
    await new Promise(r => setTimeout(r, delay));
  }
  terminal.innerHTML += "<br>System Ready.<br>";
  input.disabled = false;
  input.focus();
}

// Boot the terminal
boot();

// Command input handler
input.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;

  const value = input.value.toLowerCase().trim();
  terminal.innerHTML += `&gt; ${value}<br>`;
  input.value = "";

  if (!currentSequence) {
    let found = false;
    for (let key in sequences) {
      if (value === sequences[key].cmds[0]) {
        currentSequence = key;
        step = 1;
        terminal.innerHTML += `Step 1 complete. Enter next command.<br>`;
        terminal.scrollTop = terminal.scrollHeight;
        found = true;
        break;
      }
    }
    if (!found) {
      terminal.innerHTML += "Unknown command.<br>";
    }
  } else {
    const seq = sequences[currentSequence];
    if (value === seq.cmds[step]) {
      step++;
      if (step === seq.cmds.length) {
        terminal.innerHTML += `<br>${currentSequence.toUpperCase()} Access Granted! Redirecting...<br>`;
        terminal.scrollTop = terminal.scrollHeight;
        setTimeout(() => {
          window.location.href = seq.page; // redirect to exact page
        }, 500);
        currentSequence = null;
        step = 0;
      } else {
        terminal.innerHTML += `Step ${step} complete. Enter next command.<br>`;
      }
    } else {
      terminal.innerHTML += "Invalid command. Sequence reset.<br>";
      currentSequence = null;
      step = 0;
    }
    terminal.scrollTop = terminal.scrollHeight;
  }
});

// 3D tilt
document.addEventListener("mousemove", e => {
  const x = (window.innerWidth/2 - e.clientX)/1000;
  const y = (window.innerHeight/2 - e.clientY)/1000;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});
</script>

</body>
</html>

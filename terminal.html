<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.I.C. Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#000;
  color:#00FF00; /* classic green terminal text */
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* Terminal container */
#terminal-container {
  width:80%;
  max-width:900px;
  background:#000;
  border:2px solid #00FF00;
  padding:30px;
  box-sizing:border-box;
  box-shadow:0 0 20px #00FF00;
  position:relative;
}

/* Terminal display */
#terminal {
  min-height:400px;
  max-height:500px;
  overflow-y:auto;
  white-space:pre-wrap;
}

/* Input prompt */
#prompt {
  display:flex;
  margin-top:10px;
}

#prompt span {
  margin-right:5px;
}

#prompt input {
  flex:1;
  background:black;
  color:#00FF00;
  border:none;
  outline:none;
  font-family:inherit;
}

/* Scanline overlay */
#scanlines {
  position:absolute;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 2px,
    transparent 4px
  );
  animation:flicker .1s infinite;
}

@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.05}
  100%{opacity:.15}
}
</style>
</head>
<body>

<div id="terminal-container">
  <div id="scanlines"></div>
  <div id="terminal">U.I.C. Systems Terminal<br>Enter command sequence to proceed.<br></div>

  <div id="prompt">
    <span>&gt;</span>
    <input id="cmd" autocomplete="off">
  </div>
</div>

<script>
// ELEMENTS
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");

// Define the required sequence of commands
const commandSequence = [
  "login",
  "access key alpha",
  "validate code 47",
  "proceed"
];

let currentStep = 0;

// Function to print text to terminal
function printLine(text) {
  terminal.innerHTML += text + "\n";
  terminal.scrollTop = terminal.scrollHeight;
}

// Handle input
input.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const cmd = input.value.trim().toLowerCase();
  input.value = "";

  printLine("> " + cmd);

  if (cmd === commandSequence[currentStep].toLowerCase()) {
    currentStep++;
    if (currentStep === commandSequence.length) {
      printLine("\nSequence complete. Redirecting to users page...");
      setTimeout(() => {
        window.location = "users.html";
      }, 1500);
    } else {
      printLine("OK. Next command?");
    }
  } else {
    printLine("ERROR: Invalid command. Try again.");
  }
});
</script>

</body>
</html>

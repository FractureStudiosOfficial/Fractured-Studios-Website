<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fractured Studios</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Share Tech Mono', monospace;
  background: #0d0d0d;
  color: #FF9F07;
  overflow: hidden;
  cursor: default;
}

/* Scanlines overlay */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,159,7,0.05) 0px,
    rgba(255,159,7,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
  animation: scanlineMove 1s linear infinite;
  z-index: 9999;
}
@keyframes scanlineMove { 0% { background-position:0 0;} 100%{background-position:0 4px;} }

/* Boot screen */
#bootScreen {
  position: fixed;
  inset: 0;
  background: #0d0d0d;
  color: #FF9F07;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-size: 20px;
  white-space: pre-wrap;
  text-align: center;
  z-index: 1000;
}
#enterBtn {
  display:none;
  margin-top:40px;
  padding:15px 40px;
  font-size:22px;
  border:2px solid #FF9F07;
  background:transparent;
  color:#FF9F07;
  cursor:pointer;
}
#enterBtn:hover { background:#FF9F07; color:#0d0d0d; }

/* CRT container wrapper */
#crtWrapper {
  position: absolute;
  inset: 0;
  overflow: hidden;
  z-index:1;
}

/* CRT content layer */
#crtContainer {
  width: 100%;
  min-height: 100vh;
  transform-origin: center;
  filter: url(#crtDistortion);
}

/* Logo and homepage styling */
#homepage {
  display: none;
  overflow: auto;
}
.hero { height:100vh; display:flex; justify-content:center; align-items:center; }
.logo { max-width:300px; width:80%; opacity:0; transform:scale(0.8); filter: drop-shadow(0 0 15px #FF9F07); animation: logoReveal 1.5s ease forwards; }
@keyframes logoReveal { 0%{opacity:0;transform:scale(0.7);filter:drop-shadow(0 0 0 #FF9F07);}60%{opacity:1;transform:scale(1.05);filter:drop-shadow(0 0 20px #FF9F07);}100%{opacity:1;transform:scale(1);filter:drop-shadow(0 0 15px #FF9F07);} }
.logo.flicker-glow { animation: logoFlicker 1.5s infinite; }
@keyframes logoFlicker { 0%,100%{filter:drop-shadow(0 0 15px #FF9F07);opacity:1;}10%{filter:drop-shadow(0 0 20px #FF9F07);opacity:0.97;}20%{filter:drop-shadow(0 0 12px #FF9F07);opacity:0.98;}35%{filter:drop-shadow(0 0 18px #FF9F07);opacity:0.96;}50%{filter:drop-shadow(0 0 15px #FF9F07);opacity:0.99;}70%{filter:drop-shadow(0 0 22px #FF9F07);opacity:0.95;}85%{filter:drop-shadow(0 0 15px #FF9F07);opacity:1;} }

.content { padding:60px; max-width:900px; margin:auto; }
.phosphor { text-shadow:0 0 2px #FF9F07,0 0 4px rgba(255,159,7,0.8),0 0 6px rgba(255,159,7,0.6); }
#commandInput { background:none;border:none;color:#FF9F07;font-family:inherit;font-size:18px;outline:none;width:100%;max-width:500px; }

/* Flicker CRT overall */
.flicker { animation:flicker 0.15s infinite; }
@keyframes flicker { 0%{opacity:1;}97%{opacity:1;}98%{opacity:0.97;}99%{opacity:0.94;}100%{opacity:1;} }
</style>
</head>
<body>

<!-- Boot Screen -->
<div id="bootScreen">
  <div id="bootText"></div>
  <button id="enterBtn">ENTER</button>
</div>

<!-- CRT Wrapper for distortion -->
<div id="crtWrapper" class="flicker">
  <div id="crtContainer">
    <div id="homepage">
      <section class="hero">
        <img src="FracturedF-Transparant.png" class="logo" id="logo">
      </section>
      <section class="content">
        <h1 class="phosphor">Welcome to Fractured Studios</h1>
        <p>> Type a command:</p>
        <input id="commandInput" placeholder="> enter command...">
        <p>Commands: <strong>home</strong>, <strong>games</strong>, <strong>about</strong>, <strong>contact</strong></p>
      </section>
    </div>
  </div>
</div>

<div class="scanlines"></div>

<!-- SVG CRT Distortion Filter -->
<svg style="display:none">
  <filter id="crtDistortion">
    <feImage xlink:href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAOEAAADhCAYAAAAGc6iTAAAA..."/>
    <feDisplacementMap in2="SourceGraphic" in="SourceGraphic" scale="20" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>

<script>
// Boot screen typing
const bootScreen = document.getElementById("bootScreen");
const bootText = document.getElementById("bootText");
const enterBtn = document.getElementById("enterBtn");
const homepage = document.getElementById("homepage");
const logo = document.getElementById("logo");

const bootMessages = ["Booting system...", "Loading modules...", "Connecting...", "Access granted..."];
let terminalText = bootMessages.join("\n") + "\n";
let i=0;

function typeBoot() {
  if(i<terminalText.length){
    bootText.textContent += terminalText.charAt(i);
    i++;
    setTimeout(typeBoot, 25);
  } else {
    enterBtn.style.display="block";
  }
}
typeBoot();

enterBtn.addEventListener("click",()=>{
  bootScreen.style.display="none";
  homepage.style.display="block";
  logo.classList.add("flicker-glow");
  document.body.style.overflow="auto";
});

// Terminal commands
const input = document.getElementById("commandInput");
input.addEventListener("keydown", function(e){
  if(e.key==="Enter"){
    const cmd=input.value.toLowerCase().trim();
    if(cmd==="home") window.location.href="index.html";
    else if(cmd==="games") window.location.href="games.html";
    else if(cmd==="about") window.location.href="about.html";
    else if(cmd==="contact") window.location.href="contact.html";
    else alert("Unknown command: "+cmd);
    input.value="";
  }
});

// Mouse-driven subtle tilt
const crtContainer = document.getElementById("crtContainer");
document.addEventListener("mousemove", function(e){
  const moveX = (e.clientX - window.innerWidth/2)/70;
  const moveY = (e.clientY - window.innerHeight/2)/70;
  crtContainer.style.transform = `perspective(1200px) scale(1.02) rotateX(${moveY}deg) rotateY(${moveX}deg)`;
});
</script>
<!-- Add this just before </body> -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script id="vertexShader" type="x-shader/x-vertex">
varying vec2 vUv;
void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
</script>

<script id="fragmentShader" type="x-shader/x-fragment">
uniform sampler2D uTexture;
uniform float time;
varying vec2 vUv;

void main() {
    vec2 uv = vUv * 2.0 - 1.0;

    // Fisheye distortion
    float r = length(uv);
    float theta = atan(uv.y, uv.x);
    float rDistorted = pow(r, 0.8); // Adjust for intensity
    vec2 distortedUV = rDistorted * vec2(cos(theta), sin(theta));
    distortedUV = (distortedUV + 1.0) * 0.5;

    // Scanline effect
    float scanline = sin(distortedUV.y * 800.0 + time*10.0) * 0.04;

    // Sample original content
    vec3 color = texture2D(uTexture, distortedUV).rgb;
    color.r += scanline;
    color.g += scanline*0.5;
    color.b += scanline*0.2;

    gl_FragColor = vec4(color, 1.0);
}
</script>

<script>
let renderer, scene, camera, mesh, clock;

function initCRT() {
    const crtWrapper = document.getElementById("crtWrapper");
    const crtContainer = document.getElementById("crtContainer");

    const width = window.innerWidth;
    const height = window.innerHeight;

    // Create Three.js scene
    scene = new THREE.Scene();
    camera = new THREE.OrthographicCamera(-1,1,1,-1,0,10);
    camera.position.z = 1;

    renderer = new THREE.WebGLRenderer({ alpha: true });
    renderer.setSize(width, height);
    renderer.domElement.style.position = 'absolute';
    renderer.domElement.style.top = '0';
    renderer.domElement.style.left = '0';

    crtWrapper.appendChild(renderer.domElement);

    clock = new THREE.Clock();

    // Capture existing DOM as texture
    html2canvas(crtContainer).then(canvas => {
        const texture = new THREE.CanvasTexture(canvas);
        texture.minFilter = THREE.LinearFilter;
        texture.magFilter = THREE.LinearFilter;

        const geometry = new THREE.PlaneGeometry(2,2);
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTexture: { value: texture },
                time: { value: 0 }
            },
            vertexShader: document.getElementById('vertexShader').textContent,
            fragmentShader: document.getElementById('fragmentShader').textContent
        });

        mesh = new THREE.Mesh(geometry, material);
        scene.add(mesh);
        animate();
    });

    window.addEventListener('resize', () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

function animate() {
    requestAnimationFrame(animate);
    if(mesh) {
        mesh.material.uniforms.time.value = clock.getElapsedTime();
    }
    renderer.render(scene, camera);
}

// Load html2canvas
const script = document.createElement('script');
script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
script.onload = initCRT;
document.body.appendChild(script);
</script>
</body>
</html>

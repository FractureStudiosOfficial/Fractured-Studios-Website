<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractured Studios | Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  perspective:1000px;
}

/* CRT container */
#crt-container {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px;
  box-sizing:border-box;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
}

/* Terminal */
#terminal-box {
  width:50%;
}

#terminal {
  background:rgba(0,0,0,.25);
  padding:20px;
  border:1px solid rgba(255,159,7,.2);
  min-height:250px;
  max-height:400px;
  overflow-y:auto;
}

#prompt {
  display:flex;
  margin-top:10px;
}

#prompt input {
  background:transparent;
  border:none;
  outline:none;
  color:#FF9F07;
  font-family:inherit;
  flex:1;
}

/* Logo */
#logo-area {
  width:40%;
  display:flex;
  align-items:center;
  justify-content:center;
}

#logo {
  width:260px;
  filter:drop-shadow(0 0 10px #FF9F07);
  transition:.25s ease;
}

/* OS version */
#os {
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
}

/* Scanlines */
#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

/* Amber tint overlay */
#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">

  <div id="terminal-box">
    <div id="terminal"></div>

    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off" disabled>
    </div>

    <p style="margin-top:10px;opacity:.6">
      Available terms: About, Games, Contact
    </p>
  </div>

  <div id="logo-area">
    <img id="logo" src="FracturedF-Transparant.png">
  </div>

</div>

<div id="os">UIC OS v1.0.4</div>

<script>
// ELEMENTS
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const logo = document.getElementById("logo");
const container = document.getElementById("crt-container");
const os = document.getElementById("os");

// COMMAND LOGOS
const commandLogos = {
  about: "Aboutui.png",
  games: "Gamesui.png",
  contact: "Mail-UI.png"
};

let pendingCommand = null;

// 3D tilt
document.addEventListener("mousemove", e => {
  const x = (window.innerWidth/2 - e.clientX)/1000;
  const y = (window.innerHeight/2 - e.clientY)/1000;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});

// CUSTOM STARTUP SEQUENCE
const bootLines = [
  'U.I.C. Startup sequence...',
  'Initializing kernel modules...',
  'Loading device drivers...',
  'Verifying memory...',
  'Checking system integrity...',
  'Calibrating display output...',
  'Starting process scheduler...',
  'Startup successful',
  '------------------------',
  'Welcome to U.I.C. Systems',
  '------------------------'
];

// FAKE ERRORS
const fakeErrors = [
  'ERROR: Memory leak detected',
  'WARNING: Clock desync',
  'ERROR: Bus timeout',
  'ALERT: Unknown device',
  'ERROR: Kernel mismatch'
];

// ASYNC BOOT WITH RANDOM SPEEDS
async function boot() {
  for (let line of bootLines) {
    // Random delay 40–120ms
    const delay = 40 + Math.random()*80;

    // 30% chance of random error
    if (Math.random() < 0.3) {
      const err = fakeErrors[Math.floor(Math.random()*fakeErrors.length)];
      terminal.innerHTML += `<span style="color:#ff6a00">${err}</span><br>`;
      terminal.scrollTop = terminal.scrollHeight;
      await new Promise(r => setTimeout(r, delay));
    }

    terminal.innerHTML += line + "<br>";
    terminal.scrollTop = terminal.scrollHeight;
    await new Promise(r => setTimeout(r, delay));
  }

  terminal.innerHTML += "<br>System Ready.<br>";
  terminal.scrollTop = terminal.scrollHeight;
  input.disabled = false;
  input.focus();
}

// START BOOT
boot();

// COMMAND HANDLER
input.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;

  const value = input.value.toLowerCase().trim();
  terminal.innerHTML += `&gt; ${value}<br>`;
  input.value = "";

  if (pendingCommand) {
    if (value === "y") {
      window.location = pendingCommand + ".html";
    } else {
      terminal.innerHTML += "Cancelled.<br>";
      logo.src = "FracturedF-Transparant.png";
    }
    pendingCommand = null;
    terminal.scrollTop = terminal.scrollHeight;
    return;
  }

  if (commandLogos[value]) {
    pendingCommand = value;
    logo.src = commandLogos[value];
    terminal.innerHTML += "Confirm? (Y/N)<br>";
  } else {
    terminal.innerHTML += "Unknown command<br>";
  }
  terminal.scrollTop = terminal.scrollHeight;
});
</script>

</body>
</html>

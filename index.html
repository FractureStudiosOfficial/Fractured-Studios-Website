<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home | Retro Terminal</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
body {
  margin:0; height:100vh; background:#111; color:#FF9F07;
  font-family:'Share Tech Mono',monospace; overflow:hidden;
  perspective:1000px; display:flex; justify-content:space-between; align-items:center;
}
#amber-tint {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(255,159,7,0.02); pointer-events:none; z-index:1000;
}
#crt-container {
  width:100%; height:100%; display:flex; justify-content:space-between; align-items:center;
  transform-style:preserve-3d; transition:transform 0.1s ease-out; padding:2em; box-sizing:border-box;
}
#terminal-container { width:50%; display:flex; flex-direction:column; justify-content:center; }
#terminal {
  background: rgba(0,0,0,0.25); padding:1em; border-radius:5px;
  box-shadow:0 0 20px rgba(255,159,7,0.2); min-height:300px; overflow-y:auto; text-align:left;
}
#available-commands {
  margin-top:0.5em; color:#FF9F07; text-shadow:0 0 2px #FF9F07,0 0 4px #FF9F07; font-size:0.9em; text-align:left;
}
#prompt { display:none; flex-direction:row; align-items:center; margin-top:1em; }
#prompt span { margin-right:0.5em; }
#command { background:transparent; border:none; outline:none; color:#FF9F07; flex:1; font-family:'Share Tech Mono',monospace; }

#logo-container { width:45%; display:flex; flex-direction:column; justify-content:center; align-items:center; }
#logo { max-width:250px; width:60%;
  filter: drop-shadow(0 0 8px #FF9F07) drop-shadow(0 0 12px #FF9F07) drop-shadow(0 0 16px #FF9F07) drop-shadow(0 0 20px #FF9F07);
  transition: all 0.2s ease-in-out;
}
#scanlines { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10002;
  background-image: repeating-linear-gradient(rgba(255,255,255,0.06) 0px, rgba(255,255,255,0.06) 2px, transparent 2px, transparent 5px);
  animation:flicker 0.1s infinite; mix-blend-mode:normal;
}
@keyframes flicker { 0%,100%{opacity:0.08;} 50%{opacity:0.02;} }
#flash { position:fixed; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; z-index:10003; }
#os-version { position:fixed; bottom:10px; right:10px; font-size:0.8em; color:#FF9F07;
  text-shadow:0 0 2px #FF9F07,0 0 4px #FF9F07,0 0 6px #FF9F07; pointer-events:none; z-index:10004; opacity:0.8;
}
</style>
</head>
<body>

<div id="amber-tint"></div>
<div id="os-version">OS v1.03.7</div>

<div id="crt-container">

  <div id="terminal-container">
    <div id="terminal"></div>
    <div id="available-commands">Available terms: About, Games, Contact</div>
    <div id="prompt"><span>&gt;</span><input type="text" id="command" autofocus autocomplete="off"></div>
  </div>

  <div id="logo-container"><img id="logo" src="logo.png" alt="Logo"></div>

</div>

<div id="scanlines"></div>
<div id="flash"></div>

<script>
const terminal=document.getElementById('terminal');
const commandInput=document.getElementById('command');
const flash=document.getElementById('flash');
const crtContainer=document.getElementById('crt-container');
const logo=document.getElementById('logo');

const startupMessages=['Initializing system...','Loading modules...','Connecting to server...','Verifying protocols...','Establishing secure channel...'];
const errorPool=['ERROR: Unable to reach node 42','WARNING: Memory buffer overflow detected','CRITICAL: Unknown exception occurred','ALERT: Connection lost temporarily','NOTICE: Debugger attached'];
const visibleCommands=['games','about','contact'];
const hiddenCommands=['ironfrontier'];

// Symbols for commands
const commandSymbols={
  about:'🔹', games:'🎮', contact:'✉️', ironfrontier:'⚔️'
};

let awaitingConfirm=false;
let lastCommand='';

function typeLine(text, delay=50){
  return new Promise(resolve=>{
    let i=0;
    const interval=setInterval(()=>{
      terminal.innerHTML+=text[i];
      i++;
      if(i>=text.length){
        clearInterval(interval);
        terminal.innerHTML+='<br>';
        terminal.scrollTop = terminal.scrollHeight;
        resolve();
      }
    }, delay);
  });
}

function maybeError(){
  if(Math.random()<0.3){
    const error=errorPool[Math.floor(Math.random()*errorPool.length)];
    terminal.innerHTML+=`<span style="color:red;">${error}</span><br>`;
    terminal.scrollTop = terminal.scrollHeight;
  }
}

function flashScreen(){ flash.style.opacity='1'; setTimeout(()=>{flash.style.opacity='0';},100); }

async function startup(){
  for(let msg of startupMessages){
    await typeLine(msg); maybeError();
  }
  await typeLine('System ready. Type a command below.');
  document.getElementById('prompt').style.display='flex';
  commandInput.focus();
}
startup();

// Handle commands
commandInput.addEventListener('keydown',async(e)=>{
  if(e.key==='Enter'){
    const input=commandInput.value.trim().toLowerCase();
    commandInput.value='';
    if(!awaitingConfirm){
      if(visibleCommands.includes(input)||hiddenCommands.includes(input)){
        terminal.innerHTML+=`&gt; ${input}<br>`;
        terminal.scrollTop = terminal.scrollHeight;
        // Change logo to command symbol
        logo.innerText=''; // clear existing logo image
        logo.src=''; // hide image temporarily
        logo.alt=''; 
        logo.style.fontSize='80px';
        logo.style.filter='none';
        logo.innerHTML=commandSymbols[input] || '❓';
        lastCommand=input;
        typeLine('Confirm? (Y/N)');
        awaitingConfirm=true;
      } else {
        terminal.innerHTML+=`&gt; ${input}<br><span style="color:#FF4F07;">Unknown command: ${input}</span><br>`;
      }
    } else {
      // awaiting confirmation
      if(input==='y'){
        window.location.href=lastCommand+'.html';
      } else {
        typeLine('Command cancelled.');
        // restore original logo
        logo.innerHTML='';
        logo.src='logo.png';
        logo.style.filter='drop-shadow(0 0 8px #FF9F07) drop-shadow(0 0 12px #FF9F07) drop-shadow(0 0 16px #FF9F07) drop-shadow(0 0 20px #FF9F07)';
      }
      awaitingConfirm=false;
    }
  }
});

// Subtle 3D movement
document.addEventListener('mousemove',(e)=>{
  const x=(window.innerWidth/2 - e.clientX)/150;
  const y=(window.innerHeight/2 - e.clientY)/150;
  crtContainer.style.transform=`rotateX(${y}deg) rotateY(${x}deg)`;
});
</script>
</body>
</html>

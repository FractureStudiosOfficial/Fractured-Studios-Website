<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fractured Studios</title>

<!-- Retro Font -->
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

  .logo {
  max-width: 300px;
  width: 80%;
  opacity: 0;
  transform: scale(0.8);
  filter: drop-shadow(0 0 10px #FF9F07);
  animation: logoReveal 1.5s ease forwards;
}

@keyframes logoReveal {
  0% {
    opacity: 0;
    transform: scale(0.7);
  }
  60% {
    opacity: 1;
    transform: scale(1.05);
  }
  100% {
    transform: scale(1);
  }
}

  /* ===== CRT EFFECTS ===== */

/* CRT Curvature */
.crt {
  position: relative;
  overflow: hidden;
}

/* Subtle screen curve illusion */
.crt::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(
    ellipse at center,
    transparent 60%,
    rgba(0,0,0,0.25) 100%
  );
  pointer-events: none;
  z-index: 2;
}

/* Glow */
.crt::after {
  content: "";
  position: absolute;
  inset: 0;
  box-shadow: inset 0 0 60px rgba(255, 159, 7, 0.15);
  pointer-events: none;
  z-index: 2;
}

/* Flicker animation */
@keyframes flicker {
  0% { opacity: 1; }
  98% { opacity: 1; }
  99% { opacity: 0.96; }
  100% { opacity: 1; }
}

.flicker {
  animation: flicker 0.12s infinite;
}
/* Base */
body {
  margin: 0;
  background-color: #0d0d0d;
  color: #FF9F07;
  font-family: 'Share Tech Mono', monospace;
}

/* Scanline Overlay */
.scanlines {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;

  background: repeating-linear-gradient(
    to bottom,
    rgba(255, 159, 7, 0.05) 0px,
    rgba(255, 159, 7, 0.05) 1px,
    transparent 2px,
    transparent 4px
  );
}

/* Keep content under scanlines */
#terminal, #enterBtn, #homepage {
  position: relative;
  z-index: 1;
}

/* Terminal */
#terminal {
  padding: 40px;
  white-space: pre-wrap;
  font-size: 18px;
}

/* ENTER button */
#enterBtn {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: transparent;
  border: 2px solid #FF9F07;
  color: #FF9F07;
  padding: 15px 30px;
  font-size: 20px;
  cursor: pointer;
}

#enterBtn:hover {
  background: #FF9F07;
  color: #0d0d0d;
}

/* Homepage */
#homepage {
  display: none;
}

/* Center logo section */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Logo */
.logo {
  max-width: 300px;
  width: 80%;
  filter: drop-shadow(0 0 10px #FF9F07);
}

/* Scroll content */
.content {
  padding: 60px 20px;
  max-width: 900px;
  margin: auto;
}

h1 {
  font-size: 32px;
}

</style>
</head>

<body>
  
<div class="crt flicker">

  <!-- EVERYTHING goes inside here -->

</div>

<div class="scanlines"></div>
<!-- Terminal -->
<div id="terminal"></div>

<!-- Enter Button -->
<button id="enterBtn">ENTER</button>

<!-- Homepage -->
<div id="homepage">

  
  <!-- Center Logo -->
  <section class="hero">
    <!-- 🔥 Replace with your own logo file -->
    <img src="FracturedF-Transparant.png" class="logo">
  </section>

  <!-- Scroll Content -->
  <section class="content">
    <h1>Welcome to Fractured Studios</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>

    <h1>Our Games</h1>
    <p>More placeholder content...</p>
    <h1>Our Games</h1>
<p><a href="games.html">View Games →</a></p>

    <h1>About</h1>
    <p>Even more placeholder text...</p>
  </section>

</div>

<!-- 🔊 Sound -->
<audio id="enterSound" src="enter.mp3"></audio>

<!-- Scanlines Overlay -->
<div class="scanlines"></div>

<script>

const terminal = document.getElementById("terminal");
const enterBtn = document.getElementById("enterBtn");
const homepage = document.getElementById("homepage");
const enterSound = document.getElementById("enterSound");

const text = `
Booting system...
Initializing modules...
Loading assets...
Connecting to server...
Access granted...

Welcome user, enter Fractured Studios...
`;

let i = 0;

function typeEffect() {
  if (i < text.length) {
    terminal.textContent += text.charAt(i);
    i++;
    setTimeout(typeEffect, 25);
  } else {
    setTimeout(showEnter, 800);
  }
}

function showEnter() {
  terminal.style.transition = "opacity 1s";
  terminal.style.opacity = 0;

  setTimeout(() => {
    terminal.style.display = "none";
    enterBtn.style.display = "block";
  }, 1000);
}

enterBtn.addEventListener("click", () => {
  enterSound.play();
  enterBtn.style.display = "none";
  homepage.style.display = "block";
  document.body.style.overflow = "auto";
});

/* Start locked (no scroll during boot) */
document.body.style.overflow = "hidden";

window.onload = typeEffect;

</script>

</body>
</html>

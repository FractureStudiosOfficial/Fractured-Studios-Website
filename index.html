<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Terminal Homepage</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

body {
  margin:0; height:100vh; background:#111; color:#FF9F07;
  font-family:'Share Tech Mono',monospace; overflow:hidden;
  perspective:1000px; display:flex; flex-direction:column; justify-content:flex-start; align-items:center;
}

/* Amber tint overlay */
#amber-tint {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(255,159,7,0.02); pointer-events:none; z-index:1000;
}

/* Main CRT container */
#crt-container {
  width:100%; flex:1; display:flex; flex-direction:column; justify-content:flex-start; align-items:center;
  transform-style:preserve-3d; transition:transform 0.1s ease-out; padding:2em; box-sizing:border-box;
}

/* Terminal styling */
#terminal-container {
  width:90%; max-width:1200px; display:flex; flex-direction:column; margin-top:2em;
}
#terminal {
  background: rgba(0,0,0,0.25); padding:1em; border-radius:5px;
  box-shadow:0 0 20px rgba(255,159,7,0.2); min-height:120px; overflow-y:auto; text-align:left;
}
#prompt { display:flex; flex-direction:row; align-items:center; margin-top:0.5em; }
#prompt span { margin-right:0.5em; }
#command { background:transparent; border:none; outline:none; color:#FF9F07; flex:1; font-family:'Share Tech Mono',monospace; }

/* Logo top-right */
#logo-container { position:absolute; top:2em; right:2em; width:200px; display:flex; justify-content:center; align-items:center; }
#logo { max-width:100%; filter: drop-shadow(0 0 8px #FF9F07) drop-shadow(0 0 12px #FF9F07) drop-shadow(0 0 16px #FF9F07) drop-shadow(0 0 20px #FF9F07); }

/* Scanlines overlay */
#scanlines { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:10002;
  background-image: repeating-linear-gradient(rgba(255,255,255,0.06) 0px, rgba(255,255,255,0.06) 2px, transparent 2px, transparent 5px);
  animation:flicker 0.1s infinite; mix-blend-mode:normal;
}
@keyframes flicker { 0%,100%{opacity:0.08;} 50%{opacity:0.02;} }
#flash { position:fixed; top:0; left:0; width:100%; height:100%; background:white; opacity:0; pointer-events:none; z-index:10003; }

/* OS version tilting */
#os-version { position:absolute; bottom:10px; right:10px; font-size:0.8em; color:#FF9F07;
  text-shadow:0 0 2px #FF9F07,0 0 4px #FF9F07,0 0 6px #FF9F07; pointer-events:none; z-index:10004; opacity:0.8;
}

/* Terminal initial text styling */
#init-text { font-family:'Share Tech Mono',monospace; color:#FF9F07; margin-bottom:0.5em; }
</style>
</head>
<body>

<div id="amber-tint"></div>
<div id="crt-container">

  <!-- Logo -->
  <div id="logo-container"><img id="logo" src="logo.png" alt="Logo"></div>

  <!-- Terminal container -->
  <div id="terminal-container">
    <div id="terminal"></div>
    <div id="prompt"><span>&gt;</span><input type="text" id="command" autocomplete="off" disabled></div>
  </div>

  <!-- OS Version -->
  <div id="os-version">OS v1.03.7</div>

</div>

<div id="scanlines"></div>
<div id="flash"></div>

<script>
// --- Elements ---
const crtContainer = document.getElementById('crt-container');
const osVersion = document.getElementById('os-version');
const terminal = document.getElementById('terminal');
const commandInput = document.getElementById('command');

// --- 3D movement ---
document.addEventListener('mousemove', (e) => {
  const x = (window.innerWidth/2 - e.clientX)/300; // subtle tilt
  const y = (window.innerHeight/2 - e.clientY)/300;
  crtContainer.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  osVersion.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`; // tilts in sync
});

// --- 90's style line-by-line page load ---
const initLines = [
  'Loading Terminal...',
  '------------------------',
  'U.I.C. Systems',
  '------------------------'
];
const fakeErrors = [
  'Warning: Memory leak detected',
  'Error: Protocol mismatch',
  'Alert: Connection unstable',
  'Error: Null pointer exception'
];

const typeDelay = 50; // ms per line
async function loadInitLines() {
  for (let line of initLines) {
    // Randomly insert fake error
    if (Math.random() < 0.25) {
      const errorDiv = document.createElement('div');
      errorDiv.textContent = fakeErrors[Math.floor(Math.random()*fakeErrors.length)];
      errorDiv.style.color = '#FF4F07';
      terminal.appendChild(errorDiv);
    }

    const div = document.createElement('div');
    div.textContent = line;
    div.className = 'init-text';
    terminal.appendChild(div);
    terminal.scrollTop = terminal.scrollHeight;
    await new Promise(r => setTimeout(r, typeDelay));
  }

  // Enable the terminal input after loading
  commandInput.disabled = false;
  commandInput.focus();
}

loadInitLines();

// --- Terminal command handling ---
const visibleCommands = ['about','games','contact','ironfrontier'];
const hiddenCommands = ['secret'];

commandInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter'){
    const cmd = commandInput.value.trim().toLowerCase();
    terminal.innerHTML += `&gt; ${cmd}<br>`;
    commandInput.value = '';
    terminal.scrollTop = terminal.scrollHeight;

    if (visibleCommands.includes(cmd) || hiddenCommands.includes(cmd)){
      window.location.href = cmd+'.html';
    } else {
      terminal.innerHTML += `<span style="color:#FF4F07;">Unknown command: ${cmd}</span><br>`;
    }
  }
});
</script>

</body>
</html>

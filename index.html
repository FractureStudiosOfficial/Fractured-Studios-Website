<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractured Studios | Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">

<style>
:root{
    --amber:#FF9F07;
    --amberBright:#FFC861;
    --amberDim:#B36700;
    --scanBlack:#0a0603;
}

*{box-sizing:border-box;}

html,body{
    margin:0;
    height:100%;
    background:#000;
    overflow:hidden;
}

body{
    color:var(--amber);
    font-family:'Share Tech Mono', monospace;
    perspective:1400px;
}

/* =========================
   CRT BEZEL (outer plastic case)
========================= */
#bezel{
    position:fixed;
    inset:0;
    background:
        radial-gradient(ellipse at 30% 20%, #3a2a1a 0%, #1a120a 40%, #0a0705 70%, #000 100%);
    z-index:0;
}

#bezel::before{
    /* horizontal plastic seam */
    content:"";
    position:absolute;
    inset:0;
    background:
        repeating-linear-gradient(
            0deg,
            rgba(255,255,255,.015) 0 1px,
            transparent 1px 3px
        );
    pointer-events:none;
}

#bezel-label{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    z-index:5;
    letter-spacing:.35em;
    font-size:11px;
    color:#7a5230;
    text-shadow:0 1px 0 #000;
    font-family:'VT323',monospace;
    user-select:none;
}

#brand-led{
    position:fixed;
    bottom:16px;
    left:calc(50% - 180px);
    width:6px;height:6px;
    border-radius:50%;
    background:var(--amber);
    box-shadow:0 0 6px var(--amber), 0 0 12px #ff6a00;
    animation:led-pulse 2.4s ease-in-out infinite;
    z-index:5;
}

@keyframes led-pulse{
    0%,100%{opacity:.55;}
    50%{opacity:1;}
}

/* =========================
   FISHEYE / CURVED SCREEN
   The .screen wraps everything and bulges outward.
========================= */
#screen-wrap{
    position:fixed;
    inset:22px;
    border-radius:48px / 60px;
    background:#050505;
    box-shadow:
        /* deep bezel rim */
        0 0 0 4px #0a0605,
        0 0 0 8px #1a0f07,
        0 0 0 10px #2a1a0d,
        0 0 40px rgba(0,0,0,.9) inset,
        0 30px 60px rgba(0,0,0,.85);
    overflow:hidden;
    transform-style:preserve-3d;
    isolation:isolate;
}

/* The fisheye bulge is done with a big radial highlight + a
   scaling/warping SVG filter on the content layer.            */
#screen{
    position:absolute;
    inset:0;
    filter:url(#fisheye);
    /* fallback slight scale to imply curvature */
    transform:scale(1.02);
}

/* Curvature highlight — top-left "glare" bulge */
#glare{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1200;
    background:
        radial-gradient(
            ellipse 60% 45% at 28% 18%,
            rgba(255,255,255,.14),
            rgba(255,255,255,.03) 40%,
            transparent 70%
        ),
        radial-gradient(
            ellipse 40% 30% at 78% 82%,
            rgba(255,159,7,.05),
            transparent 70%
        );
    mix-blend-mode:screen;
}

/* Vignette — makes edges darker for the tube feel */
#vignette{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1100;
    background:radial-gradient(
        ellipse 90% 90% at 50% 50%,
        transparent 45%,
        rgba(0,0,0,.35) 75%,
        rgba(0,0,0,.9) 100%
    );
}

/* Corner-darkening masks for the barrel corners */
#corners{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1105;
    background:
        radial-gradient(circle at 0% 0%,rgba(0,0,0,.85) 0,transparent 22%),
        radial-gradient(circle at 100% 0%,rgba(0,0,0,.85) 0,transparent 22%),
        radial-gradient(circle at 0% 100%,rgba(0,0,0,.85) 0,transparent 22%),
        radial-gradient(circle at 100% 100%,rgba(0,0,0,.85) 0,transparent 22%);
}

/* =========================
   MAIN CRT CONTAINER (content that lives inside the tube)
========================= */
#crt-container{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:56px 64px;
    gap:30px;
    transform-style:preserve-3d;
    transition:transform .1s ease-out;
    z-index:2;
}

/* =========================
   PANEL BASE (chunky retro frames)
========================= */
.panel{
    position:relative;
    border:2px solid rgba(255,159,7,.45);
    background:
        linear-gradient(180deg,
            rgba(255,159,7,.05),
            rgba(0,0,0,.35)
        );
    box-shadow:
        inset 0 0 30px rgba(255,159,7,.06),
        inset 0 0 2px rgba(255,200,90,.25),
        0 0 30px rgba(255,159,7,.08);
    border-radius:6px;
}

.panel::before{
    content:"";
    position:absolute;
    inset:8px;
    border:1px dashed rgba(255,159,7,.18);
    pointer-events:none;
    border-radius:3px;
}

/* corner brackets */
.panel::after{
    content:"";
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
        linear-gradient(#FF9F07,#FF9F07) 0 0/14px 2px no-repeat,
        linear-gradient(#FF9F07,#FF9F07) 0 0/2px 14px no-repeat,
        linear-gradient(#FF9F07,#FF9F07) 100% 0/14px 2px no-repeat,
        linear-gradient(#FF9F07,#FF9F07) 100% 0/2px 14px no-repeat,
        linear-gradient(#FF9F07,#FF9F07) 0 100%/14px 2px no-repeat,
        linear-gradient(#FF9F07,#FF9F07) 0 100%/2px 14px no-repeat,
        linear-gradient(#FF9F07,#FF9F07) 100% 100%/14px 2px no-repeat,
        linear-gradient(#FF9F07,#FF9F07) 100% 100%/2px 14px no-repeat;
    opacity:.7;
}

/* =========================
   TERMINAL MODULE
========================= */
#terminal-box{
    width:55%;
    height:calc(100vh - 130px);
    padding:22px;
    display:flex;
    flex-direction:column;
}

#terminal-header{
    border-bottom:1px solid rgba(255,159,7,.3);
    padding-bottom:10px;
    margin-bottom:14px;
    font-size:20px;
    letter-spacing:.28em;
    display:flex;
    justify-content:space-between;
    align-items:center;
    text-shadow:
        0 0 4px rgba(255,159,7,.6),
        0 0 12px rgba(255,140,0,.35);
}

#terminal-header .tag{
    font-size:11px;
    color:var(--amberBright);
    letter-spacing:.2em;
    padding:2px 8px;
    border:1px solid rgba(255,159,7,.4);
    animation:tag-blink 1.8s steps(2) infinite;
}

@keyframes tag-blink{
    50%{opacity:.35;}
}

#terminal{
    flex:1;
    position:relative;
    background:
        repeating-linear-gradient(
            180deg,
            rgba(255,159,7,.02) 0 2px,
            transparent 2px 3px
        ),
        linear-gradient(180deg,
            rgba(255,159,7,.04),
            rgba(0,0,0,.25)
        );
    border:1px solid rgba(255,159,7,.28);
    padding:20px;
    overflow-y:auto;
    min-height:0;
    scrollbar-width:none;
    text-shadow:
        0 0 3px rgba(255,159,7,.7),
        0 0 8px rgba(255,120,0,.35);
    line-height:1.5;
}
#terminal::-webkit-scrollbar{display:none;}

/* Prompt */
#prompt{
    display:flex;
    gap:10px;
    margin-top:14px;
    padding:10px 12px;
    border:1px solid rgba(255,159,7,.28);
    background:rgba(255,159,7,.04);
    align-items:center;
}

#prompt .chev{
    color:var(--amberBright);
    text-shadow:0 0 6px rgba(255,159,7,.7);
    animation:chev 1s steps(2) infinite;
}
@keyframes chev{50%{opacity:.3;}}

#prompt input{
    background:none;
    border:none;
    outline:none;
    color:var(--amber);
    font:inherit;
    flex:1;
    text-shadow:0 0 4px rgba(255,159,7,.6);
    caret-color:var(--amberBright);
}

/* Command Footer */
#available{
    margin-top:14px;
    padding:12px 16px;
    border:1px solid rgba(255,159,7,.22);
    background:rgba(255,159,7,.04);
    opacity:.85;
    font-size:13px;
    letter-spacing:.12em;
    display:flex;
    justify-content:space-between;
    gap:12px;
    flex-wrap:wrap;
}

#available .k{
    color:var(--amberBright);
    text-shadow:0 0 5px rgba(255,159,7,.6);
}

/* =========================
   LOGO DISPLAY MODULE
========================= */
#logo-area{
    width:40%;
    height:calc(100vh - 130px);
    padding:22px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    gap:18px;
}

#logo-area-header{
    font-size:14px;
    letter-spacing:.3em;
    padding-bottom:8px;
    border-bottom:1px solid rgba(255,159,7,.25);
    display:flex;
    justify-content:space-between;
    text-shadow:0 0 4px rgba(255,159,7,.5);
}

#logo-frame{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:20px;
    background:
        radial-gradient(circle at 50% 50%,rgba(255,159,7,.06),transparent 60%),
        repeating-linear-gradient(
            0deg,
            rgba(255,159,7,.03) 0 1px,
            transparent 1px 4px
        );
    border:1px solid rgba(255,159,7,.22);
    overflow:hidden;
}

/* concentric reticle */
#logo-frame::before{
    content:"";
    position:absolute;
    inset:0;
    background:
        radial-gradient(circle,transparent 38%,rgba(255,159,7,.14) 38.5%,transparent 39.5%),
        radial-gradient(circle,transparent 28%,rgba(255,159,7,.1) 28.5%,transparent 29.5%),
        radial-gradient(circle,transparent 18%,rgba(255,159,7,.08) 18.5%,transparent 19.5%);
    pointer-events:none;
    animation:reticle-spin 40s linear infinite;
}

#logo-frame::after{
    /* crosshair */
    content:"";
    position:absolute;
    inset:0;
    background:
        linear-gradient(rgba(255,159,7,.18),rgba(255,159,7,.18)) 50% 0/1px 100% no-repeat,
        linear-gradient(rgba(255,159,7,.18),rgba(255,159,7,.18)) 0 50%/100% 1px no-repeat;
    pointer-events:none;
}

@keyframes reticle-spin{
    to{transform:rotate(360deg);}
}

#logo{
    width:min(320px,80%);
    max-height:70%;
    object-fit:contain;
    position:relative;
    z-index:2;
    filter:
        drop-shadow(0 0 8px rgba(255,159,7,.55))
        drop-shadow(0 0 18px rgba(255,140,0,.35));
    transition:.3s ease;
    animation:logo-float 6s ease-in-out infinite;
}

@keyframes logo-float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-6px);}
}

/* Decorative telemetry bars */
#logo-stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
}

.stat{
    padding:8px 6px;
    border:1px solid rgba(255,159,7,.22);
    background:rgba(255,159,7,.04);
    text-align:center;
    font-size:11px;
    letter-spacing:.14em;
    position:relative;
    overflow:hidden;
}

.stat .bar{
    height:4px;
    margin-top:6px;
    background:rgba(255,159,7,.12);
    position:relative;
    overflow:hidden;
}

.stat .bar::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(90deg,var(--amber),var(--amberBright));
    animation:bar-fill 3.2s ease-in-out infinite alternate;
    box-shadow:0 0 6px rgba(255,159,7,.7);
}

.stat:nth-child(2) .bar::before{animation-duration:2.4s;}
.stat:nth-child(3) .bar::before{animation-duration:4.1s;}

@keyframes bar-fill{
    0%{transform:translateX(-70%);}
    100%{transform:translateX(0%);}
}

/* =========================
   OS LABEL
========================= */
#os{
    position:absolute;
    bottom:16px;
    right:24px;
    font-size:12px;
    opacity:.8;
    z-index:6;
    letter-spacing:.2em;
    text-shadow:0 0 4px rgba(255,159,7,.5);
}

#clock{
    position:absolute;
    bottom:16px;
    left:24px;
    font-size:12px;
    opacity:.8;
    z-index:6;
    letter-spacing:.2em;
    text-shadow:0 0 4px rgba(255,159,7,.5);
}

/* =========================
   CRT EFFECTS
========================= */
#scanlines,
#amber-tint,
#rgb-mask,
#roll{
    position:absolute;
    inset:0;
    pointer-events:none;
}

#scanlines{
    background:repeating-linear-gradient(
        to bottom,
        rgba(0,0,0,.35) 0px,
        rgba(0,0,0,.35) 1px,
        transparent 1px,
        transparent 3px
    );
    animation:flicker .14s infinite;
    z-index:1300;
    mix-blend-mode:multiply;
}

/* fine RGB shadow mask (aperture grille) */
#rgb-mask{
    background:repeating-linear-gradient(
        90deg,
        rgba(255,0,0,.05) 0 1px,
        rgba(0,255,0,.05) 1px 2px,
        rgba(0,0,255,.05) 2px 3px
    );
    z-index:1250;
    mix-blend-mode:overlay;
    opacity:.6;
}

/* Slow rolling horizontal band — a signature 70s effect */
#roll{
    background:linear-gradient(
        180deg,
        transparent 0%,
        transparent 42%,
        rgba(255,255,255,.06) 47%,
        rgba(255,255,255,.10) 50%,
        rgba(255,255,255,.06) 53%,
        transparent 58%,
        transparent 100%
    );
    z-index:1310;
    mix-blend-mode:screen;
    animation:roll 9s linear infinite;
}

@keyframes roll{
    0%{transform:translateY(-100%);}
    100%{transform:translateY(100%);}
}

@keyframes flicker{
    0%{opacity:.55;}
    47%{opacity:.5;}
    50%{opacity:.85;} /* brief global flicker */
    53%{opacity:.5;}
    100%{opacity:.55;}
}

#amber-tint{
    background:
        radial-gradient(ellipse at 50% 50%,
            rgba(255,159,7,.05),
            rgba(255,80,0,.08) 80%);
    z-index:1150;
    mix-blend-mode:screen;
}

/* subtle turn-on flash */
#poweron{
    position:absolute;
    inset:0;
    background:#fff;
    z-index:2000;
    pointer-events:none;
    animation:poweron 1.6s ease-out forwards;
}

@keyframes poweron{
    0%{opacity:0;}
    5%{opacity:.9;}
    10%{opacity:.15;}
    20%{transform:scaleY(.005);opacity:1;background:#fff;}
    25%{transform:scaleY(1);opacity:.6;background:#ffb060;}
    100%{transform:scaleY(1);opacity:0;background:#ffb060;}
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:900px){
    #crt-container{
        flex-direction:column;
        padding:30px 24px;
        overflow-y:auto;
    }
    #terminal-box,
    #logo-area{
        width:100%;
        height:auto;
    }
    #terminal-box{min-height:400px;}
    #logo-frame{min-height:260px;}
    #screen-wrap{inset:12px;border-radius:32px/40px;}
}
</style>
</head>

<body>

<!-- Fisheye SVG filter -->
<svg width="0" height="0" style="position:absolute">
    <defs>
        <filter id="fisheye" x="-5%" y="-5%" width="110%" height="110%">
            <!-- Barrel distortion approximated with displacement map -->
            <feImage
                href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200' viewBox='0 0 200 200'><defs><radialGradient id='g' cx='50%25' cy='50%25' r='50%25'><stop offset='0%25' stop-color='rgb(128,128,128)'/><stop offset='60%25' stop-color='rgb(160,160,128)'/><stop offset='100%25' stop-color='rgb(210,210,128)'/></radialGradient></defs><rect width='200' height='200' fill='url(%23g)'/></svg>"
                result="map" x="0" y="0" width="100%" height="100%" preserveAspectRatio="none"/>
            <feDisplacementMap in="SourceGraphic" in2="map" scale="26" xChannelSelector="R" yChannelSelector="G"/>
        </filter>
    </defs>
</svg>

<div id="bezel"></div>

<div id="screen-wrap">

    <div id="screen">

        <div id="crt-container">

            <!-- TERMINAL -->
            <div id="terminal-box" class="panel">
                <div id="terminal-header">
                    <span>FRACTURED STUDIOS TERMINAL</span>
                    <span class="tag">REC</span>
                </div>
                <div id="terminal"></div>
                <div id="prompt">
                    <span class="chev">&gt;</span>
                    <input id="cmd" autocomplete="off" disabled>
                </div>
                <div id="available">
                    <span>AVAILABLE TERMS</span>
                    <span><span class="k">ABOUT</span> • <span class="k">GAMES</span> • <span class="k">CONTACT</span> • <span class="k">TERMINAL</span></span>
                </div>
            </div>

            <!-- LOGO MODULE -->
            <div id="logo-area" class="panel">
                <div id="logo-area-header">
                    <span>// SIGNAL MONITOR</span>
                    <span id="signal-hz">60.00Hz</span>
                </div>
                <div id="logo-frame">
                    <img id="logo" src="FracturedF-Transparant.png" alt="logo">
                </div>
                <div id="logo-stats">
                    <div class="stat">STATUS: ONLINE<div class="bar"></div></div>
                    <div class="stat">BUILD: PUBLIC<div class="bar"></div></div>
                    <div class="stat">NODE: PRIME<div class="bar"></div></div>
                </div>
            </div>

        </div>

    </div>

    <!-- CRT overlays inside the screen (unwarped) -->
    <div id="amber-tint"></div>
    <div id="rgb-mask"></div>
    <div id="scanlines"></div>
    <div id="roll"></div>
    <div id="corners"></div>
    <div id="vignette"></div>
    <div id="glare"></div>
    <div id="poweron"></div>

    <div id="clock">SYS ::</div>
    <div id="os">UIC OS v1.0.4</div>

</div>

<div id="bezel-label">FRACTURED • MODEL FR-77</div>
<div id="brand-led"></div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const logo = document.getElementById("logo");
const container = document.getElementById("crt-container");
const os = document.getElementById("os");
const clock = document.getElementById("clock");
const hz = document.getElementById("signal-hz");

const commandLogos = {
    about:"Aboutui.png",
    games:"Gamesui.png",
    contact:"Mail-UI.png",
    terminal:"terminal.png"
};

let pendingCommand = null;

/* 3D TILT (parallax) */
document.addEventListener("mousemove", e=>{
    const x = (window.innerWidth/2 - e.clientX)/1200;
    const y = (window.innerHeight/2 - e.clientY)/1200;
    container.style.transform = `rotateX(${y}deg) rotateY(${x}deg) scale(1)`;
});

/* Clock ticker */
function tickClock(){
    const d = new Date();
    const pad = n=>n.toString().padStart(2,"0");
    clock.textContent = `SYS :: ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
    hz.textContent = (59.90 + Math.random()*0.2).toFixed(2)+"Hz";
}
setInterval(tickClock,1000);
tickClock();

/* BOOT TEXT */
const bootLines = [
    'U.I.C. Startup sequence...',
    'Initializing kernel modules...',
    'Loading device drivers...',
    'Verifying memory...',
    'Checking system integrity...',
    'Calibrating display output...',
    'Starting process scheduler...',
    'Startup successful',
    '------------------------------------------------------',
    'Welcome to U.I.C. Systems - Fractured Studios Branch',
    '------------------------------------------------------',
    'please note; The person I commisioned this website from used ai',
    'I am attempting to get a refund for the $200 and to get an actual programmer to make it'
];

const fakeErrors = [
    'ERROR: Memory leak detected',
    'WARNING: Clock desync',
    'ERROR: Bus timeout',
    'ALERT: Unknown device',
    'ERROR: Kernel mismatch'
];

async function boot(){
    for(let line of bootLines){
        const delay = 40 + Math.random()*80;

        if(Math.random() < 0.3){
            const err = fakeErrors[Math.floor(Math.random()*fakeErrors.length)];
            terminal.innerHTML += `<span style="color:#ff6a00">${err}</span><br>`;
            terminal.scrollTop = terminal.scrollHeight;
            await new Promise(r=>setTimeout(r,delay));
        }

        terminal.innerHTML += line + "<br>";
        terminal.scrollTop = terminal.scrollHeight;
        await new Promise(r=>setTimeout(r,delay));
    }

    terminal.innerHTML += "<br>System Ready.<br>";
    terminal.scrollTop = terminal.scrollHeight;

    input.disabled = false;
    input.focus();
}

boot();

/* COMMAND HANDLER */
input.addEventListener("keydown", e=>{
    if(e.key !== "Enter") return;

    const value = input.value.toLowerCase().trim();
    terminal.innerHTML += `&gt; ${value}<br>`;
    input.value = "";

    if(pendingCommand){
        if(value === "y"){
            if(pendingCommand === "terminal"){
                window.location = "terminal.html";
            }else{
                window.location = pendingCommand + ".html";
            }
        }else{
            terminal.innerHTML += "Cancelled.<br>";
            logo.src = "FracturedF-Transparant.png";
        }
        pendingCommand = null;
        terminal.scrollTop = terminal.scrollHeight;
        return;
    }

    if(commandLogos[value]){
        pendingCommand = value;
        logo.src = commandLogos[value];
        terminal.innerHTML += "Confirm? (Y/N)<br>";
    }else{
        terminal.innerHTML += "Unknown command<br>";
    }

    terminal.scrollTop = terminal.scrollHeight;
});
</script>

</body>
</html>

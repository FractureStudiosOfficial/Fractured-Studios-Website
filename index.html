<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Terminal Access</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
    --amber:#ff9f07;
    --amberBright:#ffc861;

    /* ADJUSTABLE CRT SETTINGS */
    --scanline-opacity:.22;
    --flicker-min:.08;
    --flicker-max:.15;
}

*{box-sizing:border-box;}

body{
    margin:0;
    overflow:hidden;
    background:#000;
    color:var(--amber);
    font-family:'Share Tech Mono', monospace;
}

/* =========================
   STARTUP SCREEN
========================= */
#startup{
    position:fixed;
    inset:0;
    background:#000;
    z-index:5000;
    display:flex;
    align-items:center;
    justify-content:center;
}

#crt-open{
    position:absolute;
    width:0;
    height:4px;
    background:var(--amberBright);
    box-shadow:0 0 40px var(--amber);
    animation:crtOpen 1s ease forwards;
}

@keyframes crtOpen{
    0%{width:0;height:4px;}
    35%{width:80%;height:4px;}
    100%{width:80%;height:70%;}
}

#startup-panel{
    opacity:0;
    width:min(900px,80vw);
    height:min(500px,70vh);
    border:2px solid var(--amber);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
    animation:fadeIn .4s ease forwards .8s;
}

@keyframes fadeIn{
    to{opacity:1;}
}

#startup-title{
    font-size:clamp(2.5rem,6vw,5rem);
    letter-spacing:.4em;
    text-shadow:0 0 20px var(--amber);
}

#startup-sub{
    margin-top:20px;
    letter-spacing:.25em;
    opacity:.85;
}

#welcome{
    position:absolute;
    opacity:0;
    font-size:3rem;
    letter-spacing:.4em;
    text-shadow:0 0 20px var(--amber);
}

/* =========================
   TERMINAL
========================= */
#crt-container{
    display:none;
    height:100vh;
    padding:30px;
}

#terminal-frame{
    height:100%;
    border:2px solid var(--amber);
    padding:20px;
    background:#0a0a0a;
    box-shadow:
        inset 0 0 25px rgba(255,159,7,.05),
        0 0 20px rgba(255,159,7,.08);
}

#terminal-header{
    border-bottom:1px solid rgba(255,159,7,.2);
    padding-bottom:10px;
    margin-bottom:15px;
}

#terminal-title{
    font-size:26px;
    letter-spacing:.2em;
}

#terminal-wrapper{
    position:relative;
    height:calc(100% - 100px);
    border:1px solid rgba(255,159,7,.18);
    overflow:hidden;
}

#terminal{
    position:absolute;
    inset:0;
    overflow-y:auto;
    padding:20px 36px 20px 20px;
    scrollbar-width:none;
}
#terminal::-webkit-scrollbar{display:none;}

/* Scrollbar */
#scrollbar-track{
    position:absolute;
    top:0;
    right:0;
    width:18px;
    height:100%;
    border-left:1px solid rgba(255,159,7,.15);
}

#scrollbar-thumb{
    position:absolute;
    left:2px;
    width:14px;
    min-height:50px;
    background:linear-gradient(#ffc861,#ff9f07);
}

/* Prompt */
#prompt{
    display:flex;
    gap:10px;
    margin-top:10px;
}

#cmd{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:var(--amber);
    font:inherit;
}

.cursor{
    animation:blink 1s step-end infinite;
}

@keyframes blink{
    50%{opacity:0;}
}

/* =========================
   CRT FX
========================= */
#scanlines,
#amber{
    position:fixed;
    inset:0;
    pointer-events:none;
}

#scanlines{
    background:
        repeating-linear-gradient(
            to bottom,
            rgba(255,255,255,var(--scanline-opacity)) 0px,
            rgba(255,255,255,var(--scanline-opacity)) 2px,
            transparent 2px,
            transparent 6px
        );
    animation:flicker .12s infinite;
}

@keyframes flicker{
    0%{opacity:var(--flicker-min);}
    50%{opacity:var(--flicker-max);}
    100%{opacity:var(--flicker-min);}
}

#amber{
    background:rgba(255,159,7,.04);
}
</style>
</head>
<body>

<audio id="startupSound" src="startup-placeholder.mp3"></audio>
<audio id="typeSound" src="typing-placeholder.mp3"></audio>

<div id="startup">
    <div id="crt-open"></div>

    <div id="startup-panel">
        <div id="startup-title">U.I.C.</div>
        <div id="startup-sub">UNIVERSAL INTERSTELLAR COMPUTERS</div>
        <div id="welcome">WELCOME</div>
    </div>
</div>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">
    <div id="terminal-frame">

        <div id="terminal-header">
            <div id="terminal-title"></div>
        </div>

        <div id="terminal-wrapper">
            <div id="terminal"></div>

            <div id="scrollbar-track">
                <div id="scrollbar-thumb"></div>
            </div>
        </div>

        <div id="prompt">
            <span>&gt;</span>
            <input id="cmd" disabled autocomplete="off">
        </div>

    </div>
</div>

<script>
/* =========================
   CONFIG
========================= */
const UIC_DISPLAY_TIME = 4000; // HOW LONG UIC STAYS BEFORE WELCOME

/* =========================
   ELEMENTS
========================= */
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const title = document.getElementById("terminal-title");

const startupSound = document.getElementById("startupSound");
const typeSound = document.getElementById("typeSound");

/* =========================
   COMMAND DATABASE
========================= */
const commands = {
    users:{
        sequence:["init","access","grant"],
        page:"users.html"
    },
    classified:{
        sequence:["class","secure","enter","override"],
        page:"classified.html"
    },
    ships:{
        sequence:["fleet","engage","authorize"],
        page:"folder_ships/ships.html"
    }
};

let activeCommand = null;
let stepIndex = 0;
let busy = false;

/* =========================
   TYPE FUNCTIONS
========================= */
async function typeLine(text,speed=18){
    const div = document.createElement("div");
    terminal.appendChild(div);

    for(let char of text){
        div.textContent += char;

        if(typeSound.src){
            typeSound.currentTime = 0;
            typeSound.play().catch(()=>{});
        }

        terminal.scrollTop = terminal.scrollHeight;
        await new Promise(r=>setTimeout(r,speed));
    }
}

async function typeTitle(text){
    title.textContent = "";

    for(let char of text){
        title.textContent += char;
        await new Promise(r=>setTimeout(r,35));
    }
}

/* =========================
   STARTUP SEQUENCE
========================= */
async function startupSequence(){

    startupSound.play().catch(()=>{});

    await new Promise(r=>setTimeout(r,UIC_DISPLAY_TIME));

    document.getElementById("startup-title").style.opacity="0";
    document.getElementById("startup-sub").style.opacity="0";

    const welcome = document.getElementById("welcome");
    welcome.style.opacity="1";

    await new Promise(r=>setTimeout(r,1500));

    document.getElementById("startup").style.opacity="0";

    await new Promise(r=>setTimeout(r,500));

    document.getElementById("startup").remove();

    document.getElementById("crt-container").style.display="block";

    await typeTitle("U.I.C. SYSTEMS TERMINAL ACCESS");

    const bootLines = [
        "Initializing U.I.C. Mainframe...",
        "Loading Security Protocols...",
        "Authenticating Terminal Node...",
        "Verifying User Clearance...",
        "System Online",
        "---------------------------",
        "",
        "SYSTEM READY."
    ];

    for(const line of bootLines){
        await typeLine(line);
    }

    input.disabled = false;
    input.focus();
}

/* =========================
   COMMAND HANDLER
========================= */
input.addEventListener("keydown", async (e)=>{
    if(e.key !== "Enter" || busy) return;

    e.preventDefault();

    const value = input.value.trim().toLowerCase();
    if(!value) return;

    busy = true;
    input.value = "";

    await typeLine("> " + value,10);

    if(!activeCommand){

        let found = false;

        for(const key in commands){

            if(value === commands[key].sequence[0]){

                activeCommand = key;
                stepIndex = 1;

                await typeLine(`STEP 1/${commands[key].sequence.length} ACCEPTED`);
                found = true;
                break;
            }
        }

        if(!found){
            await typeLine("UNKNOWN COMMAND");
        }

    }else{

        const cmd = commands[activeCommand];

        if(value === cmd.sequence[stepIndex]){

            stepIndex++;

            if(stepIndex >= cmd.sequence.length){

                await typeLine(`${activeCommand.toUpperCase()} ACCESS GRANTED`);
                await typeLine("REDIRECTING...");

                setTimeout(()=>{
                    window.location.href = cmd.page;
                },700);

                activeCommand = null;
                stepIndex = 0;

            }else{

                await typeLine(`STEP ${stepIndex}/${cmd.sequence.length} ACCEPTED`);
            }

        }else{

            await typeLine("INVALID SEQUENCE — RESET");
            activeCommand = null;
            stepIndex = 0;
        }
    }

    busy = false;
    input.focus();
});

/* =========================
   INIT
========================= */
startupSequence();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fractured Studios</title>

<!-- Retro Font -->
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>

  .logo {
  max-width: 300px;
  width: 80%;
  opacity: 0;
  transform: scale(0.8);
  filter: drop-shadow(0 0 10px #FF9F07);
  animation: logoReveal 1.5s ease forwards;
}

@keyframes logoReveal {
  0% {
    opacity: 0;
    transform: scale(0.7);
  }
  60% {
    opacity: 1;
    transform: scale(1.05);
  }
  100% {
    transform: scale(1);
  }
}

  /* ===== CRT EFFECTS ===== */

/* CRT Curvature */
.crt {
  position: relative;
  overflow: hidden;
}

.crt::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;

  /* Stronger edge darkening = more curve illusion */
  background: radial-gradient(
    ellipse at center,
    transparent 45%,
    rgba(0,0,0,0.35) 75%,
    rgba(0,0,0,0.6) 100%
  );
}

  .crt {
  position: relative;
  transform: perspective(800px) scale(1.01);
}

/* subtle warp illusion */
.crt::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;

  background: radial-gradient(
    ellipse at center,
    transparent 60%,
    rgba(0,0,0,0.15)
  );

  mix-blend-mode: multiply;
}
  body {
  text-shadow:
    0 0 2px #FF9F07,
    0 0 4px rgba(255,159,7,0.8),
    0 0 6px rgba(255,159,7,0.6);
}

  .phosphor {
  position: relative;
}

.phosphor::before,
.phosphor::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  top: 0;
  opacity: 0.3;
}

.phosphor::before {
  color: red;
  transform: translate(1px, 0);
}

.phosphor::after {
  color: lime;
  transform: translate(-1px, 0);
}

/* Glow */
.crt::after {
  content: "";
  position: absolute;
  inset: 0;
  box-shadow: inset 0 0 60px rgba(255, 159, 7, 0.15);
  pointer-events: none;
  z-index: 2;
}

@keyframes flicker {
  0% { opacity: 1; }
  97% { opacity: 1; }
  98% { opacity: 0.97; }
  99% { opacity: 0.94; }
  100% { opacity: 1; }
}

.flicker {
  animation: flicker 0.15s infinite;
}
  
/* Base */
body {
  margin: 0;
  background-color: #0d0d0d;
  color: #FF9F07;
  font-family: 'Share Tech Mono', monospace;
}

/* Scanline Overlay */
.scanlines {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 9999;

  background: repeating-linear-gradient(
    to bottom,
    rgba(255, 159, 7, 0.05) 0px,
    rgba(255, 159, 7, 0.05) 1px,
    transparent 2px,
    transparent 4px
  );
}

/* Keep content under scanlines */
#terminal, #enterBtn, #homepage {
  position: relative;
  z-index: 1;
}

/* Terminal */
#terminal {
  padding: 40px;
  white-space: pre-wrap;
  font-size: 18px;
}

/* ENTER button */
#enterBtn {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: transparent;
  border: 2px solid #FF9F07;
  color: #FF9F07;
  padding: 15px 30px;
  font-size: 20px;
  cursor: pointer;
}

#enterBtn:hover {
  background: #FF9F07;
  color: #0d0d0d;
}

/* Homepage */
#homepage {
  display: none;
}

/* Center logo section */
.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* Logo */
.logo {
  max-width: 300px;
  width: 80%;
  filter: drop-shadow(0 0 10px #FF9F07);
}

/* Scroll content */
.content {
  padding: 60px 20px;
  max-width: 900px;
  margin: auto;
}

h1 {
  font-size: 32px;
}

</style>
</head>

<body>
  
<div class="crt flicker">

  <!-- EVERYTHING goes inside here -->

</div>

<div class="scanlines"></div>
<!-- Terminal -->
<div id="terminal"></div>

<!-- Enter Button -->
<button id="enterBtn">ENTER</button>

<div class="content">
  <p>> type a command:</p>
  <p>> games</p>
  <p>> about</p>
  <p>> home</p>

  <br>

  <input id="commandInput" autofocus placeholder="> enter command..." style="background:none;border:none;color:#FF9F07;font-family:inherit;font-size:18px;outline:none;">
</div>
  
  <!-- Center Logo -->
  <section class="hero">
    <!-- 🔥 Replace with your own logo file -->
    <img src="FracturedF-Transparant.png" class="logo">
  </section>

  <!-- Scroll Content -->
  <section class="content">
    <h1>Welcome to Fractured Studios</h1>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>

    <h1>Our Games</h1>
    <p>More placeholder content...</p>
    <h1>Our Games</h1>
<p><a href="games.html">View Games →</a></p>

    <h1>About</h1>
    <p>Even more placeholder text...</p>
  </section>

</div>

<!-- 🔊 Sound -->
<audio id="enterSound" src="enter.mp3"></audio>

<!-- Scanlines Overlay -->
<div class="scanlines"></div>

<script>

const terminal = document.getElementById("terminal");
const enterBtn = document.getElementById("enterBtn");
const homepage = document.getElementById("homepage");
const enterSound = document.getElementById("enterSound");

const text = `
Booting system...
Initializing modules...
Loading assets...
Connecting to server...
Access granted...

Welcome user, enter Fractured Studios...
`;

let i = 0;

function typeEffect() {
  if (i < text.length) {
    terminal.textContent += text.charAt(i);
    i++;
    setTimeout(typeEffect, 25);
  } else {
    setTimeout(showEnter, 800);
  }
}

function showEnter() {
  terminal.style.transition = "opacity 1s";
  terminal.style.opacity = 0;

  setTimeout(() => {
    terminal.style.display = "none";
    enterBtn.style.display = "block";
  }, 1000);
}

enterBtn.addEventListener("click", () => {
  enterSound.play();
  enterBtn.style.display = "none";
  homepage.style.display = "block";
  document.body.style.overflow = "auto";
});

/* Start locked (no scroll during boot) */
document.body.style.overflow = "hidden";

window.onload = typeEffect;


  
</script>

  
  
</body>

  <body>

  <!-- Your content -->
  <div id="terminal"></div>
  <button id="enterBtn">ENTER</button>
  <div id="homepage">
    <section class="hero">
      <img src="logo.png" class="logo">
    </section>
    <section class="content">
      <h1 class="phosphor" data-text="Welcome">Welcome</h1>
      <p>> type a command:</p>
      <input id="commandInput" placeholder="> enter command...">
    </section>
  </div>

  <!-- Scanlines Overlay -->
  <div class="scanlines"></div>

  <!-- Scripts go here, just before closing body -->
  <script>
    // Terminal typing + boot sounds
    const terminal = document.getElementById("terminal");
    const enterBtn = document.getElementById("enterBtn");
    const homepage = document.getElementById("homepage");
    const enterSound = document.getElementById("enterSound");
    const boot1 = document.getElementById("boot1");
    const boot2 = document.getElementById("boot2");
    const hum = document.getElementById("hum");

    const text = `
Booting system...
Initializing modules...
Loading assets...
Connecting to server...
Access granted...
Lorem ipsum...
`;

    let i = 0;

    function typeEffect() {
      if (i === 0) boot1.play();
      if (i < text.length) {
        terminal.textContent += text.charAt(i);
        i++;
        if (i === 20) boot2.play();
        setTimeout(typeEffect, 25);
      } else {
        hum.play();
        setTimeout(showEnter, 800);
      }
    }

    function showEnter() {
      terminal.style.transition = "opacity 1s";
      terminal.style.opacity = 0;
      setTimeout(() => {
        terminal.style.display = "none";
        enterBtn.style.display = "block";
      }, 1000);
    }

    enterBtn.addEventListener("click", () => {
      enterSound.play();
      enterBtn.style.display = "none";
      homepage.style.display = "block";
      document.body.style.overflow = "auto";
    });

    // Terminal command navigation
    const input = document.getElementById("commandInput");
    input.addEventListener("keydown", function(e) {
      if (e.key === "Enter") {
        const cmd = input.value.toLowerCase();
        if (cmd === "games") window.location.href = "games.html";
        else if (cmd === "home") window.location.href = "index.html";
        else if (cmd === "about") alert("About page coming soon...");
        else alert("Unknown command");
        input.value = "";
      }
    });

    // Prevent scroll during boot
    document.body.style.overflow = "hidden";

    window.onload = typeEffect;
  </script>

</body>
</html>

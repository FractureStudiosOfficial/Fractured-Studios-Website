<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fractured Studios | Terminal</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
    --amber:#FF9F07;
    --amberBright:#FFC861;
}

*{box-sizing:border-box;}

body{
    margin:0;
    background:#050505;
    color:var(--amber);
    font-family:'Share Tech Mono', monospace;
    overflow:hidden;
    perspective:1000px;
}

/* =========================
   MAIN CRT CONTAINER
========================= */
#crt-container{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:40px;
    gap:30px;
    transform-style:preserve-3d;
    transition:transform .08s ease-out;
}

/* =========================
   PANEL BASE
========================= */
.panel{
    position:relative;
    border:2px solid rgba(255,159,7,.35);
    background:
        linear-gradient(
            180deg,
            rgba(255,159,7,.035),
            rgba(0,0,0,.25)
        );
    box-shadow:
        inset 0 0 25px rgba(255,159,7,.03),
        0 0 25px rgba(255,159,7,.04);
}

.panel::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid rgba(255,159,7,.12);
    pointer-events:none;
}

/* =========================
   TERMINAL MODULE
========================= */
#terminal-box{
    width:55%;
    height:80vh;
    padding:20px;
    display:flex;
    flex-direction:column;
}

#terminal-header{
    border-bottom:1px solid rgba(255,159,7,.18);
    padding-bottom:10px;
    margin-bottom:15px;
    font-size:20px;
    letter-spacing:.2em;
}

#terminal{
    flex:1;
    position:relative;
    background:
        linear-gradient(
            180deg,
            rgba(255,159,7,.025),
            rgba(0,0,0,.18)
        );
    border:1px solid rgba(255,159,7,.18);
    padding:20px;
    overflow-y:auto;
    min-height:0;
    scrollbar-width:none;
}
#terminal::-webkit-scrollbar{display:none;}

/* Prompt */
#prompt{
    display:flex;
    gap:10px;
    margin-top:15px;
    padding-top:10px;
    border-top:1px solid rgba(255,159,7,.12);
}

#prompt input{
    background:none;
    border:none;
    outline:none;
    color:var(--amber);
    font:inherit;
    flex:1;
}

/* Command Footer */
#available{
    margin-top:15px;
    padding:12px 16px;
    border:1px solid rgba(255,159,7,.12);
    background:rgba(255,159,7,.03);
    opacity:.75;
    font-size:14px;
    letter-spacing:.08em;
}

/* =========================
   LOGO DISPLAY MODULE
========================= */
#logo-area{
    width:40%;
    height:80vh;
    padding:20px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:20px;
}

#logo-frame{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:40px;
}

#logo-frame::before,
#logo-frame::after{
    content:"";
    position:absolute;
    border:1px solid rgba(255,159,7,.14);
    inset:18px;
}

#logo{
    width:min(320px,80%);
    max-height:70%;
    object-fit:contain;
    filter:
        drop-shadow(0 0 14px rgba(255,159,7,.35));
    transition:.3s ease;
}

/* Decorative telemetry bars */
#logo-stats{
    width:100%;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.stat{
    padding:10px;
    border:1px solid rgba(255,159,7,.14);
    background:rgba(255,159,7,.025);
    text-align:center;
    font-size:12px;
    opacity:.7;
}

/* =========================
   OS LABEL
========================= */
#os{
    position:fixed;
    bottom:10px;
    right:15px;
    font-size:12px;
    opacity:.7;
    z-index:10;
}

/* =========================
   CRT EFFECTS
========================= */
#scanlines,
#amber{
    position:fixed;
    inset:0;
    pointer-events:none;
}

#scanlines{
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05) 0px,
        rgba(255,255,255,.05) 2px,
        transparent 2px,
        transparent 7px
    );
    animation:flicker .12s infinite;
    z-index:1001;
}

@keyframes flicker{
    0%{opacity:.14;}
    50%{opacity:.08;}
    100%{opacity:.14;}
}

#amber{
    background:rgba(255,159,7,.04);
    z-index:1000;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:900px){
    #crt-container{
        flex-direction:column;
        padding:20px;
        overflow-y:auto;
    }

    #terminal-box,
    #logo-area{
        width:100%;
        height:auto;
    }

    #terminal-box{
        min-height:400px;
    }

    #logo-frame{
        min-height:300px;
    }
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">

    <!-- TERMINAL -->
    <div id="terminal-box" class="panel">

        <div id="terminal-header">
            FRACTURED STUDIOS TERMINAL
        </div>

        <div id="terminal"></div>

        <div id="prompt">
            <span>&gt;</span>
            <input id="cmd" autocomplete="off" disabled>
        </div>

        <div id="available">
            AVAILABLE TERMS :: ABOUT • GAMES • CONTACT • TERMINAL
        </div>

    </div>

    <!-- LOGO MODULE -->
    <div id="logo-area" class="panel">

        <div id="logo-frame">
            <img id="logo" src="FracturedF-Transparant.png">
        </div>

        <div id="logo-stats">
            <div class="stat">STATUS: ONLINE</div>
            <div class="stat">BUILD: PUBLIC</div>
            <div class="stat">NODE: PRIME</div>
        </div>

    </div>

</div>

<div id="os">UIC OS v1.0.4</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const logo = document.getElementById("logo");
const container = document.getElementById("crt-container");
const os = document.getElementById("os");

const commandLogos = {
    about:"Aboutui.png",
    games:"Gamesui.png",
    contact:"Mail-UI.png",
    terminal:"terminal.png"
};

let pendingCommand = null;

/* 3D TILT */
document.addEventListener("mousemove", e=>{
    const x = (window.innerWidth/2 - e.clientX)/1000;
    const y = (window.innerHeight/2 - e.clientY)/1000;

    container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
    os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});

/* BOOT TEXT */
const bootLines = [
    'U.I.C. Startup sequence...',
    'Initializing kernel modules...',
    'Loading device drivers...',
    'Verifying memory...',
    'Checking system integrity...',
    'Calibrating display output...',
    'Starting process scheduler...',
    'Startup successful',
    '------------------------',
    'Welcome to U.I.C. Systems',
    '------------------------'
];

const fakeErrors = [
    'ERROR: Memory leak detected',
    'WARNING: Clock desync',
    'ERROR: Bus timeout',
    'ALERT: Unknown device',
    'ERROR: Kernel mismatch'
];

async function boot(){
    for(let line of bootLines){

        const delay = 40 + Math.random()*80;

        if(Math.random() < 0.3){
            const err = fakeErrors[Math.floor(Math.random()*fakeErrors.length)];
            terminal.innerHTML += `<span style="color:#ff6a00">${err}</span><br>`;
            terminal.scrollTop = terminal.scrollHeight;
            await new Promise(r=>setTimeout(r,delay));
        }

        terminal.innerHTML += line + "<br>";
        terminal.scrollTop = terminal.scrollHeight;

        await new Promise(r=>setTimeout(r,delay));
    }

    terminal.innerHTML += "<br>System Ready.<br>";
    terminal.scrollTop = terminal.scrollHeight;

    input.disabled = false;
    input.focus();
}

boot();

/* COMMAND HANDLER */
input.addEventListener("keydown", e=>{
    if(e.key !== "Enter") return;

    const value = input.value.toLowerCase().trim();

    terminal.innerHTML += `&gt; ${value}<br>`;
    input.value = "";

    if(pendingCommand){

        if(value === "y"){
            if(pendingCommand === "terminal"){
                window.location = "terminal.html";
            }else{
                window.location = pendingCommand + ".html";
            }
        }else{
            terminal.innerHTML += "Cancelled.<br>";
            logo.src = "FracturedF-Transparant.png";
        }

        pendingCommand = null;
        terminal.scrollTop = terminal.scrollHeight;
        return;
    }

    if(commandLogos[value]){
        pendingCommand = value;
        logo.src = commandLogos[value];
        terminal.innerHTML += "Confirm? (Y/N)<br>";
    }else{
        terminal.innerHTML += "Unknown command<br>";
    }

    terminal.scrollTop = terminal.scrollHeight;
});
</script>

</body>
</html>

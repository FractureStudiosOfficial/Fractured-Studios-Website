<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Studio</title>

<!-- Retro Font -->
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* ------------------ CSS ------------------ */
body {
  margin: 0;
  background-color: #0d0d0d;
  color: #FF9F07;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden; /* lock scrolling until boot finishes */
}

/* Scanlines overlay */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,159,7,0.05) 0px,
    rgba(255,159,7,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
}

/* CRT + flicker + curve + glow */
.crt {
  position: relative;
  transform: perspective(800px) scale(1.01);
}

.crt::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  /* stronger curve */
  background: radial-gradient(
    ellipse at center,
    transparent 45%,
    rgba(0,0,0,0.35) 75%,
    rgba(0,0,0,0.6) 100%
  );
}

.crt::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 2;
  background: radial-gradient(
    ellipse at center,
    transparent 60%,
    rgba(0,0,0,0.15)
  );
  box-shadow: inset 0 0 60px rgba(255,159,7,0.15);
}

@keyframes flicker {
  0% { opacity: 1; }
  97% { opacity: 1; }
  98% { opacity: 0.97; }
  99% { opacity: 0.94; }
  100% { opacity: 1; }
}

.flicker {
  animation: flicker 0.15s infinite;
}

/* Terminal text */
#terminal {
  padding: 40px;
  white-space: pre-wrap;
  font-size: 18px;
  position: relative;
  z-index: 1;
}

/* ENTER button */
#enterBtn {
  display: none;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: transparent;
  border: 2px solid #FF9F07;
  color: #FF9F07;
  padding: 15px 30px;
  font-size: 20px;
  cursor: pointer;
  z-index: 1;
}

#enterBtn:hover {
  background: #FF9F07;
  color: #0d0d0d;
}

/* Homepage content */
#homepage {
  display: none;
  position: relative;
  z-index: 1;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.logo {
  max-width: 300px;
  width: 80%;
  opacity: 0;
  transform: scale(0.8);
  filter: drop-shadow(0 0 10px #FF9F07);
  animation: logoReveal 1.5s ease forwards;
}

@keyframes logoReveal {
  0% { opacity: 0; transform: scale(0.7); }
  60% { opacity: 1; transform: scale(1.05); }
  100% { transform: scale(1); }
}

.content {
  padding: 60px;
  max-width: 900px;
  margin: auto;
}

.phosphor {
  position: relative;
  text-shadow:
    0 0 2px #FF9F07,
    0 0 4px rgba(255,159,7,0.8),
    0 0 6px rgba(255,159,7,0.6);
}
</style>
</head>

<body>

<div class="crt flicker">

  <!-- Terminal screen -->
  <div id="terminal"></div>

  <!-- ENTER button -->
  <button id="enterBtn">ENTER</button>

  <!-- Homepage -->
  <div id="homepage">

    <!-- Centered Logo -->
    <section class="hero">
      <img src="logo.png" class="logo">
    </section>

    <!-- Scrollable content -->
    <section class="content">
      <h1 class="phosphor" data-text="Welcome">Welcome</h1>
      <p>> type a command:</p>
      <input id="commandInput" placeholder="> enter command..." style="background:none;border:none;color:#FF9F07;font-family:inherit;font-size:18px;outline:none;">

      <p>Navigation commands: <strong>games</strong>, <strong>home</strong>, <strong>about</strong></p>
    </section>

  </div>

</div>

<!-- Scanlines overlay -->
<div class="scanlines"></div>

<!-- 🔊 Sounds -->
<audio id="enterSound" src="enter.mp3"></audio>
<audio id="boot1" src="boot1.mp3"></audio>
<audio id="boot2" src="boot2.mp3"></audio>
<audio id="hum" src="hum.mp3" loop></audio>

<!-- ------------------ JAVASCRIPT ------------------ -->
<!-- This is EXACTLY where your JS goes -->
<script>
const terminal = document.getElementById("terminal");
const enterBtn = document.getElementById("enterBtn");
const homepage = document.getElementById("homepage");
const enterSound = document.getElementById("enterSound");
const boot1 = document.getElementById("boot1");
const boot2 = document.getElementById("boot2");
const hum = document.getElementById("hum");
const input = document.getElementById("commandInput");

const text = `
Booting system...
Initializing modules...
Loading assets...
Connecting to server...
Access granted...
Lorem ipsum...
`;

let i = 0;

// Typing effect + boot sounds
function typeEffect() {
  if (i === 0) boot1.play();
  if (i < text.length) {
    terminal.textContent += text.charAt(i);
    i++;
    if (i === 20) boot2.play();
    setTimeout(typeEffect, 25);
  } else {
    hum.play();
    setTimeout(showEnter, 800);
  }
}

// Show ENTER button after boot
function showEnter() {
  terminal.style.transition = "opacity 1s";
  terminal.style.opacity = 0;
  setTimeout(() => {
    terminal.style.display = "none";
    enterBtn.style.display = "block";
  }, 1000);
}

// Click ENTER → show homepage
enterBtn.addEventListener("click", () => {
  enterSound.play();
  enterBtn.style.display = "none";
  homepage.style.display = "block";
  document.body.style.overflow = "auto";
});

// Fake terminal commands
input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const cmd = input.value.toLowerCase();
    if (cmd === "games") window.location.href = "games.html";
    else if (cmd === "home") window.location.href = "index.html";
    else if (cmd === "about") alert("About page coming soon...");
    else alert("Unknown command");
    input.value = "";
  }
});

// Start typing on load
window.onload = typeEffect;
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fractured Studios</title>

<!-- Terminal font -->
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* ==================== Base ==================== */
html, body {
  margin: 0;
  height: 100%;
  background: #0d0d0d;
  font-family: 'Share Tech Mono', monospace;
  overflow: hidden;
  color: #FF9F07;
  cursor: none;
}

/* ==================== Full-screen Boot ==================== */
#bootScreen {
  position: fixed;
  inset: 0;
  background: #FF9F07;
  color: #0d0d0d;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-size: 20px;
  white-space: pre-wrap;
  text-align: center;
  z-index: 100;
}

/* ==================== ENTER button ==================== */
#enterBtn {
  display: none;
  margin-top: 40px;
  padding: 15px 40px;
  font-size: 22px;
  border: 2px solid #0d0d0d;
  background: transparent;
  color: #0d0d0d;
  cursor: pointer;
}
#enterBtn:hover {
  background: #0d0d0d;
  color: #FF9F07;
}

/* ==================== CRT + Flicker + Scanlines ==================== */
#crtContainer {
  position: relative;
  transform: perspective(900px) scale(1.01);
  animation: flicker 0.15s infinite;
}

#crtContainer::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.35) 70%, rgba(0,0,0,0.6) 100%);
  z-index: 2;
}

#crtContainer::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.15));
  box-shadow: inset 0 0 60px rgba(255,159,7,0.15);
  z-index: 2;
}

@keyframes flicker {
  0% { opacity: 1; }
  97% { opacity: 1; }
  98% { opacity: 0.97; }
  99% { opacity: 0.94; }
  100% { opacity: 1; }
}

.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,159,7,0.05) 0px,
    rgba(255,159,7,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
  animation: scanlineMove 1s linear infinite;
  z-index: 10;
}

@keyframes scanlineMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 4px; }
}

/* ==================== Homepage ==================== */
#homepage {
  display: none;
  overflow: auto;
}

.hero {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.logo {
  max-width: 300px;
  width: 80%;
  opacity: 0;
  transform: scale(0.8);
  filter: drop-shadow(0 0 10px #FF9F07);
  animation: logoReveal 1.5s ease forwards;
}

@keyframes logoReveal {
  0% { opacity: 0; transform: scale(0.7); }
  60% { opacity: 1; transform: scale(1.05); }
  100% { transform: scale(1); }
}

.content {
  padding: 60px;
  max-width: 900px;
  margin: auto;
}

.phosphor {
  text-shadow: 0 0 2px #FF9F07, 0 0 4px rgba(255,159,7,0.8), 0 0 6px rgba(255,159,7,0.6);
}

/* Terminal input */
#commandInput {
  background:none;
  border:none;
  color:#FF9F07;
  font-family:inherit;
  font-size:18px;
  outline:none;
  width: 100%;
  max-width: 500px;
}

/* ==================== Degauss ==================== */
@keyframes degauss {
  0% { filter: hue-rotate(0deg) blur(0px); }
  25% { filter: hue-rotate(180deg) blur(2px); }
  50% { filter: hue-rotate(360deg) blur(4px); }
  75% { filter: hue-rotate(180deg) blur(2px); }
  100% { filter: hue-rotate(0deg) blur(0px); }
}
.degauss {
  animation: degauss 0.8s ease forwards;
}
</style>
</head>
<body>

<!-- Boot Screen -->
<div id="bootScreen" class="degauss">
  <div id="bootText"></div>
  <button id="enterBtn">ENTER</button>
</div>

<!-- CRT Container / Homepage -->
<div id="crtContainer">
  <div id="homepage">
    <section class="hero">
      <img src="FracturedF-Transparant.png" class="logo">
    </section>
    <section class="content">
      <h1 class="phosphor">Welcome to Game Studio</h1>
      <p>> Type a command:</p>
      <input id="commandInput" placeholder="> enter command...">
      <p>Commands: <strong>home</strong>, <strong>games</strong>, <strong>about</strong>, <strong>contact</strong></p>
    </section>
  </div>
</div>

<div class="scanlines"></div>

<!-- Sounds -->
<audio id="enterSound" src="enter.mp3"></audio>
<audio id="boot1" src="boot1.mp3"></audio>
<audio id="boot2" src="boot2.mp3"></audio>
<audio id="hum" src="hum.mp3" loop></audio>
<audio id="typeChar" src="type.mp3"></audio>

<script>
const bootScreen = document.getElementById("bootScreen");
const bootText = document.getElementById("bootText");
const enterBtn = document.getElementById("enterBtn");
const homepage = document.getElementById("homepage");
const crtContainer = document.getElementById("crtContainer");

const enterSound = document.getElementById("enterSound");
const boot1 = document.getElementById("boot1");
const boot2 = document.getElementById("boot2");
const hum = document.getElementById("hum");
const typeChar = document.getElementById("typeChar");

const input = document.getElementById("commandInput");

const bootMessages = [
  "Booting system...",
  "Initializing modules...",
  "Loading assets...",
  "Connecting to server...",
  "Access granted..."
];

const errorMessages = [
  "ERROR: Module X failed to load",
  "WARNING: Network delay detected",
  "ERROR: Asset missing, skipping",
  "WARNING: Low memory"
];

let terminalText = bootMessages.map(line => {
  if(Math.random() < 0.2){
    return line + " " + errorMessages[Math.floor(Math.random()*errorMessages.length)];
  }
  return line;
}).join("\n") + "\n";

let i = 0;

// Boot typing effect
function typeBoot(){
  if(i === 0) boot1.play();
  if(i < terminalText.length){
    bootText.textContent += terminalText.charAt(i);
    typeChar.currentTime = 0; typeChar.play();
    i++;
    if(i === 20) boot2.play();
    setTimeout(typeBoot, 25);
  } else {
    hum.play();
    enterBtn.style.display = "block";
  }
}

typeBoot();

// ENTER button
enterBtn.addEventListener("click", ()=>{
  enterSound.play();
  bootScreen.style.display = "none";
  homepage.style.display = "block";
  document.body.style.overflow = "auto";
});

// Terminal commands
input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    const cmd = input.value.toLowerCase().trim();
    if(cmd==="home") window.location.href="index.html";
    else if(cmd==="games") window.location.href="games.html";
    else if(cmd==="about") window.location.href="about.html";
    else if(cmd==="contact") window.location.href="contact.html";
    else alert("Unknown command: " + cmd);
    input.value="";
  }
});

// Mouse distortion
document.addEventListener("mousemove", function(e){
  const moveX = (e.clientX - window.innerWidth/2)/100;
  const moveY = (e.clientY - window.innerHeight/2)/100;
  crtContainer.style.transform = `perspective(900px) scale(1.01) rotateX(${moveY}deg) rotateY(${moveX}deg)`;
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signal Intercept System</title>
<style>
body {
  margin:0;
  background:black;
  color:#00ffcc;
  font-family:monospace;
  display:flex;
  height:100vh;
}
.container { display:flex; width:100%; }
.terminal {
  width:40%;
  border-right:1px solid #00ffcc;
  display:flex;
  flex-direction:column;
}
.output {
  flex:1;
  overflow-y:auto;
  padding:15px;
}
.output::-webkit-scrollbar { width:8px; }
.output::-webkit-scrollbar-thumb { background:#00ffcc; }
input {
  border:none;
  border-top:1px solid #00ffcc;
  background:black;
  color:#00ffcc;
  padding:10px;
  font-family:monospace;
  font-size:16px;
}
.canvasBox {
  width:60%;
  display:flex;
  justify-content:center;
  align-items:center;
}
canvas {
  width:90%;
  height:70%;
  border:1px solid #00ffcc;
}
.error { color:red; }
.success { color:#00ffaa; }
.hint { color:#ffaa00; }
</style>
</head>
<body>

<div class="container">
  <div class="terminal">
    <div class="output" id="output"></div>
    <input id="input" placeholder="Enter command...">
  </div>
  <div class="canvasBox">
    <canvas id="scope"></canvas>
  </div>
</div>

<script>
const out = document.getElementById("output");
const input = document.getElementById("input");
const canvas = document.getElementById("scope");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 400;

let state = {
  amplitude: 50,
  frequency: 50,
  phase: 0,
  target: {
    amplitude: 72,
    frequency: 38,
    phase: 60
  },
  locked: false
};

let sweepX = 0;

function log(text, cls=""){
  const d=document.createElement("div");
  d.textContent=text;
  if(cls) d.className=cls;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

function drawGrid(){
  ctx.strokeStyle = "rgba(0,255,200,0.08)";
  ctx.lineWidth = 1;

  let spacing = 50;

  for(let x=0;x<canvas.width;x+=spacing){
    ctx.beginPath();
    ctx.moveTo(x,0);
    ctx.lineTo(x,canvas.height);
    ctx.stroke();
  }

  for(let y=0;y<canvas.height;y+=spacing){
    ctx.beginPath();
    ctx.moveTo(0,y);
    ctx.lineTo(canvas.width,y);
    ctx.stroke();
  }
}

function drawWave(){
  // CRT fade (phosphor decay)
  ctx.fillStyle = "rgba(0,0,0,0.12)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  drawGrid();

  let amp = state.amplitude/100 * 150;
  let freq = state.frequency/100 * 0.1;
  let phase = state.phase/100 * Math.PI * 2;

  ctx.beginPath();

  for(let x = 0; x < canvas.width; x++){
    let t = (x + sweepX) * freq;
    let y = canvas.height/2 + Math.sin(t + phase) * amp;

    if(x === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  // main bright line
  ctx.strokeStyle = "#00ffcc";
  ctx.lineWidth = 2;
  ctx.stroke();

  // glow pass (phosphor bleed)
  ctx.strokeStyle = "rgba(0,255,200,0.2)";
  ctx.lineWidth = 6;
  ctx.stroke();

  // sweep beam
  ctx.beginPath();
  ctx.moveTo(sweepX, 0);
  ctx.lineTo(sweepX, canvas.height);
  ctx.strokeStyle = "rgba(0,255,200,0.25)";
  ctx.lineWidth = 2;
  ctx.stroke();

  sweepX += 3;
  if(sweepX > canvas.width) sweepX = 0;
}

function checkLock(){
  let a = Math.abs(state.amplitude - state.target.amplitude);
  let f = Math.abs(state.frequency - state.target.frequency);
  let p = Math.abs(state.phase - state.target.phase);

  if(a < 3 && f < 3 && p < 3){
    if(!state.locked){
      state.locked = true;
      log("> SIGNAL LOCK ACHIEVED","success");
    }
  }
}

function scanHints(){
  let aDiff = state.amplitude - state.target.amplitude;
  let fDiff = state.frequency - state.target.frequency;
  let pDiff = state.phase - state.target.phase;

  function hint(label, diff){
    if(Math.abs(diff) < 3) return `${label}: STABLE`;
    if(Math.abs(diff) < 10) return `${label}: CLOSE`;
    return diff > 0 ? `${label}: TOO HIGH` : `${label}: TOO LOW`;
  }

  log("> SCANNING SIGNAL...","hint");
  log("> " + hint("AMP", aDiff),"hint");
  log("> " + hint("FREQ", fDiff),"hint");
  log("> " + hint("PHASE", pDiff),"hint");
}

function handle(cmd){
  log("> " + cmd);

  let parts = cmd.split(" ");

  if(parts[0] === "AMP"){
    state.amplitude = Number(parts[1]);
    log("> amplitude set to " + state.amplitude);
  }
  else if(parts[0] === "FREQ"){
    state.frequency = Number(parts[1]);
    log("> frequency set to " + state.frequency);
  }
  else if(parts[0] === "PHASE"){
    state.phase = Number(parts[1]);
    log("> phase set to " + state.phase);
  }
  else if(cmd === "STATUS"){
    log(`> AMP:${state.amplitude} FREQ:${state.frequency} PHASE:${state.phase}`);
  }
  else if(cmd === "SCAN"){
    scanHints();
  }
  else if(cmd === "LOCK" && state.locked){
    log("> CHANNEL OPENED","success");
  }
  else{
    log("> UNKNOWN COMMAND","error");
  }

  checkLock();
}

input.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    handle(input.value.trim().toUpperCase());
    input.value="";
  }
});

function loop(){
  drawWave();
  requestAnimationFrame(loop);
}

loop();

log("> SIGNAL INTERCEPT SYSTEM");
log("> ADJUST WAVE USING: AMP, FREQ, PHASE");
log("> USE SCAN FOR HINTS");
</script>

</body>
</html>

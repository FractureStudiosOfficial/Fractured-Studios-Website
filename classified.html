<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SIGNAL INTERCEPT TERMINAL</title>
<style>
body {
  background: black;
  color: #00ffcc;
  font-family: monospace;
  padding: 20px;
}
.terminal {
  border: 1px solid #00ffcc;
  padding: 20px;
  height: 500px;
  overflow-y: auto;
}
input {
  width: 100%;
  background: black;
  border: none;
  color: #00ffcc;
  font-family: monospace;
  font-size: 16px;
}
.error { color: red; }
.success { color: #00ffaa; }
.hint { color: #ffaa00; }

.popup {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: black;
  border: 2px solid #00ffcc;
  padding: 20px;
  display: none;
}
</style>
</head>
<body>

<h1>SIGNAL INTERCEPT TERMINAL</h1>

<div class="terminal" id="terminal"></div>
<input id="input" placeholder="Enter command...">

<div class="popup" id="popup"></div>

<script>
const term = document.getElementById("terminal");
const input = document.getElementById("input");
const popup = document.getElementById("popup");

let state = {
  frequency: null,
  signalLocked: false,
  fragments: [],
  decoded: false,
  channel: 0
};

function log(text, cls="") {
  const div = document.createElement("div");
  div.textContent = text;
  if(cls) div.className = cls;
  term.appendChild(div);
  term.scrollTop = term.scrollHeight;
}

function showPopup(content) {
  popup.style.display = "block";
  popup.innerHTML = content + "<br><br><button onclick='popup.style.display=\"none\"'>CLOSE</button>";
}

function handle(cmd) {
  log("> " + cmd);

  // SCAN
  if(cmd === "SCAN") {
    let freq = (Math.random()*100).toFixed(2);
    log("> SIGNAL DETECTED AT " + freq + " MHz", "success");
    state.frequency = freq;
  }

  // TUNE
  else if(cmd.startsWith("TUNE ")) {
    let val = cmd.split(" ")[1];
    if(val == state.frequency) {
      log("> SIGNAL LOCKED", "success");
      state.signalLocked = true;
    } else {
      log("> NO SIGNAL", "error");
    }
  }

  // INTERCEPT
  else if(cmd === "INTERCEPT" && state.signalLocked) {
    let fragment = ["XJ-9", "ALPHA", "73", "KZ"][Math.floor(Math.random()*4)];
    state.fragments.push(fragment);
    log("> FRAGMENT CAPTURED: " + fragment);
    if(state.fragments.length >= 3) {
      log("> ENOUGH FRAGMENTS. TRY: DECODE");
    }
  }

  // DECODE
  else if(cmd === "DECODE" && state.fragments.length >= 3) {
    log("> RECONSTRUCTING SIGNAL...");
    state.decoded = true;
    log("> MESSAGE: \"SITE 73 ACTIVE\"", "success");
    log("> NEW COMMAND: OPEN CHANNEL");
  }

  // CHANNEL
  else if(cmd === "OPEN CHANNEL" && state.decoded) {
    state.channel++;
    log("> CHANNEL " + state.channel + " OPENED", "success");

    showPopup(`
      <b>TRANSMISSION ${state.channel}</b><br><br>
      [PLACEHOLDER TEXT - ADD STORY HERE]
    `);
  }

  else {
    log("> UNKNOWN COMMAND", "error");
  }
}

input.addEventListener("keydown", e=>{
  if(e.key === "Enter") {
    handle(input.value.trim().toUpperCase());
    input.value = "";
  }
});

log("> SIGNAL TERMINAL INITIALIZED");
log("> TRY: SCAN");
</script>

</body>
</html>

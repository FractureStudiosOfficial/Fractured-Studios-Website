<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.I.C. Classified Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  perspective:1000px;
}

/* CRT container */
#crt-container {
  height:100vh;
  display:flex;
  flex-direction:column;
  padding:40px;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
}

/* Terminal box */
#terminal-box {
  background:rgba(0,0,0,.25);
  padding:20px;
  border:1px solid rgba(255,159,7,.2);
  overflow-y:auto;
  flex:1;
  min-height:400px;
}

#prompt {
  display:flex;
  margin-top:10px;
}

#prompt input {
  background:transparent;
  border:none;
  outline:none;
  color:#FF9F07;
  font-family:inherit;
  flex:1;
}

/* Title above terminal */
#terminal-title {
  font-size:22px;
  font-weight:bold;
  margin-bottom:15px;
}

/* Scanlines */
#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

/* Amber tint overlay */
#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}
</style>
</head>
<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">
  <div id="terminal-title">U.I.C. Systems Terminal Access Point</div>

  <div id="terminal-box">
    <div id="terminal"></div>

    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off" disabled>
    </div>
  </div>
</div>

<script>
// ELEMENTS
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const container = document.getElementById("crt-container");

// 3D tilt
document.addEventListener("mousemove", e => {
  const x = (window.innerWidth/2 - e.clientX)/1500;
  const y = (window.innerHeight/2 - e.clientY)/1500;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});

// STARTUP SEQUENCE
const bootLines = [
  'U.I.C. Classified Terminal Booting...',
  'Loading security modules...',
  'Verifying credentials...',
  'Initializing encrypted access...',
  'Startup successful',
  '------------------------'
];

const fakeErrors = [
  'ERROR: Security node offline',
  'WARNING: Temporal desync detected',
  'ALERT: Unauthorized access attempt',
  'ERROR: Memory corruption',
  'WARNING: AI trust protocol failing'
];

// ARG CHECKPOINTS SEQUENCE
const sequences = [
  {name:"identity", prompt:"Enter identity credentials", pass:"UIC-AGENT-42"},
  {name:"biometric", prompt:"Perform biometric scan (enter code)", pass:"BIO-0907"},
  {name:"stationprotocol", prompt:"Input station protocol code", pass:"ZVE-HOR-VEN"},
  {name:"encryptedcomm", prompt:"Decrypt communication sequence", pass:"ALPHA-DELTA-77"},
  {name:"temporalaccess", prompt:"Synchronize temporal access lock (HHMM)", pass:"2359"},
  {name:"securityconfirmation", prompt:"Confirm security level alpha-gamma? (Y/N)", pass:"Y"}
];

let currentSeq = 0;

// BOOT DISPLAY
async function boot() {
  for (let line of bootLines) {
    const delay = 40 + Math.random()*80;
    if (Math.random() < 0.3) {
      const err = fakeErrors[Math.floor(Math.random()*fakeErrors.length)];
      terminal.innerHTML += `<span style="color:#ff6a00">${err}</span><br>`;
      terminal.scrollTop = terminal.scrollHeight;
      await new Promise(r => setTimeout(r, delay));
    }
    terminal.innerHTML += line + "<br>";
    terminal.scrollTop = terminal.scrollHeight;
    await new Promise(r => setTimeout(r, delay));
  }
  terminal.innerHTML += "<br>System Ready.<br>";
  terminal.scrollTop = terminal.scrollHeight;
  input.disabled = false;
  input.focus();
  promptNext();
}

// PROMPT SEQUENCE
function promptNext() {
  if (currentSeq >= sequences.length) return;
  terminal.innerHTML += sequences[currentSeq].prompt + "<br>";
}

// HANDLE INPUT
input.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const val = input.value.trim();
  terminal.innerHTML += `> ${val}<br>`;
  input.value = "";
  if (currentSeq >= sequences.length) return;

  const seq = sequences[currentSeq];
  if (seq.name === "securityconfirmation") {
    if (val.toUpperCase() === seq.pass) {
      terminal.innerHTML += "Access Granted.<br>";
      terminal.scrollTop = terminal.scrollHeight;
      setTimeout(()=>window.location="centralclearance.html",500);
      return;
    } else {
      terminal.innerHTML += "Access Denied.<br>";
      terminal.scrollTop = terminal.scrollHeight;
      return;
    }
  }

  if (val === seq.pass) {
    currentSeq++;
    if (currentSeq < sequences.length) {
      promptNext();
    } else {
      terminal.innerHTML += "All checkpoints cleared. Confirm security clearance (Y/N)<br>";
      terminal.scrollTop = terminal.scrollHeight;
    }
  } else {
    // fake error chance
    if (Math.random() < 0.5) {
      const err = fakeErrors[Math.floor(Math.random()*fakeErrors.length)];
      terminal.innerHTML += `<span style="color:#ff6a00">${err}</span><br>`;
    } else {
      terminal.innerHTML += "Invalid input.<br>";
    }
    terminal.scrollTop = terminal.scrollHeight;
  }
});

boot();
</script>

</body>
</html>

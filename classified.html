<style>
/* --- General body & CRT style --- */
body {
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#111;
  color:#FF9F07;
  overflow:hidden;
  perspective:1000px;
}

#crt-container {
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:30px;
  box-sizing:border-box;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
}

/* Scanlines & amber tint */
#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}

/* --- Terminal --- */
#terminal-box {
  width:80%;
  max-width:1200px;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,159,7,.2);
  padding:20px;
  min-height:350px;
  overflow-y:auto;
  box-sizing:border-box;
}

#prompt {
  display:flex;
  margin-top:10px;
}
#prompt input {
  background:transparent;
  border:none;
  outline:none;
  color:#FF9F07;
  font-family:inherit;
  flex:1;
}

/* --- Large Title --- */
#terminal-title {
  font-size:28px;
  font-weight:bold;
  text-align:left;
  margin-bottom:15px;
}

/* --- Buttons / Dial / Memory Dump / Loading --- */
.dial-container {
  display:flex;
  gap:20px;
  justify-content:center;
  margin-top:20px;
}

.dial {
  background:#111;
  border:1px solid #FF9F07;
  width:60px;
  height:60px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  user-select:none;
}

.memory-dump {
  display:grid;
  grid-template-columns:repeat(10,40px);
  grid-gap:5px;
  justify-content:center;
  margin:20px 0;
}

.memory-process {
  width:40px;
  height:30px;
  border:1px solid #FF9F07;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  user-select:none;
  background:#111;
}

.memory-process.selected {
  background:#FF9F07;
  color:#111;
}

#loading-bar-container {
  width:80%;
  background:#222;
  border:1px solid #FF9F07;
  height:25px;
  margin-top:20px;
  position:relative;
}

#loading-bar {
  background:#FF9F07;
  width:0%;
  height:100%;
  transition:width 0.2s ease;
}

/* OS Version & 3D tilt */
#os {
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
}

</style>
<div id="crt-container">

  <div id="terminal-title">U.I.C. Classified Access</div>

  <div id="terminal-box">
    <div id="terminal"></div>

    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off" disabled>
    </div>
  </div>

</div>

<div id="os">UIC OS v1.0.4</div>

<script>
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const os = document.getElementById("os");

// --- Screens ---
let currentScreen = 0;

const screens = [];

// --- Screen 1: Credentials ---
screens.push(function() {
  terminal.innerHTML = `
    Enter Name: <input id="name"><br>
    Enter ID: <input id="id"><br>
    Enter Passphrase: <input id="pass"><br>
    <button id="next1">Submit</button>
  `;
  document.getElementById("next1").onclick = () => {
    const name = document.getElementById("name").value.trim();
    const id = document.getElementById("id").value.trim();
    const pass = document.getElementById("pass").value.trim();
    if(name && id && pass){
      currentScreen++;
      screens[currentScreen]();
    } else alert("All fields required");
  };
});

// --- Screen 2: Keycode & Badge ---
screens.push(function() {
  terminal.innerHTML = `
    Enter Security Keycode: <input id="keycode"><br>
    Enter Security Badge Number: <input id="badge"><br>
    <button id="next2">Submit</button>
  `;
  document.getElementById("next2").onclick = () => {
    const key = document.getElementById("keycode").value.trim();
    const badge = document.getElementById("badge").value.trim();
    if(key && badge){
      currentScreen++;
      screens[currentScreen]();
    } else alert("Both fields required");
  };
});

// --- Screen 3: AI Behavioral Analysis ---
screens.push(function() {
  const questions = [
    "What is your role?",
    "Preferred station?",
    "Last mission date?",
    "Supervisor's name?",
    "Specialty code?",
    "Encryption level?"
  ];
  let html = "";
  questions.forEach((q,i)=>{
    html += `${q}: <input id="q${i}"><br>`;
  });
  html += `<button id="next3">Submit</button>`;
  terminal.innerHTML = html;
  document.getElementById("next3").onclick = () => {
    // For testing, accept any non-empty answers
    let valid = true;
    for(let i=0;i<questions.length;i++){
      if(!document.getElementById(`q${i}`).value.trim()) valid=false;
    }
    if(valid){
      terminal.innerHTML += "<br>Analyzing Behavior...";
      setTimeout(()=>{
        currentScreen++;
        screens[currentScreen]();
      },1000);
    } else alert("All questions must be answered");
  };
});

// --- Screen 4: Decrypt 5 passwords ---
screens.push(function(){
  terminal.innerHTML = "";
  const passwords = ["ENCRYPT1","ENCRYPT2","ENCRYPT3","ENCRYPT4","ENCRYPT5"];
  let completed = 0;
  passwords.forEach((pw,i)=>{
    const div = document.createElement("div");
    div.innerHTML = `Decrypt password ${i+1}: <input id="pw${i}"><button id="btn${i}">Submit</button><br>`;
    terminal.appendChild(div);
    document.getElementById(`btn${i}`).onclick = () => {
      const val = document.getElementById(`pw${i}`).value.trim();
      // For testing accept exact string
      if(val.toUpperCase()===pw){
        div.innerHTML += "✅ Correct<br>";
        completed++;
        if(completed===passwords.length){
          currentScreen++;
          screens[currentScreen]();
        }
      } else alert("Incorrect");
    };
  });
});

// --- Screen 5: Security Level & Encrypted Access Name ---
screens.push(function(){
  terminal.innerHTML = `
    Enter Security Level: <input id="secLevel"><br>
    Enter Encrypted Access Name: <input id="encName"><br>
    <button id="next5">Submit</button>
  `;
  document.getElementById("next5").onclick = ()=>{
    const l = document.getElementById("secLevel").value.trim();
    const n = document.getElementById("encName").value.trim();
    if(l && n){
      currentScreen++;
      screens[currentScreen]();
    } else alert("Both fields required");
  };
});

// --- Screen 6: Station Protocol Code ---
screens.push(function(){
  terminal.innerHTML = `Enter Station Protocol Code: <input id="stationCode"><button id="next6">Submit</button>`;
  document.getElementById("next6").onclick = ()=>{
    const val = document.getElementById("stationCode").value.trim();
    if(val){
      currentScreen++;
      screens[currentScreen]();
    } else alert("Code required");
  };
});

// --- Screen 7: Manual 4-Dial Radio System ---
screens.push(function(){
  terminal.innerHTML = `<div>Synchronize Radio Frequencies</div><div class="dial-container"></div><button id="checkDial">Check Frequencies</button><div id="dialMessage"></div>`;
  const container = document.querySelector(".dial-container");
  const target = [5,2,7,3]; // Example required values
  let dials = [0,0,0,0];

  for(let i=0;i<4;i++){
    const dial = document.createElement("div");
    dial.className="dial";
    dial.textContent=dials[i];
    dial.onclick = ()=> {
      dials[i] = (dials[i]+1)%10;
      dial.textContent=dials[i];
    };
    container.appendChild(dial);
  }

  document.getElementById("checkDial").onclick = ()=>{
    if(dials.join("")===target.join("")){
      currentScreen++;
      screens[currentScreen]();
    } else{
      document.getElementById("dialMessage").textContent="Incorrect frequencies!";
    }
  };
});

// --- Screen 8: Memory Dump Selection ---
screens.push(function(){
  terminal.innerHTML = `Select processes to dump:<div class="memory-dump"></div><button id="submitMemory">Submit</button>`;
  const dumpContainer = document.querySelector(".memory-dump");
  const processes = [];
  const correctIndices = [2,5,9,14,18]; // example indices to select
  for(let i=0;i<100;i++){
    const div = document.createElement("div");
    div.className="memory-process";
    div.textContent=i;
    div.onclick=()=>{div.classList.toggle("selected")};
    dumpContainer.appendChild(div);
    processes.push(div);
  }

  document.getElementById("submitMemory").onclick = ()=>{
    const selected = processes.map((p,i)=>p.classList.contains("selected")?i:-1).filter(v=>v>=0);
    const allCorrect = correctIndices.every(c=>selected.includes(c)) && selected.length===correctIndices.length;
    if(allCorrect){
      currentScreen++;
      screens[currentScreen]();
    } else alert("Incorrect processes selected!");
  };
});

// --- Screen 9: Loading Bar ---
screens.push(function(){
  terminal.innerHTML = `<div>Connecting to Server...</div><div id="loading-bar-container"><div id="loading-bar"></div></div>`;
  const bar = document.getElementById("loading-bar");
  let width=0;
  const interval = setInterval(()=>{
    width+=Math.random()*5;
    if(width>=100){
      width=100;
      clearInterval(interval);
      setTimeout(()=>{
        currentScreen++;
        screens[currentScreen]();
      },500);
    }
    bar.style.width=width+"%";
  },100);
});

// --- Screen 10: Access Granted ---
screens.push(function(){
  terminal.innerHTML = `<div>Access Granted!</div><div>Welcome, Elena</div>`;
  setTimeout(()=>{
    window.location="centralclearance.html";
  },1500);
});

// --- Start ---
screens[currentScreen]();
</script>

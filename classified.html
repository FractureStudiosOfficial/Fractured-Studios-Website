<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.I.C. Systems Terminal Access</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
/* BASIC CRT STYLING */
body {
  margin:0;
  font-family:'Share Tech Mono', monospace;
  background:#111;
  color:#FF9F07;
  overflow:hidden;
  perspective:1000px;
}

/* CRT overlay */
#amber {
  position:fixed; inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}

#scanlines {
  position:fixed; inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  pointer-events:none;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

/* CONTAINER */
#crt-container {
  width:100%;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:20px;
  box-sizing:border-box;
}

/* HEADER TITLE */
#terminal-title {
  font-size:24px;
  margin-bottom:20px;
  color:#FF9F07;
  text-shadow:0 0 5px #FF9F07;
}

/* TERMINAL SCREEN */
#terminal-screen {
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,159,7,.2);
  width:90%;
  max-width:1000px;
  height:70vh;
  padding:20px;
  overflow:auto;
  box-sizing:border-box;
  position:relative;
}

/* INPUT FIELDS */
.terminal-input {
  width:100%;
  background:transparent;
  border:1px solid #FF9F07;
  color:#FF9F07;
  padding:5px;
  font-family:'Share Tech Mono', monospace;
  margin-top:10px;
  box-sizing:border-box;
}

/* DIALS */
.dial-container {
  display:flex;
  justify-content:space-between;
  width:300px;
  margin:20px 0;
}

.dial {
  width:50px;
  height:50px;
  border:2px solid #FF9F07;
  color:#FF9F07;
  text-align:center;
  font-size:20px;
  line-height:50px;
  cursor:pointer;
  user-select:none;
}

/* MEMORY DUMP */
.memory-process {
  display:flex;
  align-items:center;
  margin:5px 0;
}

.memory-process input {
  margin-right:10px;
}

/* LOADING BAR */
#loading-bar-container {
  width:80%;
  height:20px;
  background:rgba(255,255,255,.1);
  margin-top:20px;
}

#loading-bar {
  width:0%;
  height:100%;
  background:#FF9F07;
  transition:width 0.1s linear;
}

/* BUTTONS */
.button {
  background:transparent;
  border:1px solid #FF9F07;
  color:#FF9F07;
  padding:5px 10px;
  cursor:pointer;
  margin-top:10px;
}

.button:hover {
  background:rgba(255,159,7,.1);
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">
  <div id="terminal-title">U.I.C. Systems Terminal Access Point</div>
  <div id="terminal-screen"></div>
</div>

<script>
const terminal = document.getElementById('terminal-screen');

// HARD-CODED ANSWERS FOR TESTING
const correctCredentials = {
  name:'Elena Krylov',
  id:'EK-0821',
  passphrase:'SolarisX'
};
const correctKeycode = '9472';
const correctBadge = 'B-431';
const aiAnswers = [
  'calm', 'alert', 'neutral', 'analytical', 'steady', 'cooperative'
];
const decryptedPasswords = ['ALPHA','BRAVO','CHARLIE','DELTA','ECHO'];
const securityLevel = 'Level-5';
const encryptedName = 'ELKRYLOV82';
const stationProtocol = 'ZVE-PRT-01';
const radioCombo = [4,7,2,9];
const memoryProcesses = [
  'PROC-00','PROC-01','PROC-02','PROC-03','PROC-04','PROC-05','PROC-06','PROC-07','PROC-08','PROC-09'
];
const memorySelection = ['PROC-02','PROC-05','PROC-07','PROC-08','PROC-09'];

let currentScreen = 0;

// UTIL FUNCTION TO CLEAR SCREEN
function clearScreen() {
  terminal.innerHTML = '';
}

// UTIL FUNCTION TO APPEND TEXT
function printLine(line) {
  terminal.innerHTML += line + '<br>';
  terminal.scrollTop = terminal.scrollHeight;
}

// SCREEN FUNCTIONS
function screen1() {
  clearScreen();
  printLine('SCREEN 1: INPUT CREDENTIALS');
  printLine('-----------------------------');
  
  const nameInput = document.createElement('input');
  nameInput.placeholder = 'Name';
  nameInput.className = 'terminal-input';
  
  const idInput = document.createElement('input');
  idInput.placeholder = 'ID';
  idInput.className = 'terminal-input';
  
  const passInput = document.createElement('input');
  passInput.placeholder = 'Passphrase';
  passInput.className = 'terminal-input';
  
  const submit = document.createElement('button');
  submit.innerText = 'Submit';
  submit.className = 'button';
  submit.onclick = () => {
    if(nameInput.value === correctCredentials.name &&
       idInput.value === correctCredentials.id &&
       passInput.value === correctCredentials.passphrase) {
         screen2();
       } else { printLine('INVALID CREDENTIALS'); }
  };
  
  terminal.appendChild(nameInput);
  terminal.appendChild(idInput);
  terminal.appendChild(passInput);
  terminal.appendChild(submit);
}

function screen2() {
  clearScreen();
  printLine('SCREEN 2: KEYCODE + SECURITY BADGE');
  printLine('----------------------------------');
  
  const keyInput = document.createElement('input');
  keyInput.placeholder = 'Keycode';
  keyInput.className = 'terminal-input';
  
  const badgeInput = document.createElement('input');
  badgeInput.placeholder = 'Security Badge';
  badgeInput.className = 'terminal-input';
  
  const submit = document.createElement('button');
  submit.innerText = 'Submit';
  submit.className = 'button';
  submit.onclick = () => {
    if(keyInput.value === correctKeycode && badgeInput.value === correctBadge) {
      screen3();
    } else { printLine('ACCESS DENIED'); }
  };
  
  terminal.appendChild(keyInput);
  terminal.appendChild(badgeInput);
  terminal.appendChild(submit);
}

// SCREEN 3: AI Behavioral Analysis
function screen3() {
  clearScreen();
  printLine('SCREEN 3: AI BEHAVIORAL ANALYSIS');
  printLine('--------------------------------');
  
  let questionIndex = 0;
  function askQuestion() {
    if(questionIndex >= aiAnswers.length) { screen4(); return; }
    printLine(`Question ${questionIndex+1}: Type word answer`);
    const input = document.createElement('input');
    input.className = 'terminal-input';
    const submit = document.createElement('button');
    submit.className = 'button';
    submit.innerText = 'Submit';
    submit.onclick = () => {
      if(input.value.toLowerCase() === aiAnswers[questionIndex]) {
        questionIndex++;
        clearScreen();
        askQuestion();
      } else { printLine('INCORRECT'); }
    };
    terminal.appendChild(input);
    terminal.appendChild(submit);
  }
  askQuestion();
}

// SCREEN 4: PASSWORD DECRYPTION
function screen4() {
  clearScreen();
  printLine('SCREEN 4: PASSWORD DECRYPTION');
  printLine('------------------------------');
  let passIndex = 0;
  function decryptPass() {
    if(passIndex >= decryptedPasswords.length) { screen5(); return; }
    printLine(`Decrypt password ${passIndex+1}`);
    const input = document.createElement('input');
    input.className = 'terminal-input';
    const submit = document.createElement('button');
    submit.className = 'button';
    submit.innerText = 'Submit';
    submit.onclick = () => {
      if(input.value.toUpperCase() === decryptedPasswords[passIndex]) {
        passIndex++;
        clearScreen();
        decryptPass();
      } else { printLine('WRONG PASSWORD'); }
    };
    terminal.appendChild(input);
    terminal.appendChild(submit);
  }
  decryptPass();
}

// SCREEN 5: SECURITY LEVEL + ENCRYPTED NAME
function screen5() {
  clearScreen();
  printLine('SCREEN 5: SECURITY LEVEL CHECK');
  const levelInput = document.createElement('input');
  levelInput.className = 'terminal-input';
  levelInput.placeholder = 'Security Level';
  
  const encInput = document.createElement('input');
  encInput.className = 'terminal-input';
  encInput.placeholder = 'Encrypted Access Name';
  
  const submit = document.createElement('button');
  submit.className = 'button';
  submit.innerText = 'Submit';
  submit.onclick = () => {
    if(levelInput.value === securityLevel && encInput.value === encryptedName) screen6();
    else printLine('ACCESS DENIED');
  };
  
  terminal.appendChild(levelInput);
  terminal.appendChild(encInput);
  terminal.appendChild(submit);
}

// SCREEN 6: STATION PROTOCOL
function screen6() {
  clearScreen();
  printLine('SCREEN 6: STATION PROTOCOL CODE');
  const input = document.createElement('input');
  input.className = 'terminal-input';
  input.placeholder = 'Protocol Code';
  const submit = document.createElement('button');
  submit.className = 'button';
  submit.innerText = 'Submit';
  submit.onclick = () => {
    if(input.value === stationProtocol) screen7();
    else printLine('WRONG CODE');
  };
  terminal.appendChild(input);
  terminal.appendChild(submit);
}

// SCREEN 7: MANUAL 4-DIAL RADIO SYSTEM
function screen7() {
  clearScreen();
  printLine('SCREEN 7: MANUAL 4-DIAL RADIO SYNCHRONIZATION');
  printLine('Select the correct 4-digit combination');
  
  const dialContainer = document.createElement('div');
  dialContainer.className = 'dial-container';
  const dials = [];
  for(let i=0;i<4;i++){
    const dial = document.createElement('div');
    dial.className = 'dial';
    dial.innerText = '0';
    dial.value = 0;
    dial.onclick = () => {
      dial.value = (dial.value +1)%10;
      dial.innerText = dial.value;
    };
    dials.push(dial);
    dialContainer.appendChild(dial);
  }
  const submit = document.createElement('button');
  submit.className = 'button';
  submit.innerText = 'Submit';
  submit.onclick = () => {
    const values = dials.map(d=>d.value);
    if(values.join('') === radioCombo.join('')) screen8();
    else printLine('INCORRECT COMBINATION');
  };
  terminal.appendChild(dialContainer);
  terminal.appendChild(submit);
}

// SCREEN 8: MEMORY DUMP
function screen8() {
  clearScreen();
  printLine('SCREEN 8: MEMORY DUMP SELECTION');
  printLine('Select all critical processes');
  
  const form = document.createElement('div');
  memoryProcesses.forEach(proc=>{
    const div = document.createElement('div');
    div.className = 'memory-process';
    const checkbox = document.createElement('input');
    checkbox.type='checkbox';
    checkbox.value=proc;
    div.appendChild(checkbox);
    div.appendChild(document.createTextNode(proc));
    form.appendChild(div);
  });
  
  const submit = document.createElement('button');
  submit.className = 'button';
  submit.innerText = 'Submit';
  submit.onclick = () => {
    const checked = Array.from(form.querySelectorAll('input:checked')).map(i=>i.value);
    if(memorySelection.every(val=>checked.includes(val))) screen9();
    else printLine('INCORRECT SELECTION');
  };
  
  terminal.appendChild(form);
  terminal.appendChild(submit);
}

// SCREEN 9: LOADING
function screen9() {
  clearScreen();
  printLine('SCREEN 9: CONNECTING TO SERVER');
  
  const container = document.createElement('div');
  container.id='loading-bar-container';
  const bar = document.createElement('div');
  bar.id='loading-bar';
  container.appendChild(bar);
  terminal.appendChild(container);
  
  let width=0;
  const interval = setInterval(()=>{
    width+=1;
    bar.style.width = width+'%';
    if(width>=100){ clearInterval(interval); screen10(); }
  },30);
}

// SCREEN 10: ACCESS GRANTED
function screen10() {
  clearScreen();
  printLine('ACCESS GRANTED');
  printLine(`Welcome ${correctCredentials.name}`);
  setTimeout(()=>{window.location='centralclearance.html';},2000);
}

// START
screen1();
</script>

</body>
</html>

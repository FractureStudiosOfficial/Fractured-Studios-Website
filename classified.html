<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PROJECT ORANGE - CLASSIFIED SYSTEM</title>
<style>
  body {
    background: black;
    color: #00ffff;
    font-family: monospace;
    padding: 20px;
  }
  .terminal {
    border: 1px solid #00ffff;
    padding: 20px;
    height: 500px;
    overflow-y: auto;
    white-space: pre-wrap;
  }
  input {
    background: black;
    border: none;
    color: #00ffff;
    font-family: monospace;
    font-size: 16px;
    width: 100%;
    outline: none;
  }
  .error { color: red; }
  .success { color: #ff6600; }
  .hint { color: #ffaa00; }
</style>
</head>
<body>

<h1>PROJECT ORANGE - CLASSIFIED SYSTEM</h1>
<div class="terminal" id="terminal"></div>
<input type="text" id="commandInput" placeholder="Enter command here" autocomplete="off">

<script>
const terminal = document.getElementById('terminal');
const input = document.getElementById('commandInput');

let accessLevel = 0;
let foundCode = false;
let decrypted = false;

// Initial welcome message
addLine("> WELCOME TO PROJECT ORANGE - CLASSIFIED SYSTEM");
addLine("> ACCESS LEVEL: 0");
addLine("> ENTER COMMAND:");

input.focus();

input.addEventListener('keydown', function(e) {
  if(e.key === 'Enter') {
    const cmd = input.value.trim().toUpperCase();
    input.value = '';
    handleCommand(cmd);
  }
});

function addLine(text, className="") {
  const line = document.createElement('div');
  line.textContent = text;
  if(className) line.className = className;
  terminal.appendChild(line);
  terminal.scrollTop = terminal.scrollHeight;
}

function maybeError() {
  if(Math.random() < 0.2) {
    const errors = [
      "ERROR: FILE CORRUPTED",
      "WARNING: UNAUTHORIZED ACCESS DETECTED",
      "ALERT: TEMPORARY LOCKOUT",
      "ERROR: CODE FRAGMENT MISSING",
      "SYSTEM WARNING: INTEGRITY CHECK FAILED"
    ];
    addLine("> " + errors[Math.floor(Math.random()*errors.length)], "error");
  }
}

function handleCommand(cmd) {
  addLine("> " + cmd);

  // Layer 0 commands
  if(accessLevel === 0) {
    if(cmd === "HELP") {
      addLine("> AVAILABLE COMMANDS: LIST, OPEN SYSTEM_LOGS", "hint");
    } else if(cmd === "LIST") {
      addLine("> FILES AVAILABLE: SYSTEM_LOGS.TXT", "success");
    } else if(cmd === "OPEN SYSTEM_LOGS") {
      addLine("> SYSTEM_LOGS.TXT OPENED");
      addLine("> 03/12/1985 - Initial protocol activated");
      addLine("> CODE FRAGMENT FOUND: [??84]");
      foundCode = true;
    } else {
      addLine("> ACCESS DENIED. INVALID COMMAND.", "error");
      maybeError();
    }
  }

  // Layer 1 commands (requires code)
  else if(accessLevel === 1) {
    if(cmd === "DECRYPT FRAGMENT" && foundCode) {
      addLine("> FRAGMENT DECRYPTED: 5284", "success");
      decrypted = true;
    } else if(cmd === "LIST") {
      addLine("> FILES AVAILABLE: PROJECT_X.TXT, BRIEFING_DOCS.DAT", "success");
    } else if(cmd === "OPEN PROJECT_X.TXT" && decrypted) {
      addLine("> PROJECT_X.TXT OPENED");
      addLine("> LEVEL 2 DATA: TARGET COORDINATES CONFIRMED. MISSION PARAMETERS CLASSIFIED.");
    } else {
      addLine("> COMMAND NOT RECOGNIZED.", "error");
      maybeError();
    }
  }

  // Upgrade access level
  if(foundCode && cmd === "ENTER CODE 5284" && accessLevel === 0) {
    accessLevel = 1;
    addLine("> ACCESS LEVEL UPGRADED TO 1", "success");
  }
}
</script>

</body>
</html>

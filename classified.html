<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signal Intercept System</title>
<style>
body {
  margin:0;
  background:black;
  color:#00ffcc;
  font-family:monospace;
  display:flex;
  height:100vh;
}

.container {
  display:flex;
  width:100%;
}

.terminal {
  width:40%;
  border-right:1px solid #00ffcc;
  display:flex;
  flex-direction:column;
}

.output {
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.output::-webkit-scrollbar {
  width:8px;
}
.output::-webkit-scrollbar-thumb {
  background:#00ffcc;
}

input {
  border:none;
  border-top:1px solid #00ffcc;
  background:black;
  color:#00ffcc;
  padding:10px;
  font-family:monospace;
  font-size:16px;
}

.canvasBox {
  width:60%;
  display:flex;
  justify-content:center;
  align-items:center;
}

canvas {
  width:90%;
  height:70%;
  border:1px solid #00ffcc;
}

.error { color:red; }
.success { color:#00ffaa; }
.hint { color:#ffaa00; }
</style>
</head>
<body>

<div class="container">
  <div class="terminal">
    <div class="output" id="output"></div>
    <input id="input" placeholder="Enter command...">
  </div>
  <div class="canvasBox">
    <canvas id="scope"></canvas>
  </div>
</div>

<script>
const out = document.getElementById("output");
const input = document.getElementById("input");
const canvas = document.getElementById("scope");
const ctx = canvas.getContext("2d");

canvas.width = 800;
canvas.height = 400;

let state = {
  amplitude: 50,
  frequency: 50,
  phase: 0,
  target: {
    amplitude: 72,
    frequency: 38,
    phase: 60
  },
  locked: false
};

function log(text, cls=""){
  const d=document.createElement("div");
  d.textContent=text;
  if(cls) d.className=cls;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

function drawWave(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();

  let amp = state.amplitude/100 * 150;
  let freq = state.frequency/100 * 0.1;
  let phase = state.phase/100 * Math.PI * 2;

  for(let x=0;x<canvas.width;x++){
    let y = canvas.height/2 + Math.sin(x*freq + phase) * amp;
    if(x===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.strokeStyle = "#00ffcc";
  ctx.stroke();
}

function checkLock(){
  let a = Math.abs(state.amplitude - state.target.amplitude);
  let f = Math.abs(state.frequency - state.target.frequency);
  let p = Math.abs(state.phase - state.target.phase);

  if(a < 3 && f < 3 && p < 3){
    state.locked = true;
    log("> SIGNAL LOCK ACHIEVED","success");
  }
}

function handle(cmd){
  log("> " + cmd);

  let parts = cmd.split(" ");

  if(parts[0] === "AMP"){
    state.amplitude = Number(parts[1]);
    log("> amplitude set to " + state.amplitude);
  }
  else if(parts[0] === "FREQ"){
    state.frequency = Number(parts[1]);
    log("> frequency set to " + state.frequency);
  }
  else if(parts[0] === "PHASE"){
    state.phase = Number(parts[1]);
    log("> phase set to " + state.phase);
  }
  else if(cmd === "STATUS"){
    log(`> AMP:${state.amplitude} FREQ:${state.frequency} PHASE:${state.phase}`);
  }
  else if(cmd === "LOCK" && state.locked){
    log("> CHANNEL OPENED","success");
  }
  else{
    log("> UNKNOWN COMMAND","error");
  }

  checkLock();
}

input.addEventListener("keydown", e=>{
  if(e.key === "Enter"){
    handle(input.value.trim().toUpperCase());
    input.value="";
  }
});

function loop(){
  drawWave();
  requestAnimationFrame(loop);
}

loop();

log("> SIGNAL INTERCEPT SYSTEM");
log("> ADJUST WAVE USING: AMP, FREQ, PHASE");
log("> TRY MATCHING THE SIGNAL");
</script>

</body>
</html>

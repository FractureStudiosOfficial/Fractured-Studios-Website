<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.I.C. Classified Access</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  perspective:1000px;
}

/* CRT container */
#crt-container {
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:60px;
  box-sizing:border-box;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
  flex-direction: column;
}

/* Terminal */
#terminal-box {
  width:80%;
  max-width:900px;
}

#terminal {
  background:rgba(0,0,0,.25);
  padding:20px;
  border:1px solid rgba(255,159,7,.2);
  min-height:350px;
  max-height:500px;
  overflow-y:auto;
}

#prompt {
  display:flex;
  margin-top:10px;
}

#prompt input {
  background:transparent;
  border:none;
  outline:none;
  color:#FF9F07;
  font-family:inherit;
  flex:1;
}

/* Terminal title */
#terminal-title {
  font-size:24px;
  font-weight:bold;
  color:#FF9F07;
  margin-bottom:15px;
  text-align:left;
  width:80%;
}

/* OS version */
#os {
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
}

/* Scanlines */
#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

/* Amber overlay */
#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}

/* 4-dial radio system (screen7) */
.dial-container {
  display:flex;
  gap:10px;
  margin:10px 0;
}
.dial {
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,159,7,.2);
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  cursor:pointer;
  user-select:none;
}
.dial:hover {
  background:rgba(255,159,7,.1);
}

/* Memory dump (screen8) */
.memory-dump {
  display:flex;
  flex-wrap:wrap;
  gap:3px;
  max-height:200px;
  overflow-y:auto;
}
.memory-process {
  width:30px;
  height:20px;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,159,7,.2);
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  font-size:12px;
}
.memory-process.selected {
  background:#FF9F07;
  color:#000;
}
</style>
</head>
<body>
<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">
  <div id="terminal-title">U.I.C. Classified Access</div>

  <div id="terminal-box">
    <div id="terminal"></div>
    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off" disabled>
    </div>
  </div>
</div>

<div id="os">UIC OS v1.0.4</div>

  <script>
// ELEMENTS
const terminal = document.getElementById("terminal");
const input = document.getElementById("cmd");
const os = document.getElementById("os");

let currentScreen = 0;

// --- Screens ---
const screens = [
  // Screen 1: Credentials input
  async function screen1() {
    terminal.innerHTML = "Enter Name, ID, and Passphrase:<br>";
    terminal.innerHTML += `<input id="name" placeholder="Name"><br>`;
    terminal.innerHTML += `<input id="id" placeholder="ID"><br>`;
    terminal.innerHTML += `<input id="pass" placeholder="Passphrase"><br>`;
    const nameInput = document.getElementById("name");
    const idInput = document.getElementById("id");
    const passInput = document.getElementById("pass");
    nameInput.focus();
    input.disabled = true;

    const waitForEnter = async () => {
      return new Promise((resolve) => {
        [nameInput, idInput, passInput].forEach(el => {
          el.addEventListener("keydown", e => {
            if(e.key === "Enter") resolve();
          });
        });
      });
    };

    await waitForEnter();
    currentScreen++;
    screens[currentScreen]();
  },

  // Screen 2: Keycode and security badge
  async function screen2() {
    terminal.innerHTML = "Enter Keycode and Security Badge:<br>";
    terminal.innerHTML += `<input id="keycode" placeholder="Keycode"><br>`;
    terminal.innerHTML += `<input id="badge" placeholder="Security Badge"><br>`;
    const keycodeInput = document.getElementById("keycode");
    const badgeInput = document.getElementById("badge");
    keycodeInput.focus();

    const waitForEnter = async () => {
      return new Promise((resolve) => {
        [keycodeInput, badgeInput].forEach(el => {
          el.addEventListener("keydown", e => {
            if(e.key === "Enter") resolve();
          });
        });
      });
    };
    await waitForEnter();
    currentScreen++;
    screens[currentScreen]();
  },

  // Screen 3: AI behavioral analysis
  async function screen3() {
    terminal.innerHTML = "AI Behavioral Analysis:<br>";
    const questions = [
      "What is your primary task?",
      "Who is your commanding officer?",
      "What is your current station?",
      "Report your last mission.",
      "Preferred communication protocol?",
      "State your secondary skill."
    ];
    let answers = [];
    for(let q of questions) {
      terminal.innerHTML += q + "<br>";
      terminal.innerHTML += `<input class="ai-answer" placeholder="Answer"><br>`;
      const answerInput = document.querySelector(".ai-answer:last-of-type");
      answerInput.focus();
      await new Promise(resolve => {
        answerInput.addEventListener("keydown", e => {
          if(e.key === "Enter") {
            answers.push(answerInput.value);
            resolve();
          }
        });
      });
    }
    terminal.innerHTML += "Analyzing behavior...<br>";
    await new Promise(r => setTimeout(r, 1500));
    currentScreen++;
    screens[currentScreen]();
  },

  // Screen 4: Decrypt 5 passwords
  async function screen4() {
    terminal.innerHTML = "Decrypt the following passwords:<br>";
    const passwords = ["XJ9!8K", "3P$Q7L", "BZ#45R", "M2&N1V", "T9@K6W"];
    for(let pw of passwords) {
      terminal.innerHTML += `<input class="decrypt" placeholder="Decrypted password"><br>`;
      const decryptInput = document.querySelector(".decrypt:last-of-type");
      decryptInput.focus();
      await new Promise(resolve => {
        decryptInput.addEventListener("keydown", e => {
          if(e.key === "Enter") {
            if(decryptInput.value === pw) resolve();
            else terminal.innerHTML += "Incorrect, try again.<br>";
          }
        });
      });
    }
    currentScreen++;
    screens[currentScreen]();
  },

  // Screen 5: Security level & encrypted access name
  async function screen5() {
    terminal.innerHTML = "Input your Security Level and Encrypted Access Name:<br>";
    terminal.innerHTML += `<input id="sec-level" placeholder="Security Level"><br>`;
    terminal.innerHTML += `<input id="enc-name" placeholder="Encrypted Access Name"><br>`;
    const levelInput = document.getElementById("sec-level");
    const encInput = document.getElementById("enc-name");
    levelInput.focus();

    const waitForEnter = async () => {
      return new Promise((resolve) => {
        [levelInput, encInput].forEach(el => {
          el.addEventListener("keydown", e => {
            if(e.key === "Enter") resolve();
          });
        });
      });
    };
    await waitForEnter();
    currentScreen++;
    screens[currentScreen]();
  },

  // Screen 6: Station protocol code
  async function screen6() {
    terminal.innerHTML = "Enter Station Protocol Code:<br>";
    terminal.innerHTML += `<input id="protocol" placeholder="Protocol Code"><br>`;
    const protocolInput = document.getElementById("protocol");
    protocolInput.focus();
    await new Promise(resolve => {
      protocolInput.addEventListener("keydown", e => {
        if(e.key === "Enter") resolve();
      });
    });
    currentScreen++;
    screens[currentScreen]();
  },

  // Screen 7: Manual 4-dial radio system
  async function screen7() {
    terminal.innerHTML = "Manual Radio Synchronization:<br>";
    terminal.innerHTML += `<div class="dial-container">
      <div class="dial" data-val="1">1</div>
      <div class="dial" data-val="2">2</div>
      <div class="dial" data-val="3">3</div>
      <div class="dial" data-val="4">4</div>
    </div>`;
    terminal.innerHTML += `<button id="sync">Synchronize</button><br>`;

    const dials = document.querySelectorAll(".dial");
    let selected = [0,0,0,0]; // store dial values
    dials.forEach((d, i) => {
      d.addEventListener("click", () => {
        selected[i] = Number(d.dataset.val);
        d.style.background = "#FF9F07";
        setTimeout(()=>{d.style.background="rgba(0,0,0,.25)";},300);
      });
    });

    document.getElementById("sync").addEventListener("click", () => {
      const correct = [1,3,2,4]; // example combination
      if(selected.join(",") === correct.join(",")) {
        terminal.innerHTML += "Radio synchronized successfully.<br>";
        currentScreen++;
        screens[currentScreen]();
      } else {
        terminal.innerHTML += "Incorrect synchronization. Try again.<br>";
      }
    });
  },

  // Screen 8: Memory dump
  async function screen8() {
    terminal.innerHTML = "Memory Dump Check: Select the correct processes to dump.<br>";
    const container = document.createElement("div");
    container.className = "memory-dump";
    const processes = [];
    for(let i=0;i<100;i++){
      const p = document.createElement("div");
      p.className="memory-process";
      p.textContent=i;
      container.appendChild(p);
      processes.push(p);
    }
    terminal.appendChild(container);

    const correct = [5,12,27,33,68];
    container.addEventListener("click", e => {
      if(e.target.classList.contains("memory-process")){
        e.target.classList.toggle("selected");
      }
    });

    const waitDump = async () => {
      return new Promise(resolve => {
        const checkInterval = setInterval(()=>{
          const selected = Array.from(document.querySelectorAll(".memory-process.selected")).map(p=>Number(p.textContent));
          if(correct.every(v=>selected.includes(v))){
            clearInterval(checkInterval);
            resolve();
          }
        },100);
      });
    };
    await waitDump();
    terminal.innerHTML += "Memory dump complete.<br>";
    currentScreen++;
    screens[currentScreen]();
  },

  // Screen 9: Loading
  async function screen9() {
    terminal.innerHTML = "Connecting to server:<br>";
    const bar = document.createElement("div");
    bar.style.width="0%";
    bar.style.height="20px";
    bar.style.background="#FF9F07";
    terminal.appendChild(bar);
    let width=0;
    const interval = setInterval(()=>{
      width += 2;
      bar.style.width=width+"%";
      if(width>=100){
        clearInterval(interval);
        currentScreen++;
        screens[currentScreen]();
      }
    },50);
  },

  // Screen 10: Access granted
  async function screen10() {
    terminal.innerHTML = "ACCESS GRANTED<br>";
    terminal.innerHTML += "Welcome Elena.<br>";
    await new Promise(r=>setTimeout(r,1500));
    window.location="centralclearance.html";
  }
];

// START SEQUENCE
currentScreen=0;
screens[currentScreen]();

</script>
</body>
</html>

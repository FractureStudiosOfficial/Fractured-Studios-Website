<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  background-color: #0d0d0d;
  color: #FF9F07;
  font-family: 'Share Tech Mono', monospace;
}

/* Scanlines */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,159,7,0.05) 0px,
    rgba(255,159,7,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
}

/* CRT + Flicker */
.crt {
  position: relative;
}

.crt::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.25));
  pointer-events: none;
}

.crt::after {
  content: "";
  position: absolute;
  inset: 0;
  box-shadow: inset 0 0 60px rgba(255,159,7,0.15);
  pointer-events: none;
}

@keyframes flicker {
  0% { opacity: 1; }
  98% { opacity: 1; }
  99% { opacity: 0.96; }
  100% { opacity: 1; }
}

.flicker {
  animation: flicker 0.12s infinite;
}

/* Layout */
.content {
  padding: 60px;
}
a {
  color: #FF9F07;
}
</style>
</head>

<body>

<div class="crt flicker">

  <div class="content">
    <h1>Games</h1>

    <p>Game 1 - Coming soon</p>
    <p>Game 2 - Coming soon</p>

    <br>
    <a href="index.html">← Back</a>
  </div>

</div>

<div class="scanlines"></div>

</body>
</html>

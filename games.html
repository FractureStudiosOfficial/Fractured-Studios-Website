<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games - Fractured Studios</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  height: 100%;
  font-family: 'Share Tech Mono', monospace;
  background: #0d0d0d;
  color: #FF9F07;
  overflow: hidden;
  cursor: default;
}

/* Scanlines overlay */
.scanlines {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,159,7,0.05) 0px,
    rgba(255,159,7,0.05) 1px,
    transparent 2px,
    transparent 4px
  );
  animation: scanlineMove 1s linear infinite;
  z-index: 9999;
}
@keyframes scanlineMove {
  0% { background-position: 0 0; }
  100% { background-position: 0 4px; }
}

/* CRT Container */
#crtContainer {
  position: relative;
  width: 100%;
  min-height: 100vh;
  border-radius: 30px;
  overflow: hidden;
  transform-style: preserve-3d;
  box-shadow: inset 0 0 60px rgba(255,159,7,0.2);
  background: #0d0d0d;
}

#crtContainer::before {
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:
    radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.2) 100%);
  z-index:2;
}

/* Flicker effect */
.flicker {
  animation: flicker 0.15s infinite;
}
@keyframes flicker {
  0% { opacity:1; }
  97% { opacity:1; }
  98% { opacity:0.97; }
  99% { opacity:0.94; }
  100% { opacity:1; }
}

/* Page content */
#gamesPage {
  display: block;
  overflow: auto;
}

.section {
  padding: 60px;
  max-width: 900px;
  margin: auto;
}

h1.phosphor {
  text-shadow: 0 0 2px #FF9F07, 0 0 4px rgba(255,159,7,0.8), 0 0 6px rgba(255,159,7,0.6);
}

.game-card {
  border: 2px solid #FF9F07;
  padding: 30px;
  margin: 30px 0;
  text-align: center;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}
.game-card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #FF9F07;
}

#commandInput {
  background:none;
  border:none;
  color:#FF9F07;
  font-family:inherit;
  font-size:18px;
  outline:none;
  width: 100%;
  max-width: 500px;
  margin-top: 20px;
  display: block;
}
</style>
</head>
<body>

<div id="crtContainer" class="flicker">
  <div id="gamesPage">
    <section class="section">
      <h1 class="phosphor">Our Games</h1>
      <div class="game-card" onclick="window.location.href='theironfrontier.html'">
        <h2>The Iron Frontier</h2>
        <p>Status: In Production</p>
        <p>Click to learn more →</p>
      </div>
    </section>

    <section class="section">
      <p>> Type a command:</p>
      <input id="commandInput" placeholder="> enter command...">
      <p>Commands: <strong>home</strong>, <strong>games</strong>, <strong>about</strong>, <strong>contact</strong></p>
    </section>
  </div>
</div>

<div class="scanlines"></div>

<script>
// Terminal commands
const input = document.getElementById("commandInput");
input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    const cmd = input.value.toLowerCase().trim();
    if(cmd==="home") window.location.href="index.html";
    else if(cmd==="games") window.location.href="games.html";
    else if(cmd==="about") window.location.href="about.html";
    else if(cmd==="contact") window.location.href="contact.html";
    else alert("Unknown command: " + cmd);
    input.value="";
  }
});

// Mouse-driven CRT 3D distortion
const crtContainer = document.getElementById("crtContainer");
document.addEventListener("mousemove", function(e){
  const moveX = (e.clientX - window.innerWidth/2)/60;
  const moveY = (e.clientY - window.innerHeight/2)/60;
  crtContainer.style.transform = `perspective(1200px) scale(1.02) rotateX(${moveY}deg) rotateY(${moveX}deg)`;
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ships | U.I.C. Systems</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --amber:#ff9f07;
}

/* =========================
   BASE
========================= */
body{
  margin:0;
  background:#0b0b0b;
  color:var(--amber);
  font-family:'Share Tech Mono', monospace;
  overflow-x:hidden;
}

/* =========================
   FX LAYER (NEVER INTERACTS)
========================= */
#amber,
#scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#amber{
  background:rgba(255,159,7,.04);
  z-index:1;
}

#scanlines{
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:2;
}

@keyframes flicker{
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

/* =========================
   MAIN UI LAYER
========================= */
#crt-container{
  position:relative;
  z-index:5;
  padding:50px;
  min-height:100vh;
  box-sizing:border-box;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
}

/* HEADER */
.header{
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,159,7,.2);
  padding:20px;
  margin-bottom:25px;
}

.header h1{
  margin:0;
  letter-spacing:.2em;
}

/* WRAPPER */
#grid-wrap{
  background:rgba(0,0,0,.2);
  border:1px solid rgba(255,159,7,.1);
  padding:20px;
}

/* =========================
   SHIP CARDS
========================= */
.ships{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.ship-entry{
  position:relative;
  z-index:10; /* IMPORTANT CLICK FIX */
  
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px 16px;
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,159,7,.22);

  transition:.2s ease;
}

.ship-entry:hover{
  background:rgba(0,0,0,.4);
  border-color:rgba(255,159,7,.4);
}

.ship-name{
  font-weight:bold;
}

.ship-type{
  opacity:.6;
  margin-left:8px;
  font-size:12px;
}

/* BUTTON FIX (THIS IS THE KEY PART) */
.details-button{
  position:relative;
  z-index:20; /* MUST BE ABOVE EVERYTHING */

  background:transparent;
  border:1px solid var(--amber);
  color:var(--amber);
  padding:6px 14px;
  cursor:pointer;
  font-family:inherit;
  letter-spacing:.1em;

  transition:.2s ease;
}

.details-button:hover{
  background:rgba(255,159,7,.12);
}

/* =========================
   TERMINAL
========================= */
#terminal-box{
  margin-top:20px;
  padding:12px;
  background:rgba(0,0,0,.35);
  border:1px solid rgba(255,159,7,.2);

  position:sticky;
  bottom:0;
  z-index:20;
}

#prompt{
  display:flex;
}

#prompt input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--amber);
  font-family:inherit;
}

/* OS */
#os{
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
  z-index:50;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">

  <div class="header">
    <h1>U.I.C. NAVAL ARCHIVE</h1>
  </div>

  <div id="grid-wrap">

    <div class="ships">

      <div class="ship-entry">
        <div><span class="ship-name">Soyuz</span> <span class="ship-type">(RU)</span></div>
        <button class="details-button" onclick="window.location='soyuz.html'">ACCESS</button>
      </div>

      <div class="ship-entry">
        <div><span class="ship-name">Von Braun</span> <span class="ship-type">(US)</span></div>
        <button class="details-button" onclick="window.location='vonbraun.html'">ACCESS</button>
      </div>

      <div class="ship-entry">
        <div><span class="ship-name">ISS</span> <span class="ship-type">(INT)</span></div>
        <button class="details-button" onclick="window.location='iss.html'">ACCESS</button>
      </div>

      <div class="ship-entry">
        <div><span class="ship-name">Buran</span> <span class="ship-type">(USSR)</span></div>
        <button class="details-button" onclick="window.location='buran.html'">ACCESS</button>
      </div>

    </div>

  </div>

  <div id="terminal-box">
    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off">
    </div>
  </div>

</div>

<div id="os">UIC OS v1.0.4</div>

<script>
const container = document.getElementById("crt-container");
const os = document.getElementById("os");

document.addEventListener("mousemove", e=>{
  const x = (window.innerWidth/2 - e.clientX)/1000;
  const y = (window.innerHeight/2 - e.clientY)/1000;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});

const input = document.getElementById("cmd");
input.addEventListener("keydown", e=>{
  if(e.key !== "Enter") return;

  const cmd = input.value.toLowerCase().trim();

  if(cmd === "home") window.location="index.html";
  if(cmd === "ships") window.location="ships.html";
  if(cmd === "games") window.location="games.html";

  input.value="";
});
</script>

</body>
</html>

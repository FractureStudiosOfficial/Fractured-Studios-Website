<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ships | U.I.C. Systems</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --amber:#ff9f07;
  --amberSoft:rgba(255,159,7,.12);
  --panel:rgba(0,0,0,.35);
  --line:rgba(255,159,7,.22);
}

/* =========================
   BASE
========================= */
body{
  margin:0;
  background:#0b0b0b;
  color:var(--amber);
  font-family:'Share Tech Mono', monospace;
  overflow-x:hidden;
}

/* CRT LAYERS */
#amber{
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
  z-index:1000;
}

#scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}

@keyframes flicker{
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

/* =========================
   MAIN FRAME
========================= */
#crt-container{
  padding:50px;
  min-height:100vh;
  box-sizing:border-box;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
}

/* HEADER PANEL */
.header{
  position:relative;
  margin-bottom:30px;
  padding:25px;
  background:var(--panel);
  border:1px solid var(--line);
  box-shadow:0 0 25px rgba(255,159,7,.05);
}

.header h1{
  margin:0;
  font-size:28px;
  letter-spacing:.2em;
}

.header p{
  margin-top:8px;
  opacity:.6;
}

/* SUB GRID BACKDROP */
#grid-wrap{
  position:relative;
  padding:25px;
  background:rgba(0,0,0,.2);
  border:1px solid rgba(255,159,7,.1);
}

/* subtle internal frame lines */
#grid-wrap::before{
  content:"";
  position:absolute;
  inset:10px;
  border:1px dashed rgba(255,159,7,.08);
  pointer-events:none;
}

/* =========================
   SHIP CARDS (UPGRADED)
========================= */
.ships{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.ship-entry{
  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px 16px;
  background:rgba(0,0,0,.25);
  border:1px solid var(--line);

  position:relative;
  overflow:hidden;

  transition:.2s ease;
}

/* subtle scan glow */
.ship-entry::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,159,7,.05),
    transparent
  );
  transform:translateX(-100%);
  transition:.6s ease;
}

.ship-entry:hover::before{
  transform:translateX(100%);
}

.ship-entry:hover{
  background:rgba(0,0,0,.4);
  border-color:rgba(255,159,7,.35);
}

/* left side identity */
.ship-name{
  font-weight:bold;
  letter-spacing:.05em;
}

.ship-type{
  opacity:.6;
  margin-left:8px;
  font-size:12px;
}

/* RIGHT BUTTON */
.details-button{
  background:transparent;
  border:1px solid var(--amber);
  color:var(--amber);
  padding:6px 14px;
  cursor:pointer;
  font-family:inherit;
  letter-spacing:.1em;
  transition:.2s ease;
}

.details-button:hover{
  background:rgba(255,159,7,.12);
  box-shadow:0 0 12px rgba(255,159,7,.2);
}

/* =========================
   TERMINAL
========================= */
#terminal-box{
  margin-top:25px;
  padding:12px 14px;
  background:rgba(0,0,0,.35);
  border:1px solid var(--line);
  display:flex;
  position:sticky;
  bottom:0;
}

#prompt{
  display:flex;
  flex:1;
}

#prompt input{
  flex:1;
  background:transparent;
  border:none;
  outline:none;
  color:var(--amber);
  font-family:inherit;
}

/* OS */
#os{
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">

  <div class="header">
    <h1>U.I.C. NAVAL ARCHIVE</h1>
    <p>Active & Historical Vessel Registry</p>
  </div>

  <div id="grid-wrap">

    <div class="ships">

      <div class="ship-entry">
        <div><span class="ship-name">Soyuz</span> <span class="ship-type">(Russia)</span></div>
        <button class="details-button" onclick="window.location='soyuz.html'">ACCESS</button>
      </div>

      <div class="ship-entry">
        <div><span class="ship-name">Von Braun</span> <span class="ship-type">(USA)</span></div>
        <button class="details-button" onclick="window.location='vonbraun.html'">ACCESS</button>
      </div>

      <div class="ship-entry">
        <div><span class="ship-name">Shenzhou</span> <span class="ship-type">(China)</span></div>
        <button class="details-button" onclick="window.location='shenzhou.html'">ACCESS</button>
      </div>

      <div class="ship-entry">
        <div><span class="ship-name">Discovery One</span> <span class="ship-type">(USA)</span></div>
        <button class="details-button" onclick="window.location='discoveryone.html'">ACCESS</button>
      </div>

      <div class="ship-entry">
        <div><span class="ship-name">ISS</span> <span class="ship-type">(International)</span></div>
        <button class="details-button" onclick="window.location='iss.html'">ACCESS</button>
      </div>

      <div class="ship-entry">
        <div><span class="ship-name">Buran</span> <span class="ship-type">(USSR)</span></div>
        <button class="details-button" onclick="window.location='buran.html'">ACCESS</button>
      </div>

    </div>

    <p style="opacity:.5;margin-top:20px;">
      NOTE: Some registry entries are partially corrupted or redacted.
    </p>

  </div>

  <div id="terminal-box">
    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off" placeholder="Enter command">
    </div>
  </div>

</div>

<div id="os">UIC OS v1.0.4</div>

<script>
const container = document.getElementById("crt-container");
const os = document.getElementById("os");

document.addEventListener("mousemove", e=>{
  const x = (window.innerWidth/2 - e.clientX)/1000;
  const y = (window.innerHeight/2 - e.clientY)/1000;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});

const input = document.getElementById("cmd");
input.addEventListener("keydown", e=>{
  if(e.key !== "Enter") return;

  const cmd = input.value.toLowerCase().trim();

  switch(cmd){
    case "home": window.location="index.html"; break;
    case "ships": window.location="ships.html"; break;
    case "stations": window.location="stations.html"; break;
    case "about": window.location="about.html"; break;
    case "games": window.location="games.html"; break;
    case "contact": window.location="contact.html"; break;
  }

  input.value="";
});
</script>

</body>
</html>

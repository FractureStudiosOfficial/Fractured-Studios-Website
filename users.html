<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC User Database</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow-y:auto;
}

#background-layer {
  position:fixed;
  inset:0;
  transform-style:preserve-3d;
  pointer-events:none; /* prevent interference with clicks */
}

#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}

#crt-container {
  display:flex;
  flex-direction:column;
  padding:40px;
  min-height:100vh;
  z-index:1;
  position:relative;
}

h1 {
  margin-top:0;
}

#user-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.user-card {
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,159,7,.2);
  padding:20px;
  height:120px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s ease, transform 0.2s ease;
  text-align:center;
}
.user-card:hover {
  background:rgba(0,0,0,.4);
  transform:scale(1.05);
}

.user-name {
  font-weight:bold;
}
.user-role {
  font-size:0.8em;
  opacity:0.7;
  margin-top:5px;
}

.pagination {
  display:flex;
  justify-content:center;
  align-items:center;
  margin-top:20px;
  gap:20px;
}

.page-btn {
  background:rgba(0,0,0,.25);
  border:1px solid rgba(255,159,7,.2);
  padding:10px 15px;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s ease;
}
.page-btn:hover {
  background:rgba(0,0,0,.4);
}

#terminal-box {
  background:rgba(0,0,0,.25);
  padding:15px;
  border:1px solid rgba(255,159,7,.2);
  display:flex;
  position:sticky;
  bottom:0;
  width:100%;
  box-sizing:border-box;
}

#prompt {
  display:flex;
  flex:1;
}

#prompt input {
  background:transparent;
  border:none;
  outline:none;
  color:#FF9F07;
  font-family:inherit;
  flex:1;
}

#os {
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
}

p.note {
  opacity:0.6;
  text-align:center;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>
<div id="background-layer"></div>

<div id="crt-container">

  <h1>U.I.C. User Database</h1>
  
  <div id="user-grid"></div>
  <div class="pagination">
    <div id="prev-btn" class="page-btn">&lt; Prev</div>
    <div id="next-btn" class="page-btn">Next &gt;</div>
  </div>
  <p class="note">Unable to load more users.</p>

  <div id="terminal-box">
    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off">
    </div>
  </div>
  
</div>

<div id="os">UIC OS v1.0.4</div>

<script>
// Users data
const users = [
  {name:"James Maniston", file:"jamesmaniston.html", roles:["Scientist","Engineer"]},
  {name:"[DATA CORRUPTED]", file:"datacorrupted.html", roles:["Scientist","Engineer"]},
  {name:"Dr. Helena Frost", file:"helenafrost.html", roles:["Scientist"]},
  {name:"Dr. Elias Vega", file:"eliasvega.html", roles:["Engineer"]},
  {name:"Dr. Monica Reyes", file:"monicareyes.html", roles:["Scientist"]},
  {name:"Dr. Tobias Kane", file:"tobiaskane.html", roles:["Engineer"]},
  {name:"Dr. Serena Wu", file:"serenawu.html", roles:["Scientist"]},
  {name:"Dr. Victor Lang", file:"victorlang.html", roles:["Engineer"]},
  {name:"Dr. Farah Nadir", file:"farahnadir.html", roles:["Scientist"]},
  {name:"Dr. Akio Tanaka", file:"akiotanaka.html", roles:["Engineer"]},
  {name:"Dr. Liora Stein", file:"liorastein.html", roles:["Scientist"]},
  {name:"Dr. Marco Silva", file:"marcosilva.html", roles:["Engineer"]},
  {name:"Dr. Priya Nandakumar", file:"priyanandakumar.html", roles:["Scientist"]}
];

const usersPerPage = 6;
let currentPage = 0;

const userGrid = document.getElementById("user-grid");

function renderUsers() {
  userGrid.innerHTML = "";
  const start = currentPage * usersPerPage;
  const end = start + usersPerPage;
  for(let i=start; i<end; i++){
    const u = users[i];
    const card = document.createElement("div");
    card.className="user-card";
    if(u){
      card.onclick = ()=> window.location=u.file;
      card.innerHTML = `<div class="user-name">${u.name}</div>
                        <div class="user-role">${u.roles.join(", ")}</div>`;
    } else {
      card.innerHTML = "[ERROR]";
      card.style.opacity = "0.6";
      card.style.cursor = "default";
    }
    userGrid.appendChild(card);
  }
}

document.getElementById("prev-btn").addEventListener("click", ()=>{
  if(currentPage>0){currentPage--; renderUsers();}
});
document.getElementById("next-btn").addEventListener("click", ()=>{
  if((currentPage+1)*usersPerPage<users.length){currentPage++; renderUsers();}
});

renderUsers();

// Terminal commands
const input = document.getElementById("cmd");
input.addEventListener("keydown", e=>{
  if(e.key!=="Enter") return;
  const cmd = input.value.toLowerCase().trim();
  if(cmd==="about") window.location="about.html";
  else if(cmd==="games") window.location="games.html";
  else if(cmd==="contact") window.location="contact.html";
  else if(cmd==="users") window.location="users.html";
  else console.log("Unknown command: "+cmd);
  input.value="";
});

// 3D tilt only applied to background-layer
const bg = document.getElementById("background-layer");
const os = document.getElementById("os");
document.addEventListener("mousemove", e => {
  const x = (window.innerWidth/2 - e.clientX)/2000; // subtle
  const y = (window.innerHeight/2 - e.clientY)/2000;
  bg.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});
</script>

</body>
</html>

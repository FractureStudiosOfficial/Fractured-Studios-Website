<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC User Database</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow-y:auto;
  perspective:1000px;
}

#crt-container {
  display:flex;
  flex-direction:column;
  padding:40px;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
  min-height:100vh;
}

#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}

#user-list {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:20px;
}

.user-card {
  background:rgba(0,0,0,.25);
  padding:15px;
  border:1px solid rgba(255,159,7,.2);
  cursor:pointer;
  transition:0.2s ease;
  text-align:center;
}
.user-card:hover {
  background:rgba(0,0,0,.4);
  transform:scale(1.02);
}

#terminal-box {
  background:rgba(0,0,0,.25);
  padding:15px;
  border:1px solid rgba(255,159,7,.2);
  display:flex;
  position:sticky;
  bottom:0;
  width:100%;
  box-sizing:border-box;
}

#prompt {
  display:flex;
  flex:1;
}

#prompt input {
  background:transparent;
  border:none;
  outline:none;
  color:#FF9F07;
  font-family:inherit;
  flex:1;
}

#os {
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
}

h1 {
  margin-top:0;
}

p.note {
  opacity:0.6;
}
</style>
</head>

<body>
<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">

  <h1>UIC Scientist User Database</h1>
  
  <div id="user-list"></div>
  
  <p class="note">Unable to load more users.</p>

  <div id="terminal-box">
    <div id="prompt">
      <span>></span>
      <input id="cmd" autocomplete="off">
    </div>
  </div>
  
</div>

<div id="os">UIC OS v1.0.4</div>

<script>
// Users data with file names for dedicated pages
const users = [
  {name:"James Maniston", file:"jamesmaniston.html"},
  {name:"[DATA CORRUPTED]", file:"datacorrupted.html"},
  {name:"Dr. Helena Frost", file:"helenafrost.html"},
  {name:"Dr. Elias Vega", file:"eliasvega.html"},
  {name:"Dr. Monica Reyes", file:"monicareyes.html"},
  {name:"Dr. Tobias Kane", file:"tobiaskane.html"},
  {name:"Dr. Serena Wu", file:"serenawu.html"},
  {name:"Dr. Victor Lang", file:"victorlang.html"},
  {name:"Dr. Farah Nadir", file:"farahnadir.html"},
  {name:"Dr. Akio Tanaka", file:"akiotanaka.html"},
  {name:"Dr. Liora Stein", file:"liorastein.html"},
  {name:"Dr. Marco Silva", file:"marcosilva.html"},
  {name:"Dr. Priya Nandakumar", file:"priyanandakumar.html"}
];

// Populate user list
const userList = document.getElementById("user-list");
users.forEach(u=>{
  const card = document.createElement("div");
  card.className="user-card";
  card.innerText=u.name;
  card.onclick = ()=> window.location=u.file;
  userList.appendChild(card);
});

// Terminal functionality
const input = document.getElementById("cmd");
input.addEventListener("keydown", e=>{
  if(e.key!=="Enter") return;
  const cmd = input.value.toLowerCase().trim();
  if(cmd==="about") window.location="about.html";
  else if(cmd==="games") window.location="games.html";
  else if(cmd==="contact") window.location="contact.html";
  else if(cmd==="users") window.location="users.html";
  else console.log("Unknown command: "+cmd);
  input.value="";
});

// 3D tilt effect
const container = document.getElementById("crt-container");
const os = document.getElementById("os");
document.addEventListener("mousemove", e => {
  const x = (window.innerWidth/2 - e.clientX)/1000;
  const y = (window.innerHeight/2 - e.clientY)/1000;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});
</script>
</body>
</html>

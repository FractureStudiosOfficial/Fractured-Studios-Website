<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Users</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow-y:auto;
  perspective:1000px;
}

/* CRT container */
#crt-container {
  padding:40px;
  box-sizing:border-box;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
}

/* User list */
.user-list {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-bottom:30px;
}

.user-card {
  background:rgba(0,0,0,.25);
  padding:15px;
  border:1px solid rgba(255,159,7,.2);
  cursor:pointer;
  transition:.2s ease;
}
.user-card:hover {
  filter:drop-shadow(0 0 15px #FF9F07);
}

/* User detail */
#user-detail {
  display:none;
  background:rgba(0,0,0,.25);
  padding:20px;
  border:1px solid rgba(255,159,7,.2);
  margin-top:20px;
}

#user-detail h2 {
  margin-top:0;
}

/* OS version */
#os {
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
}

/* Scanlines */
#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

/* Amber tint overlay */
#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>
<div id="crt-container">

  <h1>UIC Registered Users</h1>

  <div class="user-list" id="user-list">
    <!-- User cards populated via JS -->
  </div>

  <div id="user-detail"></div>

  <p id="end-msg" style="opacity:.6;margin-top:20px;">Unable to load more users</p>

</div>

<div id="os">UIC OS v1.0.4</div>

<script>
// USERS DATA
const users = [

    bio:"James specializes in regenerative cellular biology, pioneering stem-cell applications."
  },
  {
    name:"[DATA CORRUPTED]",
    occupation:"Unknown",
    age:"???",
    specialty:"???",
    previous:["???"],
    bio:"Records are incomplete due to a critical system corruption. Identity unknown."
  },
  {
    name:"Dr. Elara Voss",
    occupation:"Astrophysicist",
    age:38,
    specialty:"Exoplanetary Systems",
    previous:["NASA JPL","Caltech Observatory"],
    bio:"Elara researches planetary formation and habitability in distant solar systems."
  },
  {

  },
  {

    bio:"Liora focuses on gene-editing technologies and therapeutic solutions for rare diseases."
  },
  {

    bio:"Theo studies human cognition and memory mapping using neural imaging technology."
  },
  {

  {

  },
  {
    name:"Dr. Sofia Rinaldi",

    age:39,
    specialty:"Coral Ecosystems",
    previous:["Monterey Bay Aquarium Research","University of Genoa"],
    bio:"Sofia researches marine biodiversity and coral reef restoration."
  },
  {

    age:41,

    bio:"Henrik develops quantum algorithms and investigates high-speed computing systems."
  },
  {
    name:"Dr. Amara Johnson",

  },

    occupation:"Bioinformatics Specialist",

    previous:["UCLA Bioinformatics","GenomeX Labs"],

  },
  {

    age:37,
    specialty:"Synthetic Polymers",
    previous:["Tsinghua University","PolyChem Solutions"],
    bio:"Li researches innovative synthetic polymers and sustainable chemical processes."
  }
];

// GENERATE USER CARDS
const userList = document.getElementById("user-list");
const userDetail = document.getElementById("user-detail");

users.forEach((user, index) => {
  const card = document.createElement("div");
  card.className = "user-card";
  card.textContent = user.name;
  card.addEventListener("click", () => {
    displayUser(user);
  });
  userList.appendChild(card);
});

// DISPLAY USER DETAILS
function displayUser(user) {
  userDetail.style.display = "block";
  userDetail.innerHTML = `
    <h2>${user.name}</h2>
    <p><strong>Occupation:</strong> ${user.occupation}</p>
    <p><strong>Age:</strong> ${user.age}</p>
    <p><strong>Specialty:</strong> ${user.specialty}</p>
    <p><strong>Previous Positions:</strong> ${user.previous.join(", ")}</p>
    <p><strong>Bio:</strong> ${user.bio}</p>
  `;
}

// OPTIONAL: 3D tilt effect
const container = document.getElementById("crt-container");
const os = document.getElementById("os");

document.addEventListener("mousemove", e => {
  const x = (window.innerWidth/2 - e.clientX)/1000;
  const y = (window.innerHeight/2 - e.clientY)/1000;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
  os.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});
</script>

</body>
</html>

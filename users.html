<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC User Database</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
    --amber:#FF9F07;
    --amberBright:#FFC861;
}

*{box-sizing:border-box;}

body{
    margin:0;
    background:#050505;
    color:var(--amber);
    font-family:'Share Tech Mono', monospace;
    overflow-x:hidden;
}

/* =========================
   GLOBAL FX
========================= */
#scanlines{
    position:fixed;
    inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,.05) 0px,
        rgba(255,255,255,.05) 2px,
        transparent 5px,
        transparent 9px
    );
    animation:flicker .12s infinite;
    z-index:1001;
}

@keyframes flicker{
    0%{opacity:.15}
    50%{opacity:.08}
    100%{opacity:.15}
}

#amber{
    position:fixed;
    inset:0;
    background:rgba(255,159,7,.04);
    pointer-events:none;
}

/* =========================
   LAYOUT ROOT
========================= */
#crt-container{
    position:relative;
    min-height:100vh;
    padding:35px;
}

/* =========================
   HEADER PANEL
========================= */
.header{
    padding:25px;
    margin-bottom:25px;
    border:2px solid rgba(255,159,7,.22);
    background:
        linear-gradient(
            180deg,
            rgba(255,159,7,.03),
            rgba(0,0,0,.25)
        );
    box-shadow:
        inset 0 0 25px rgba(255,159,7,.03);
}

.header h1{
    margin:0;
    letter-spacing:.25em;
    border-bottom:1px solid rgba(255,159,7,.2);
    padding-bottom:10px;
}

.header p{
    opacity:.65;
    margin-top:10px;
}

/* =========================
   GRID PANEL
========================= */
.panel{
    border:2px solid rgba(255,159,7,.2);
    background:rgba(0,0,0,.25);
    padding:20px;
    box-shadow:
        inset 0 0 25px rgba(255,159,7,.02);
}

/* =========================
   USER GRID
========================= */
#user-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:18px;
}

/* DATABASE CARD STYLE */
.user-card{
    position:relative;
    padding:18px;
    height:130px;

    border:1px solid rgba(255,159,7,.18);
    background:
        linear-gradient(
            180deg,
            rgba(255,159,7,.02),
            rgba(0,0,0,.3)
        );

    display:flex;
    flex-direction:column;
    justify-content:center;
    text-align:center;

    cursor:pointer;
    transition:.2s ease;
}

.user-card::before{
    content:"";
    position:absolute;
    inset:10px;
    border:1px solid rgba(255,159,7,.08);
    pointer-events:none;
}

.user-card:hover{
    transform:translateY(-3px);
    box-shadow:0 0 18px rgba(255,159,7,.12);
    background:rgba(255,159,7,.04);
}

.user-name{
    font-weight:bold;
    letter-spacing:.05em;
}

.user-role{
    font-size:12px;
    opacity:.65;
    margin-top:6px;
}

/* =========================
   PAGINATION CONTROLS
========================= */
.pagination{
    margin-top:18px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.page-btn{
    padding:10px 14px;
    border:1px solid rgba(255,159,7,.2);
    background:rgba(0,0,0,.25);
    cursor:pointer;
    transition:.2s ease;
    letter-spacing:.1em;
}

.page-btn:hover{
    background:rgba(255,159,7,.1);
    box-shadow:0 0 10px rgba(255,159,7,.15);
}

/* =========================
   NOTE
========================= */
.note{
    text-align:center;
    opacity:.55;
    margin-top:10px;
}

/* =========================
   TERMINAL
========================= */
#terminal-box{
    position:fixed;
    bottom:0;
    left:0;
    right:0;

    display:flex;
    padding:12px 18px;
    gap:10px;

    border-top:2px solid rgba(255,159,7,.22);
    background:rgba(0,0,0,.45);
}

#terminal-box input{
    flex:1;
    background:none;
    border:none;
    outline:none;
    color:var(--amber);
    font-family:inherit;
}

/* =========================
   OS LABEL
========================= */
#os{
    position:fixed;
    bottom:55px;
    right:15px;
    font-size:12px;
    opacity:.7;
}

/* =========================
   RESPONSIVE
========================= */
@media(max-width:700px){
    #crt-container{padding:20px;}
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">

    <div class="header panel">
        <h1>U.I.C. USER DATABASE</h1>
        <p>PERSONNEL INDEX / CLASSIFIED ACCESS GRID</p>
    </div>

    <div class="panel">

        <div id="user-grid"></div>

        <div class="pagination">
            <div id="prev-btn" class="page-btn">&lt; PREV</div>
            <div id="next-btn" class="page-btn">NEXT &gt;</div>
        </div>

        <p class="note">Unable to load more users.</p>

    </div>

</div>

<!-- TERMINAL -->
<div id="terminal-box">
    <span>&gt;</span>
    <input id="cmd" autocomplete="off">
</div>

<div id="os">UIC OS v1.0.4</div>

<script>
/* =========================
   USERS DATA (UNCHANGED)
========================= */
const users = [
  {name:"James Maniston", file:"jamesmaniston.html", roles:["Scientist","Engineer"]},
  {name:"[DATA CORRUPTED]", file:"datacorrupted.html", roles:["Scientist","Engineer"]},
  {name:"Dr. Helena Frost", file:"helenafrost.html", roles:["Scientist"]},
  {name:"Dr. Elias Vega", file:"eliasvega.html", roles:["Engineer"]},
  {name:"Dr. Monica Reyes", file:"monicareyes.html", roles:["Scientist"]},
  {name:"Dr. Tobias Kane", file:"tobiaskane.html", roles:["Engineer"]},
  {name:"Dr. Serena Wu", file:"serenawu.html", roles:["Scientist"]},
  {name:"Dr. Victor Lang", file:"victorlang.html", roles:["Engineer"]},
  {name:"Dr. Farah Nadir", file:"farahnadir.html", roles:["Scientist"]},
  {name:"Dr. Akio Tanaka", file:"akiotanaka.html", roles:["Engineer"]},
  {name:"Dr. Liora Stein", file:"liorastein.html", roles:["Scientist"]},
  {name:"Dr. Marco Silva", file:"marcosilva.html", roles:["Engineer"]},
  {name:"Dr. Priya Nandakumar", file:"priyanandakumar.html", roles:["Scientist"]}
];

const usersPerPage = 6;
let currentPage = 0;

const grid = document.getElementById("user-grid");

/* =========================
   RENDER USERS
========================= */
function renderUsers(){
    grid.innerHTML="";

    const start=currentPage*usersPerPage;
    const end=start+usersPerPage;

    for(let i=start;i<end;i++){

        const u=users[i];

        const card=document.createElement("div");
        card.className="user-card";

        if(u){
            card.onclick=()=>window.location=u.file;
            card.innerHTML=`
                <div class="user-name">${u.name}</div>
                <div class="user-role">${u.roles.join(" / ")}</div>
            `;
        }else{
            card.innerHTML="CORRUPTED ENTRY";
            card.style.opacity=".4";
        }

        grid.appendChild(card);
    }
}

renderUsers();

/* =========================
   PAGINATION
========================= */
document.getElementById("prev-btn").onclick=()=>{
    if(currentPage>0){
        currentPage--;
        renderUsers();
    }
};

document.getElementById("next-btn").onclick=()=>{
    if((currentPage+1)*usersPerPage<users.length){
        currentPage++;
        renderUsers();
    }
};

/* =========================
   TERMINAL NAV (UNCHANGED)
========================= */
const input=document.getElementById("cmd");

input.addEventListener("keydown",e=>{
    if(e.key!=="Enter")return;

    const cmd=input.value.toLowerCase().trim();

    if(cmd==="about")window.location="about.html";
    if(cmd==="games")window.location="games.html";
    if(cmd==="contact")window.location="contact.html";
    if(cmd==="users")window.location="users.html";

    input.value="";
});
</script>

</body>
</html>

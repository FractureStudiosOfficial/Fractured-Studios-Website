<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Suit Inspection Chamber</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --amber:#ff9f07;
  --glass:rgba(0,0,0,.35);
  --line:rgba(255,159,7,.22);
}

/* =========================
   BASE
========================= */
body{
  margin:0;
  background:#070707;
  color:var(--amber);
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
}

/* FX LAYERS */
#amber,
#scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#amber{
  background:rgba(255,159,7,.04);
  z-index:1;
}

#scanlines{
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 6px,
    transparent 10px
  );
  animation:flicker .12s infinite;
  z-index:2;
}

@keyframes flicker{
  0%{opacity:.14}
  50%{opacity:.06}
  100%{opacity:.14}
}

/* =========================
   MAIN LAYOUT
========================= */
#ui{
  position:relative;
  z-index:5;
  height:100vh;
  display:flex;
}

/* =========================
   LEFT PANEL (SUIT SELECT)
========================= */
#panel{
  width:260px;
  background:rgba(0,0,0,.45);
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
}

.panel-header{
  padding:18px;
  border-bottom:1px solid var(--line);
  letter-spacing:.2em;
  font-size:14px;
  opacity:.8;
}

.suit-tab{
  padding:16px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,159,7,.08);
  transition:.2s;
}

.suit-tab:hover{
  background:rgba(255,159,7,.06);
}

.suit-tab.active{
  background:rgba(255,159,7,.12);
  box-shadow:inset 0 0 20px rgba(255,159,7,.08);
}

/* =========================
   VIEWPORT
========================= */
#viewport{
  flex:1;
  position:relative;
  background:radial-gradient(circle at center, rgba(255,159,7,.05), transparent 60%);
}

/* TITLE */
#title{
  position:absolute;
  top:30px;
  left:30px;
  font-size:18px;
  letter-spacing:.25em;
  z-index:10;
}

/* INFO PANEL */
#hud{
  position:absolute;
  bottom:30px;
  left:30px;
  display:flex;
  gap:10px;
  z-index:10;
}

.btn{
  padding:10px 14px;
  border:1px solid var(--amber);
  background:transparent;
  color:var(--amber);
  cursor:pointer;
  font-family:inherit;
  transition:.2s;
}

.btn:hover{
  background:rgba(255,159,7,.12);
}

/* 3D CONTAINER */
#model-wrap{
  width:100%;
  height:100%;
}

/* OS */
#os{
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
  z-index:10;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="ui">

  <!-- LEFT PANEL -->
  <div id="panel">
    <div class="panel-header">SUIT ARCHIVE</div>

    <div class="suit-tab active" onclick="switchSuit('emu')">
      U.S. EMU SUIT
    </div>

    <div class="suit-tab" onclick="switchSuit('orlan')">
      SOVIET ORLAN
    </div>
  </div>

  <!-- VIEWPORT -->
  <div id="viewport">

    <div id="title">EMU EVA SUIT</div>

    <div id="model-wrap"></div>

    <div id="hud">
      <button class="btn" onclick="openInfo()">VIEW DOSSIER</button>
    </div>

  </div>

</div>

<div id="os">UIC SUIT CHAMBER v1.0</div>

<!-- THREE JS (WORKING VERSION) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
/* =========================
   SUITS CONFIG (EDIT HERE)
========================= */
const suits = {
  emu:{
    name:"EMU EVA SUIT",
    model:"emu.glb",
    page:"emu.html"
  },
  orlan:{
    name:"SOVIET ORLAN SUIT",
    model:"Displaypose.glb",
    page:"orlan.html"
  }
};

let current = "emu";
let model = null;

/* =========================
   THREE SETUP (FIXED)
========================= */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

camera.position.set(0,1.2,3);

const renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("model-wrap").appendChild(renderer.domElement);

/* LIGHTING (THIS FIXES “MODEL NOT SHOWING”) */
const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
light1.position.set(3,3,3);
scene.add(light1);

const light2 = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(light2);

/* LOADER */
const loader = new THREE.GLTFLoader();

/* =========================
   LOAD SUIT
========================= */
function loadSuit(id){

  current = id;

  document.getElementById("title").textContent = suits[id].name;

  document.querySelectorAll(".suit-tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");

  if(model){
    scene.remove(model);
    model = null;
  }

  loader.load(
    suits[id].model,
    gltf=>{
      model = gltf.scene;

      /* IMPORTANT: scale safety */
      model.scale.set(1,1,1);
      model.position.set(0,-1,0);

      scene.add(model);
    },
    undefined,
    err=>{
      console.error("Model failed to load:", err);
    }
  );
}

/* alias for tabs */
function switchSuit(id){
  loadSuit(id);
}

/* =========================
   INFO BUTTON
========================= */
function openInfo(){
  window.location = `folder_suits/${current}.html`;
}

/* =========================
   ANIMATION LOOP
========================= */
function animate(){
  requestAnimationFrame(animate);

  if(model){
    model.rotation.y += 0.0025;
  }

  renderer.render(scene,camera);
}
animate();

/* resize fix */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Suit Registry</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#050505;
color:#FF9F07;
font-family:'Share Tech Mono', monospace;
overflow:hidden;
}

/* CRT */
#scanlines{
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.04) 0px,
rgba(255,255,255,.04) 2px,
transparent 6px
);
animation:flicker .12s infinite;
opacity:.7;
}

@keyframes flicker{
0%{opacity:.15}
50%{opacity:.08}
100%{opacity:.15}
}

#amber{
position:fixed;
inset:0;
background:radial-gradient(circle at center, rgba(255,159,7,.06), transparent 60%);
pointer-events:none;
}

/* LAYOUT */
#ui{
display:grid;
grid-template-columns:240px 1fr;
height:100vh;
}

/* TABS */
#tabs{
background:rgba(0,0,0,.4);
border-right:1px solid rgba(255,159,7,.2);
padding:20px;
display:flex;
flex-direction:column;
gap:12px;
}

.tab{
padding:12px;
border:1px solid rgba(255,159,7,.25);
cursor:pointer;
transition:.2s;
background:rgba(0,0,0,.2);
}

.tab:hover{
transform:translateX(5px);
background:rgba(255,159,7,.08);
}

.tab.active{
background:rgba(255,159,7,.12);
box-shadow:0 0 15px rgba(255,159,7,.15);
}

/* VIEWPORT */
#viewer{
position:relative;
overflow:hidden;
}

#header{
position:absolute;
top:12px;
left:16px;
letter-spacing:.2em;
opacity:.7;
z-index:10;
}

/* INFO BAR */
#info{
position:absolute;
bottom:0;
left:0;
right:0;
height:140px;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(0,0,0,.55);
border-top:1px solid rgba(255,159,7,.2);
backdrop-filter:blur(6px);
}

#desc{
max-width:70%;
opacity:.85;
}

button{
background:transparent;
border:1px solid #FF9F07;
color:#FF9F07;
padding:10px 18px;
cursor:pointer;
font-family:inherit;
transition:.2s;
}

button:hover{
background:rgba(255,159,7,.1);
}

/* OS */
#os{
position:fixed;
bottom:10px;
right:15px;
font-size:12px;
opacity:.6;
pointer-events:none;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="ui">

<!-- TABS -->
<div id="tabs">
<div class="tab active" onclick="switchSuit(event,'emu')">US EMU SUIT</div>
<div class="tab" onclick="switchSuit(event,'orlan')">SOVIET ORLAN</div>
</div>

<!-- VIEWER -->
<div id="viewer">
<div id="header">UIC SUIT REGISTRY</div>
<div id="info">
<div id="desc">Loading suit...</div>
<button id="infoBtn">VIEW FILE</button>
</div>
</div>

</div>

<div id="os">UIC OS v1.0.4</div>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, model;
let current = "emu";

const suits = {
emu:{
file:"models/emu.glb",
page:"folder_suits/emu.html",
text:"US EMU EVA suit designed for orbital maintenance and EVA operations."
},
orlan:{
file:"folder_suits/Displaypose.glb",
page:"folder_suits/orlan.html",
text:"Soviet Orlan EVA suit optimized for long-duration extravehicular missions."
}
};

/* INIT */
init();

function init(){

scene = new THREE.Scene();
scene.background = new THREE.Color(0x050505);

camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0,0,3);

renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("viewer").appendChild(renderer.domElement);

/* LIGHTS (IMPORTANT FIX) */
const keyLight = new THREE.DirectionalLight(0xff9f07, 2);
keyLight.position.set(2,2,2);
scene.add(keyLight);

const fill = new THREE.AmbientLight(0xffffff, 0.4);
scene.add(fill);

/* START */
loadSuit("emu");
animate();
}

/* LOAD MODEL */
function loadModel(path){

if(model){
scene.remove(model);
model = null;
}

const loader = new THREE.GLTFLoader();

loader.load(path, gltf=>{

model = gltf.scene;

/* AUTO CENTER */
const box = new THREE.Box3().setFromObject(model);
const size = box.getSize(new THREE.Vector3()).length();
const center = box.getCenter(new THREE.Vector3());

model.position.sub(center);

/* AUTO SCALE */
const scale = 2.5 / size;
model.scale.setScalar(scale);

/* WIREFRAME OPTION */
model.traverse(obj=>{
if(obj.isMesh){
obj.material.wireframe = true;
obj.material.color = new THREE.Color(0xff9f07);
}
});

scene.add(model);

}, undefined, err=>{
console.error("MODEL FAILED TO LOAD:", err);

/* FALLBACK CUBE DEBUG */
const geo = new THREE.BoxGeometry(1,1,1);
const mat = new THREE.MeshBasicMaterial({color:0xff9f07, wireframe:true});
model = new THREE.Mesh(geo,mat);
scene.add(model);
});
}

/* SWITCH SUIT */
function switchSuit(e, key){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
e.target.classList.add("active");

current = key;
loadModel(suits[key].file);

document.getElementById("desc").textContent = suits[key].text;
document.getElementById("infoBtn").onclick = ()=> {
window.location = suits[key].page;
};
}

/* RENDER LOOP */
function animate(){
requestAnimationFrame(animate);

if(model){
model.rotation.y += 0.002;
}

renderer.render(scene,camera);
}

/* RESIZE */
window.addEventListener("resize", ()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>

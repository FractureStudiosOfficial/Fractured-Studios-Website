<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Suit Archive</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
:root{
  --amber:#ff9f07;
}

/* =========================
   BASE
========================= */
body{
  margin:0;
  background:#0b0b0b;
  color:var(--amber);
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
}

/* =========================
   FX LAYERS (SAFE)
========================= */
#amber,
#scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
}

#amber{
  background:rgba(255,159,7,.04);
  z-index:1;
}

#scanlines{
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:2;
}

@keyframes flicker{
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

/* =========================
   MAIN WRAP
========================= */
#ui{
  position:relative;
  z-index:5;
  height:100vh;
  display:flex;
}

/* =========================
   VERTICAL TABS
========================= */
#tabs{
  width:220px;
  background:rgba(0,0,0,.35);
  border-right:1px solid rgba(255,159,7,.2);
  display:flex;
  flex-direction:column;
}

.tab{
  padding:18px;
  cursor:pointer;
  border-bottom:1px solid rgba(255,159,7,.1);
  transition:.2s;
}

.tab:hover{
  background:rgba(255,159,7,.08);
}

.tab.active{
  background:rgba(255,159,7,.12);
  box-shadow:inset 0 0 20px rgba(255,159,7,.15);
}

/* =========================
   VIEWER
========================= */
#viewer{
  flex:1;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.2);
}

/* 3D canvas holder */
#model-container{
  width:100%;
  height:100%;
  position:absolute;
}

/* overlay UI */
#hud{
  position:absolute;
  bottom:30px;
  left:30px;
  display:flex;
  gap:10px;
}

/* buttons */
.btn{
  padding:10px 14px;
  border:1px solid var(--amber);
  background:transparent;
  color:var(--amber);
  font-family:inherit;
  cursor:pointer;
  transition:.2s;
}

.btn:hover{
  background:rgba(255,159,7,.12);
}

/* label */
#suit-name{
  position:absolute;
  top:30px;
  left:30px;
  font-size:18px;
  letter-spacing:.2em;
}

/* OS */
#os{
  position:fixed;
  bottom:10px;
  right:15px;
  font-size:12px;
  opacity:.7;
  z-index:10;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="ui">

  <!-- TABS -->
  <div id="tabs">

    <div class="tab active" onclick="loadSuit('emu')">
      U.S. EMU SUIT
    </div>

    <div class="tab" onclick="loadSuit('orlan')">
      SOVIET ORLAN
    </div>

  </div>

  <!-- VIEWER -->
  <div id="viewer">

    <div id="suit-name">EMU EVA SUIT</div>

    <div id="model-container"></div>

    <div id="hud">
      <button class="btn" onclick="openInfo()">INFO</button>
    </div>

  </div>

</div>

<div id="os">UIC SUIT ARCHIVE v1.0</div>

<!-- THREE.JS (for 3D models) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
/* =========================
   CONFIG (YOU EDIT THIS)
========================= */
const suits = {
  emu:{
    name:"EMU EVA SUIT",
    model:"emu.glb",
    info:"emu"
  },
  orlan:{
    name:"SOVIET ORLAN SUIT",
    model:"Displaypose.glb",
    info:"orlan"
  }
};

/* =========================
   THREE SETUP
========================= */
const container = document.getElementById("model-container");

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

const light = new THREE.AmbientLight(0xffffff, 1.2);
scene.add(light);

let currentModel = null;

/* =========================
   LOAD SUIT
========================= */
function loadSuit(id){

  const data = suits[id];

  document.getElementById("suit-name").textContent = data.name;

  // tab UI
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");

  // remove old model
  if(currentModel){
    scene.remove(currentModel);
    currentModel = null;
  }

  const loader = new THREE.GLTFLoader();

  loader.load(data.model, gltf=>{
    currentModel = gltf.scene;
    currentModel.scale.set(1,1,1);
    scene.add(currentModel);
  });
}

/* default */
loadSuit("emu");

/* =========================
   ROTATION LOOP
========================= */
function animate(){
  requestAnimationFrame(animate);

  if(currentModel){
    currentModel.rotation.y += 0.003;
  }

  renderer.render(scene,camera);
}
animate();

/* =========================
   INFO BUTTON
========================= */
function openInfo(){
  const active = document.querySelector(".tab.active");
  const suitKey = active.textContent.includes("EMU") ? "emu" : "orlan";
  window.location = `folder_suits/${suits[suitKey].info}.html`;
}

/* resize */
window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>

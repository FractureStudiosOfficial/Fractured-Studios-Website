<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Suit Registry</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#070707;
color:#FF9F07;
font-family:'Share Tech Mono', monospace;
overflow:hidden;
}

/* CRT LAYERS */
#scanlines{
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.04) 0px,
rgba(255,255,255,.04) 2px,
transparent 5px,
transparent 9px
);
animation:flicker .12s infinite;
}

@keyframes flicker{
0%{opacity:.15}
50%{opacity:.08}
100%{opacity:.15}
}

#amber{
position:fixed;
inset:0;
background:rgba(255,159,7,.04);
pointer-events:none;
}

/* MAIN GRID */
#ui{
display:grid;
grid-template-columns:260px 1fr;
height:100vh;
}

/* SIDE TABS */
#tabs{
border-right:1px solid rgba(255,159,7,.2);
background:rgba(0,0,0,.35);
display:flex;
flex-direction:column;
padding:20px;
gap:15px;
}

.tab{
padding:15px;
border:1px solid rgba(255,159,7,.2);
cursor:pointer;
transition:.2s;
background:rgba(0,0,0,.2);
}

.tab:hover{
background:rgba(255,159,7,.08);
transform:translateX(4px);
}

.tab.active{
background:rgba(255,159,7,.12);
box-shadow:0 0 15px rgba(255,159,7,.15);
}

/* VIEWER */
#viewer{
position:relative;
display:flex;
flex-direction:column;
}

#model-container{
flex:1;
position:relative;
}

/* INFO PANEL */
#info{
height:160px;
border-top:1px solid rgba(255,159,7,.2);
background:rgba(0,0,0,.35);
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

#info button{
background:transparent;
border:1px solid #FF9F07;
color:#FF9F07;
padding:10px 20px;
cursor:pointer;
font-family:inherit;
transition:.2s;
}

#info button:hover{
background:rgba(255,159,7,.1);
}

/* HEADER LABEL */
#header{
position:absolute;
top:15px;
left:20px;
z-index:10;
opacity:.8;
letter-spacing:.2em;
}

/* OS */
#os{
position:fixed;
bottom:10px;
right:15px;
font-size:12px;
opacity:.7;
pointer-events:none;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="ui">

<!-- TABS -->
<div id="tabs">
<div class="tab active" onclick="loadSuit('emu')">US EMU SUIT</div>
<div class="tab" onclick="loadSuit('orlan')">SOVIET ORLAN</div>
</div>

<!-- VIEWER -->
<div id="viewer">

<div id="header">UIC SUIT REGISTRY</div>
<div id="model-container"></div>

<div id="info">
<div id="desc">
Loading suit data...
</div>

<button id="infoBtn">VIEW FILE</button>
</div>

</div>

</div>

<div id="os">UIC OS v1.0.4</div>

<!-- THREE.JS -->
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
let scene, camera, renderer, model;

const container = document.getElementById("model-container");
const desc = document.getElementById("desc");
const infoBtn = document.getElementById("infoBtn");

const suits = {
emu:{
file:"models/emu.glb",
page:"folder_suits/emu.html",
text:"United States Extravehicular Mobility Unit. Designed for orbital EVA operations and deep-space station maintenance."
},
orlan:{
file:"folder_suits/Displaypose.glb",
page:"folder_suits/orlan.html",
text:"Soviet Orlan EVA suit. Modular semi-rigid design optimized for long-duration extravehicular operations."
}
};

let current = "emu";

/* INIT THREE */
function init(){
scene = new THREE.Scene();

camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 2.5;

renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
container.appendChild(renderer.domElement);

/* LIGHT */
const light = new THREE.DirectionalLight(0xff9f07, 1);
light.position.set(2,2,2);
scene.add(light);

const ambient = new THREE.AmbientLight(0x333333);
scene.add(ambient);

loadModel(current);

animate();
}

/* LOAD MODEL */
function loadModel(key){
current = key;

if(model) scene.remove(model);

const loader = new THREE.GLTFLoader();

loader.load(suits[key].file, gltf=>{
model = gltf.scene;
model.scale.set(1,1,1);
scene.add(model);
});

desc.textContent = suits[key].text;
infoBtn.onclick = ()=> window.location = suits[key].page;
}

/* ANIMATE */
function animate(){
requestAnimationFrame(animate);

if(model){
model.rotation.y += 0.003;
model.rotation.x += 0.0015;
}

renderer.render(scene,camera);
}

/* RESIZE */
window.addEventListener("resize", ()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});

/* TAB SWITCH */
function loadSuit(name){
document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
event.target.classList.add("active");
loadModel(name);
}

init();
</script>

</body>
</html>

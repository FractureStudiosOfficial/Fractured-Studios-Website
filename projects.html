<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Central Command</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
}

/* CRT */
#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.05);
  pointer-events:none;
}

#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.04) 0px,
    transparent 6px
  );
  animation:flicker .15s infinite;
}

@keyframes flicker {
  0%{opacity:.2}
  50%{opacity:.08}
  100%{opacity:.2}
}

/* CURVED CONSOLE */
#console {
  position:absolute;
  bottom:-100px;
  left:50%;
  transform:translateX(-50%) perspective(900px) rotateX(20deg);
  width:90%;
  height:80%;
  border:1px solid rgba(255,159,7,.2);
  background:rgba(0,0,0,.7);
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:10px;
  padding:15px;
}

/* PANELS */
.panel {
  border:1px solid rgba(255,159,7,.2);
  padding:10px;
  position:relative;
  overflow:hidden;
}

.panel h3 {
  margin:0 0 5px 0;
  font-size:12px;
  opacity:.7;
}

/* SIGNAL GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:4px;
}

.cell {
  height:10px;
  background:rgba(255,159,7,.1);
}

/* ACTIVITY WAVE */
#wave {
  position:absolute;
  bottom:0;
  width:100%;
  height:40px;
}

/* LOG FEED */
#logs {
  font-size:11px;
  height:100%;
  overflow:hidden;
}

.log {
  opacity:.7;
}

/* HIDDEN ZONE */
#ghost {
  position:absolute;
  top:20%;
  left:40%;
  width:50px;
  height:50px;
  opacity:0;
  cursor:pointer;
}

/* TERMINAL */
#terminal {
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  border-top:1px solid rgba(255,159,7,.2);
  background:#000;
}

#cmd {
  width:100%;
  background:transparent;
  border:none;
  color:#FF9F07;
  outline:none;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="console">

<!-- NETWORK GRID -->
<div class="panel">
<h3>COMMUNICATION GRID</h3>
<div class="grid" id="grid"></div>
</div>

<!-- SIGNAL -->
<div class="panel">
<h3>SIGNAL ACTIVITY</h3>
<canvas id="wave"></canvas>
</div>

<!-- STATUS -->
<div class="panel">
<h3>NETWORK STATUS</h3>
<div id="status"></div>
</div>

<!-- LOGS -->
<div class="panel">
<h3>TRANSMISSIONS</h3>
<div id="logs"></div>
</div>

<!-- EMPTY (future systems) -->
<div class="panel"><h3>RESERVED</h3></div>
<div class="panel"><h3>RESERVED</h3></div>

</div>

<div id="ghost"></div>

<div id="terminal">
<input id="cmd" placeholder=">">
</div>

<script>
/* GRID */
const grid=document.getElementById("grid");
for(let i=0;i<60;i++){
  const c=document.createElement("div");
  c.className="cell";
  grid.appendChild(c);
}

/* RANDOM SIGNAL BLINK */
setInterval(()=>{
  const cells=document.querySelectorAll(".cell");
  cells.forEach(c=>{
    if(Math.random()<0.1){
      c.style.background="#FF9F07";
      setTimeout(()=>c.style.background="rgba(255,159,7,.1)",200);
    }
  });
},300);

/* WAVE */
const canvas=document.getElementById("wave");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
}
resize();
window.onresize=resize;

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  for(let x=0;x<canvas.width;x++){
    const y=20+Math.sin(x*0.05+Date.now()/300)*10;
    ctx.lineTo(x,y);
  }
  ctx.strokeStyle="#FF9F07";
  ctx.stroke();
  requestAnimationFrame(draw);
}
draw();

/* STATUS */
const status=document.getElementById("status");

function updateStatus(){
  const percent=Math.floor(Math.random()*20)+80;
  status.textContent="NETWORK INTEGRITY: "+percent+"%";
}
setInterval(updateStatus,2000);
updateStatus();

/* LOGS */
const logs=document.getElementById("logs");

function addLog(){
  const msgs=[
    "PING ROUTED",
    "RELAY ACTIVE",
    "SIGNAL VERIFIED",
    "DATA RECEIVED",
    "NOISE DETECTED"
  ];

  const div=document.createElement("div");
  div.className="log";
  div.textContent="> "+msgs[Math.floor(Math.random()*msgs.length)];

  logs.prepend(div);
}
setInterval(addLog,1200);

/* TERMINAL */
cmd.onkeydown=e=>{
  if(e.key!=="Enter") return;
  const c=cmd.value.toLowerCase();

  if(c==="override"){
    logs.innerHTML="> ACCESS GRANTED<br>> [REDACTED SIGNAL FOUND]";
  }

  cmd.value="";
};

/* 👁️ ARG HOOK (hidden click) */
document.getElementById("ghost").onclick=()=>{
  logs.innerHTML="> ...signal detected...<br>> frequency unlocked";
};
</script>

</body>
</html>

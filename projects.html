<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Central Command</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
}

/* CRT EFFECTS (NON-BLOCKING) */
#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.05);
  pointer-events:none;
  z-index:1;
}

#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.04) 0px,
    transparent 6px
  );
  animation:flicker .15s infinite;
  z-index:2;
}

@keyframes flicker {
  0%{opacity:.2}
  50%{opacity:.08}
  100%{opacity:.2}
}

/* DASHBOARD (FIXED VISIBILITY) */
#console {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) perspective(1000px) rotateX(10deg);
  width:92%;
  height:75%;
  border:1px solid rgba(255,159,7,.25);
  background:rgba(0,0,0,.85);
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:12px;
  padding:15px;
  box-shadow:0 0 40px rgba(255,159,7,.15);
  z-index:5;
}

/* PANELS */
.panel {
  border:1px solid rgba(255,159,7,.2);
  padding:10px;
  position:relative;
  overflow:hidden;
  background:rgba(0,0,0,.6);
}

.panel h3 {
  margin:0 0 6px 0;
  font-size:12px;
  opacity:.7;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:4px;
}

.cell {
  height:12px;
  background:rgba(255,159,7,.1);
  transition:.2s;
}

/* STATUS */
#status {
  font-size:14px;
}

/* LOGS */
#logs {
  font-size:11px;
  height:100%;
  overflow:hidden;
}

.log {
  opacity:.8;
}

/* WAVE */
#wave {
  width:100%;
  height:50px;
}

/* TERMINAL */
#terminal {
  position:absolute;
  bottom:0;
  width:100%;
  padding:10px;
  border-top:1px solid rgba(255,159,7,.2);
  background:#000;
  z-index:10;
}

#cmd {
  width:100%;
  background:transparent;
  border:none;
  color:#FF9F07;
  outline:none;
  font-family:inherit;
}

/* HIDDEN ARG ZONE (does NOT block anything else) */
#ghost {
  position:absolute;
  top:30%;
  left:60%;
  width:40px;
  height:40px;
  opacity:0;
  pointer-events:auto;
  z-index:6;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<!-- DASHBOARD -->
<div id="console">

<!-- GRID -->
<div class="panel">
<h3>COMMUNICATION GRID</h3>
<div class="grid" id="grid"></div>
</div>

<!-- SIGNAL -->
<div class="panel">
<h3>SIGNAL ACTIVITY</h3>
<canvas id="wave"></canvas>
</div>

<!-- STATUS -->
<div class="panel">
<h3>NETWORK STATUS</h3>
<div id="status"></div>
</div>

<!-- LOGS -->
<div class="panel">
<h3>TRANSMISSIONS</h3>
<div id="logs"></div>
</div>

<div class="panel"><h3>RESERVED</h3></div>
<div class="panel"><h3>RESERVED</h3></div>

</div>

<!-- HIDDEN ARG -->
<div id="ghost"></div>

<!-- TERMINAL -->
<div id="terminal">
<input id="cmd" placeholder=">">
</div>

<script>
/* GRID */
const grid = document.getElementById("grid");
for(let i=0;i<60;i++){
  const c=document.createElement("div");
  c.className="cell";
  grid.appendChild(c);
}

/* GRID ACTIVITY */
setInterval(()=>{
  document.querySelectorAll(".cell").forEach(c=>{
    if(Math.random()<0.08){
      c.style.background="#FF9F07";
      setTimeout(()=>c.style.background="rgba(255,159,7,.1)",200);
    }
  });
},250);

/* SIGNAL WAVE */
const canvas=document.getElementById("wave");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=canvas.offsetWidth;
  canvas.height=canvas.offsetHeight;
}
resize();
window.addEventListener("resize", resize);

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  for(let x=0;x<canvas.width;x++){
    const y=25 + Math.sin(x*0.05 + Date.now()/250)*12;
    ctx.lineTo(x,y);
  }
  ctx.strokeStyle="#FF9F07";
  ctx.stroke();
  requestAnimationFrame(draw);
}
draw();

/* STATUS */
const status=document.getElementById("status");

function updateStatus(){
  const percent=Math.floor(Math.random()*15)+85;
  status.innerHTML = `
    INTEGRITY: ${percent}%<br>
    ACTIVE RELAYS: ${Math.floor(Math.random()*5)+12}<br>
    LATENCY: ${Math.floor(Math.random()*40)+20}ms
  `;
}
setInterval(updateStatus,2000);
updateStatus();

/* LOGS */
const logs=document.getElementById("logs");

function addLog(){
  const msgs=[
    "PING ROUTED",
    "SIGNAL VERIFIED",
    "DATA RECEIVED",
    "RELAY ACTIVE",
    "NOISE DETECTED"
  ];

  const div=document.createElement("div");
  div.className="log";
  div.textContent="> "+msgs[Math.floor(Math.random()*msgs.length)];

  logs.prepend(div);
}
setInterval(addLog,1200);

/* TERMINAL */
const cmd=document.getElementById("cmd");

cmd.addEventListener("keydown", e=>{
  if(e.key!=="Enter") return;

  const c=cmd.value.toLowerCase();

  if(c==="override"){
    logs.innerHTML="> ACCESS GRANTED<br>> [REDACTED SIGNAL DETECTED]";
  }

  if(c==="scan"){
    addLog();
    addLog();
  }

  cmd.value="";
});

/* ARG HIDDEN CLICK */
document.getElementById("ghost").addEventListener("click", ()=>{
  logs.innerHTML="> ...signal detected...<br>> frequency unlocked";
});
</script>

</body>
</html>

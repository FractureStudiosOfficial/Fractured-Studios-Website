<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Command Core</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#050505;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
}

/* CRT (NON BLOCKING) */
#amber, #scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:1;
}
#amber { background:rgba(255,159,7,.05); }
#scanlines {
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.04) 0px,
    transparent 6px
  );
}

/* CONSOLE */
#console {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%) perspective(900px) rotateX(10deg);
  width:90%;
  height:80%;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:12px;
  padding:15px;
  z-index:5;
}

/* PANEL */
.panel {
  border:1px solid rgba(255,159,7,.2);
  padding:10px;
  background:rgba(0,0,0,.7);
  cursor:pointer;
  transition:.2s;
}

.panel:hover {
  background:rgba(255,159,7,.08);
}

.panel.active {
  border-color:#FF9F07;
  box-shadow:0 0 15px rgba(255,159,7,.2);
}

/* FOCUS PANEL */
#focus {
  position:absolute;
  right:20px;
  top:20px;
  width:300px;
  height:300px;
  border:1px solid rgba(255,159,7,.3);
  background:#000;
  padding:10px;
  z-index:6;
}

/* BUTTONS */
.btn {
  margin-top:8px;
  padding:4px 8px;
  border:1px solid rgba(255,159,7,.4);
  display:inline-block;
  cursor:pointer;
}
.btn:hover { background:rgba(255,159,7,.2); }

/* LOGS */
#logs {
  position:absolute;
  bottom:50px;
  left:10px;
  width:400px;
  height:120px;
  overflow:hidden;
  font-size:12px;
  z-index:6;
}

/* TERMINAL */
#terminal {
  position:absolute;
  bottom:0;
  width:100%;
  background:#000;
  padding:10px;
  border-top:1px solid rgba(255,159,7,.2);
  z-index:7;
}

#cmd {
  width:100%;
  background:transparent;
  border:none;
  color:#FF9F07;
  outline:none;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="console"></div>
<div id="focus">SELECT PANEL</div>
<div id="logs"></div>

<div id="terminal">
<input id="cmd" placeholder=">">
</div>

<script>
/* 🔧 MODULAR PANEL SYSTEM */
const panels = [
  {
    name:"COMMUNICATIONS",
    render:()=>`Active Relays: ${rand(12,18)}<br>Latency: ${rand(20,60)}ms`,
    actions:[
      {name:"SCAN", fn:()=>log("Scanning networks...")},
      {name:"ROUTE", fn:()=>log("Routing signal...")}
    ]
  },
  {
    name:"SIGNAL TRACKING",
    render:()=>`Signals Detected: ${rand(3,12)}<br>Noise Level: ${rand(1,5)}`,
    actions:[
      {name:"BOOST", fn:()=>log("Signal boosted")},
      {name:"FILTER", fn:()=>log("Filtering noise")}
    ]
  },
  {
    name:"POWER GRID",
    render:()=>`Output: ${rand(80,100)}%<br>Stability: ${rand(70,95)}%`,
    actions:[
      {name:"REDIRECT", fn:()=>log("Power redirected")}
    ]
  },
  {
    name:"DEEP SCAN",
    render:()=>`Range: ${rand(200,900)} AU<br>Status: ACTIVE`,
    actions:[
      {name:"INITIATE", fn:()=>log("Deep scan initiated")}
    ]
  }
];

/* HELPERS */
function rand(a,b){ return Math.floor(Math.random()*(b-a)+a); }

const consoleEl=document.getElementById("console");
const focus=document.getElementById("focus");
const logs=document.getElementById("logs");

/* BUILD PANELS */
function buildPanels(){
  consoleEl.innerHTML="";
  panels.forEach((p,i)=>{
    const div=document.createElement("div");
    div.className="panel";
    div.innerHTML=`<strong>${p.name}</strong><br>${p.render()}`;

    div.onclick=()=>{
      document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
      div.classList.add("active");
      openPanel(p);
    };

    consoleEl.appendChild(div);
  });
}

/* OPEN PANEL */
function openPanel(p){
  focus.innerHTML=`<h3>${p.name}</h3>${p.render()}`;

  p.actions.forEach(a=>{
    const btn=document.createElement("div");
    btn.className="btn";
    btn.textContent=a.name;
    btn.onclick=a.fn;
    focus.appendChild(btn);
  });
}

/* LOG SYSTEM */
function log(msg){
  const d=document.createElement("div");
  d.textContent="> "+msg;
  logs.prepend(d);
}

/* AUTO UPDATE */
setInterval(buildPanels,4000);

/* TERMINAL */
cmd.onkeydown=e=>{
  if(e.key!=="Enter") return;

  const c=cmd.value.toLowerCase();

  if(c==="scan") log("Manual scan triggered");
  if(c==="override"){
    log("ACCESS GRANTED");
    log("[REDACTED NODE FOUND]");
  }

  cmd.value="";
};

/* INIT */
buildPanels();
</script>

</body>
</html>

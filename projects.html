<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Systems | Operations Command</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
}

/* CRT */
#amber { position:fixed; inset:0; background:rgba(255,159,7,.04); pointer-events:none; }
#scanlines {
  position:fixed; inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
}
@keyframes flicker {0%{opacity:.15}50%{opacity:.07}100%{opacity:.15}}

#container { padding:25px; }

h1 { text-align:center; }

/* CONTROLS */
#controls {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:15px;
}

select, input {
  background:#000;
  border:1px solid rgba(255,159,7,.3);
  color:#FF9F07;
  padding:5px;
  font-family:inherit;
}

/* PROJECT LIST */
#projects {
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* PROJECT CARD */
.project {
  border:1px solid rgba(255,159,7,.2);
  padding:10px;
  background:rgba(0,0,0,.3);
  cursor:pointer;
}

.project:hover { background:rgba(255,159,7,.08); }

.header {
  display:flex;
  justify-content:space-between;
}

.progress {
  height:5px;
  background:rgba(255,159,7,.2);
  margin-top:5px;
}

.fill { height:100%; background:#FF9F07; }

.details {
  margin-top:10px;
  display:none;
  font-size:13px;
  opacity:.85;
}

/* STATUS COLORS */
.active { color:#00ff9c; }
.delayed { color:#ff4444; }
.experimental { color:#66ccff; }

/* LOGS */
#logs {
  margin-top:15px;
  border:1px solid rgba(255,159,7,.2);
  height:120px;
  overflow:auto;
  font-size:12px;
  padding:5px;
}

/* TERMINAL */
#terminal {
  position:sticky;
  bottom:0;
  background:#000;
  padding:10px;
  border-top:1px solid rgba(255,159,7,.2);
}

#cmd {
  width:100%;
  background:transparent;
  border:none;
  color:#FF9F07;
  outline:none;
}

/* LOCK */
#lock {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<!-- LOCK -->
<div id="lock">
  <div>
    <div>[ OPERATIONS ACCESS ]</div>
    <span>></span>
    <input id="pass" type="password">
    <div id="err" style="color:red;opacity:0;">INVALID</div>
  </div>
</div>

<div id="container">

<h1>Solar System Operations</h1>

<!-- CONTROLS -->
<div id="controls">
  <input id="search" placeholder="Search projects...">
  
  <select id="statusFilter">
    <option value="all">All Status</option>
    <option value="ACTIVE">Active</option>
    <option value="DELAYED">Delayed</option>
    <option value="EXPERIMENTAL">Experimental</option>
  </select>

  <select id="priorityFilter">
    <option value="all">All Priority</option>
    <option value="HIGH">High</option>
    <option value="MEDIUM">Medium</option>
    <option value="LOW">Low</option>
  </select>

  <select id="sort">
    <option value="progress">Sort: Progress</option>
    <option value="name">Sort: Name</option>
    <option value="priority">Sort: Priority</option>
  </select>
</div>

<div id="projects"></div>

<div id="logs"></div>

</div>

<div id="terminal">
<input id="cmd" placeholder="Enter command...">
</div>

<script>
/* PROJECT DATA */
const projects = [
  {name:"Mars Shield Grid", status:"ACTIVE", priority:"HIGH", progress:72, desc:"Solar radiation defense"},
  {name:"Europa Drill", status:"DELAYED", priority:"HIGH", progress:34, desc:"Subsurface ocean access"},
  {name:"Titan Relay Expansion", status:"ACTIVE", priority:"LOW", progress:60, desc:"Signal amplification"},
  {name:"Kuiper Scan Array", status:"EXPERIMENTAL", priority:"HIGH", progress:12, desc:"Deep anomaly detection"},
  {name:"Lunar Mining Ops", status:"ACTIVE", priority:"MEDIUM", progress:48, desc:"Helium-3 extraction"}
];

/* PASSWORD */
pass.onkeydown=e=>{
  if(e.key==="Enter"){
    if(pass.value==="uic-742") lock.style.display="none";
    else { err.style.opacity=1; pass.value=""; setTimeout(()=>err.style.opacity=0,1000); }
  }
};

/* RENDER SYSTEM */
const container=document.getElementById("projects");

function render(){
  container.innerHTML="";
  let list=[...projects];

  const search=document.getElementById("search").value.toLowerCase();
  const status=document.getElementById("statusFilter").value;
  const priority=document.getElementById("priorityFilter").value;
  const sort=document.getElementById("sort").value;

  list=list.filter(p=>
    (status==="all"||p.status===status) &&
    (priority==="all"||p.priority===priority) &&
    p.name.toLowerCase().includes(search)
  );

  if(sort==="progress") list.sort((a,b)=>b.progress-a.progress);
  if(sort==="name") list.sort((a,b)=>a.name.localeCompare(b.name));

  list.forEach(p=>{
    const div=document.createElement("div");
    div.className="project";

    div.innerHTML=`
      <div class="header">
        <div>${p.name}</div>
        <div class="${p.status.toLowerCase()}">${p.status}</div>
      </div>
      <div class="progress"><div class="fill" style="width:${p.progress}%"></div></div>
      <div class="details">
        Priority: ${p.priority}<br>
        ${p.desc}
      </div>
    `;

    div.onclick=()=>{
      const d=div.querySelector(".details");
      d.style.display=d.style.display==="block"?"none":"block";
    };

    container.appendChild(div);
  });
}

/* CONTROLS */
document.querySelectorAll("#controls input, #controls select")
.forEach(el=>el.oninput=render);

render();

/* LIVE SYSTEM */
const logs=document.getElementById("logs");

function log(msg){
  const d=document.createElement("div");
  d.textContent="> "+msg;
  logs.prepend(d);
}

/* PROGRESS DRIFT */
setInterval(()=>{
  const p=projects[Math.floor(Math.random()*projects.length)];
  if(p.progress<100){
    p.progress+=Math.random()*2;
    log(p.name+" progress updated");
    render();
  }
},3000);

/* ANOMALY EVENT */
setInterval(()=>{
  if(Math.random()<0.2){
    const p=projects[Math.floor(Math.random()*projects.length)];
    p.status="DELAYED";
    log("ANOMALY DETECTED IN "+p.name.toUpperCase());
    render();
  }
},7000);

/* TERMINAL */
cmd.onkeydown=e=>{
  if(e.key!=="Enter") return;
  const c=cmd.value.toLowerCase();

  if(c==="home") window.location="index.html";
  if(c==="comms") window.location="communications.html";

  cmd.value="";
};
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Systems | Operations</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
}

/* CRT */
#amber { position:fixed; inset:0; background:rgba(255,159,7,.04); pointer-events:none; }
#scanlines {
  position:fixed; inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
}
@keyframes flicker {0%{opacity:.15}50%{opacity:.07}100%{opacity:.15}}

/* LOCK */
#lock {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#lock input {
  background:transparent;
  border:none;
  border-bottom:1px solid rgba(255,159,7,.3);
  color:#FF9F07;
  outline:none;
}

/* LAYOUT */
#container {
  display:flex;
  flex-direction:column;
  height:100vh;
}

#topbar {
  border-bottom:1px solid rgba(255,159,7,.2);
  padding:10px;
  display:flex;
  justify-content:space-around;
  font-size:13px;
}

#main {
  display:flex;
  flex:1;
}

/* LEFT PANEL */
#list {
  width:300px;
  border-right:1px solid rgba(255,159,7,.2);
  overflow-y:auto;
}

.project {
  padding:10px;
  border-bottom:1px solid rgba(255,159,7,.1);
  cursor:pointer;
}

.project:hover { background:rgba(255,159,7,.1); }

/* RIGHT PANEL */
#details {
  flex:1;
  padding:20px;
}

.progress {
  height:8px;
  background:rgba(255,159,7,.2);
  margin-top:10px;
}

.fill {
  height:100%;
  background:#FF9F07;
  width:0%;
  transition:width 0.5s ease;
}

/* STATUS COLORS */
.active { color:#00ff9c; }
.delayed { color:#ff4444; }
.experimental { color:#66ccff; }

/* LOGS */
#logs {
  margin-top:20px;
  height:120px;
  overflow:auto;
  border:1px solid rgba(255,159,7,.2);
  padding:5px;
  font-size:12px;
}

/* TERMINAL */
#terminal {
  border-top:1px solid rgba(255,159,7,.2);
  padding:10px;
  background:#000;
}

#cmd {
  width:100%;
  background:transparent;
  border:none;
  color:#FF9F07;
  outline:none;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<!-- LOCK -->
<div id="lock">
  <div>
    [ PROJECT ACCESS ]<br><br>
    <span>></span>
    <input id="pass" type="password">
    <div id="err" style="color:red;opacity:0;">INVALID</div>
  </div>
</div>

<div id="container">

<!-- TOP STATS -->
<div id="topbar">
  <div id="stat-active"></div>
  <div id="stat-delayed"></div>
  <div id="stat-total"></div>
</div>

<div id="main">

<!-- LEFT -->
<div id="list"></div>

<!-- RIGHT -->
<div id="details">
  <h2>Select a project</h2>
</div>

</div>

<div id="terminal">
<input id="cmd" placeholder="Enter command...">
</div>

</div>

<script>
/* DATA */
const projects = [
  {name:"Mars Shield Grid", status:"ACTIVE", progress:72, priority:"HIGH", desc:"Solar radiation defense network."},
  {name:"Europa Drill", status:"DELAYED", progress:34, priority:"HIGH", desc:"Subsurface ocean drilling."},
  {name:"Titan Relay", status:"ACTIVE", progress:60, priority:"LOW", desc:"Signal relay expansion."},
  {name:"Kuiper Scan", status:"EXPERIMENTAL", progress:12, priority:"HIGH", desc:"Deep anomaly detection."},
  {name:"Lunar Mining", status:"ACTIVE", progress:48, priority:"MEDIUM", desc:"Helium-3 extraction."}
];

/* PASSWORD */
pass.onkeydown=e=>{
  if(e.key==="Enter"){
    if(pass.value==="uic-742") lock.style.display="none";
    else { err.style.opacity=1; pass.value=""; setTimeout(()=>err.style.opacity=0,1000); }
  }
};

/* BUILD LIST */
const list = document.getElementById("list");
const details = document.getElementById("details");

function renderList(){
  list.innerHTML="";
  projects.forEach((p,i)=>{
    const div=document.createElement("div");
    div.className="project";
    div.innerHTML=`${p.name}<br><span class="${p.status.toLowerCase()}">${p.status}</span>`;
    div.onclick=()=>selectProject(i);
    list.appendChild(div);
  });
}

/* SELECT PROJECT */
function selectProject(i){
  const p=projects[i];

  details.innerHTML=`
    <h2>${p.name}</h2>
    Status: <span class="${p.status.toLowerCase()}">${p.status}</span><br>
    Priority: ${p.priority}<br><br>
    ${p.desc}

    <div class="progress"><div class="fill" id="bar"></div></div>

    <div id="logs"></div>
  `;

  setTimeout(()=>{
    document.getElementById("bar").style.width=p.progress+"%";
  },50);

  startLogs(p);
}

/* STATS */
function updateStats(){
  const active=projects.filter(p=>p.status==="ACTIVE").length;
  const delayed=projects.filter(p=>p.status==="DELAYED").length;

  document.getElementById("stat-active").textContent="ACTIVE: "+active;
  document.getElementById("stat-delayed").textContent="DELAYED: "+delayed;
  document.getElementById("stat-total").textContent="TOTAL: "+projects.length;
}

/* LOG SYSTEM */
let logInterval;

function startLogs(project){
  clearInterval(logInterval);
  const logs=document.getElementById("logs");

  logInterval=setInterval(()=>{
    const msgs=[
      "Data received",
      "Signal stable",
      "Updating modules",
      "Minor fluctuation detected",
      "Progress recalibrated"
    ];

    const div=document.createElement("div");
    div.textContent="> "+project.name+": "+msgs[Math.floor(Math.random()*msgs.length)];
    logs.prepend(div);
  },1500);
}

/* INIT */
renderList();
updateStats();

/* TERMINAL */
cmd.onkeydown=e=>{
  if(e.key!=="Enter") return;
  const c=cmd.value.toLowerCase();

  if(c==="home") window.location="index.html";
  if(c==="comms") window.location="communications.html";

  cmd.value="";
};
</script>

</body>
</html>

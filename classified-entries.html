<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SIGNAL INTERCEPT SYSTEM // MULTI-STATION</title>
<style>
body {
  margin:0;
  background:black;
  color:#00ffcc;
  font-family:monospace;
  display:flex; 
  height:100vh;
}

.container { display:flex; width:100%; }

.terminal {
  width:40%;
  border-right:1px solid #00ffcc;
  display:flex;
  flex-direction:column;
}

.output {
  flex:1;
  overflow-y:auto;
  padding:15px;
}

.output::-webkit-scrollbar { width:8px; }
.output::-webkit-scrollbar-thumb { background:#00ffcc; }

input {
  border:none;
  border-top:1px solid #00ffcc;
  background:black;
  color:#00ffcc;
  padding:10px;
  font-family:monospace;
  font-size:16px;
}

.canvasBox {
  width:60%;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

canvas {
  width:90%;
  height:70%;
  border:1px solid #00ffcc;
}

.popup {
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  background:black;
  border:2px solid #00ffcc;
  padding:20px;
  display:none;
  z-index:999;
}

.error { color:red; }
.success { color:#00ffaa; }
.hint { color:#ffaa00; }
</style>
</head>
<body>

<div class="container">

  <div class="terminal">
    <div class="output" id="output"></div>
    <input id="input" placeholder="Enter command...">
  </div>

  <div class="canvasBox">
    <canvas id="scope"></canvas>
    <div class="popup" id="popup"></div>
  </div>

</div>

<script>
const out = document.getElementById("output");
const input = document.getElementById("input");
const canvas = document.getElementById("scope");
const ctx = canvas.getContext("2d");
const popup = document.getElementById("popup");

canvas.width = 800;
canvas.height = 400;

// ================= STATIONS =================
const stations = {};
const stationNames = [];

for(let i=1;i<=20;i++){
  let name = "STATION_" + i;
  stationNames.push(name);
  stations[name] = {
    amplitude: Math.floor(Math.random()*100),
    frequency: Math.floor(Math.random()*100),
    phase: Math.floor(Math.random()*100)
  };
}

// preset key stations for secret
stations["ALPHA"] = { amplitude:72, frequency:38, phase:60 };
stations["BETA"] = { amplitude:55, frequency:70, phase:20 };
stations["OMEGA"] = { amplitude:90, frequency:25, phase:80 };

let state = {
  amplitude: 50,
  frequency: 50,
  phase: 0,
  currentStation: "ALPHA",
  lockedStations: {},
  locked: false
};

let sweepX = 0;

// ================= UI =================
function log(text, cls=""){
  const d=document.createElement("div");
  d.textContent=text;
  if(cls) d.className=cls;
  out.appendChild(d);
  out.scrollTop = out.scrollHeight;
}

function showPopup(html){
  popup.style.display="block";
  popup.innerHTML = html + "<br><br><button onclick=\"popup.style.display='none'\">CLOSE</button>";
}

// ================= DRAW =================
function draw(){
  ctx.fillStyle="rgba(0,0,0,0.12)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  let amp = state.amplitude/100*150;
  let freq = state.frequency/100*0.1;
  let phase = state.phase/100*Math.PI*2;

  ctx.beginPath();

  for(let x=0;x<canvas.width;x++){
    let y = canvas.height/2 + Math.sin((x+sweepX)*freq + phase)*amp;
    if(x===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  }

  ctx.strokeStyle="#00ffcc";
  ctx.lineWidth=2;
  ctx.stroke();

  sweepX+=3;
  if(sweepX>canvas.width) sweepX=0;
}

// ================= SCAN =================
function scan(){
  let t = stations[state.currentStation];

  function hint(label, val, target){
    let d = val-target;
    if(Math.abs(d)<3) return label+": STABLE";
    if(Math.abs(d)<10) return label+": CLOSE";
    return d>0?label+": TOO HIGH":label+": TOO LOW";
  }

  log("> SCANNING " + state.currentStation,"hint");
  log("> " + hint("AMP",state.amplitude,t.amplitude),"hint");
  log("> " + hint("FREQ",state.frequency,t.frequency),"hint");
  log("> " + hint("PHASE",state.phase,t.phase),"hint");
}

// ================= LOCK =================
function checkLock(){
  let t = stations[state.currentStation];

  let a=Math.abs(state.amplitude-t.amplitude);
  let f=Math.abs(state.frequency-t.frequency);
  let p=Math.abs(state.phase-t.phase);

  if(a<3&&f<3&&p<3){
    if(!state.lockedStations[state.currentStation]){
      state.lockedStations[state.currentStation]=true;
      log("> " + state.currentStation + " LOCKED","success");
    }
  }

  // secret condition
  let count = Object.keys(state.lockedStations).length;
  if(count>=3 && !state.secret){
    state.secret=true;
    log("> SECRET FREQUENCY MATRIX COMPLETE","success");
    showPopup(`
      <b>CLASSIFIED TRANSMISSION</b><br><br>
      MULTI-STATION LOCK CONFIRMED.<br>
      AUTHORIZED ACCESS GRANTED.<br><br>
      <a href="secret.html" target="_blank">OPEN ARCHIVE</a>
    `);
  }
}

// ================= COMMANDS =================
function handle(cmd){
  log("> "+cmd);

  let parts=cmd.split(" ");

  if(parts[0]==="AMP") state.amplitude=Number(parts[1]);
  else if(parts[0]==="FREQ") state.frequency=Number(parts[1]);
  else if(parts[0]==="PHASE") state.phase=Number(parts[1]);

  else if(parts[0]==="SCAN") scan();

  else if(parts[0]==="LOCK") checkLock();

  else if(parts[0]==="STATION"){
    let name=parts[1];
    if(stations[name]){
      state.currentStation=name;
      log("> SWITCHED TO " + name,"hint");
    } else log("> UNKNOWN STATION","error");
  }

  else log("> UNKNOWN COMMAND","error");
}

input.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    handle(input.value.trim().toUpperCase());
    input.value="";
  }
});

function loop(){ draw(); requestAnimationFrame(loop); }
loop();

log("> MULTI-STATION SIGNAL SYSTEM ONLINE");
log("> COMMANDS: AMP, FREQ, PHASE, SCAN, LOCK, STATION <name>");
</script>

</body>
</html>

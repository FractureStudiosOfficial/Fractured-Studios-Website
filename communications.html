<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.I.C. Systems | Communications</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
}

/* CRT */
#amber { position:fixed; inset:0; background:rgba(255,159,7,.04); pointer-events:none; }
#scanlines {
  position:fixed; inset:0;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
}
@keyframes flicker {0%{opacity:.15}50%{opacity:.07}100%{opacity:.15}}

#container {
  padding:30px;
}

/* NETWORK MAP */
#network {
  position:relative;
  height:400px;
  border:1px solid rgba(255,159,7,.2);
  margin-bottom:20px;
}

.node {
  position:absolute;
  padding:5px 10px;
  border:1px solid rgba(255,159,7,.4);
  background:#000;
  cursor:pointer;
  font-size:12px;
}

.node:hover { background:rgba(255,159,7,.1); }

/* CONNECTION LINES */
svg {
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
}

/* INFO PANEL */
#info {
  border:1px solid rgba(255,159,7,.2);
  padding:15px;
  margin-bottom:20px;
}

/* LOGS */
#logs {
  border:1px solid rgba(255,159,7,.2);
  padding:10px;
  height:150px;
  overflow-y:auto;
  font-size:12px;
}

.log-line {
  opacity:.8;
  margin-bottom:3px;
}

/* TERMINAL */
#terminal {
  border-top:1px solid rgba(255,159,7,.2);
  padding:10px;
  position:sticky;
  bottom:0;
  background:#000;
}

#cmd {
  width:100%;
  background:transparent;
  border:none;
  outline:none;
  color:#FF9F07;
  font-family:inherit;
}

/* PASSWORD LOCK */
#lock {
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

#lock-box {
  border:1px solid rgba(255,159,7,.3);
  padding:30px;
  text-align:center;
}

#lock input {
  background:transparent;
  border:none;
  border-bottom:1px solid rgba(255,159,7,.3);
  color:#FF9F07;
  outline:none;
}

#error { color:red; font-size:12px; opacity:0; }

</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<!-- LOCK -->
<div id="lock">
  <div id="lock-box">
    <div>[ COMMUNICATIONS ACCESS ]</div>
    <br>
    <span>></span>
    <input id="pass" type="password">
    <div id="error">INVALID</div>
  </div>
</div>

<div id="container">

<h1>Communications Network</h1>

<div id="network">
<svg id="lines"></svg>

<div class="node" style="top:50px; left:100px;" data-name="Earth Command">EARTH CMD</div>
<div class="node" style="top:150px; left:300px;" data-name="Alpha Lunar Station">LUNAR A</div>
<div class="node" style="top:250px; left:500px;" data-name="Mars Outpost">MARS OP</div>
<div class="node" style="top:80px; left:600px;" data-name="Titan Relay">TITAN RL</div>

</div>

<div id="info">Select a station...</div>

<div id="logs"></div>

</div>

<div id="terminal">
<input id="cmd" placeholder="Enter command...">
</div>

<script>
/* PASSWORD */
const lock = document.getElementById("lock");
const pass = document.getElementById("pass");
const err = document.getElementById("error");

pass.focus();

pass.addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    if(pass.value==="uic-742"){
      lock.style.display="none";
    } else {
      err.style.opacity=1;
      pass.value="";
      setTimeout(()=>err.style.opacity=0,1000);
    }
  }
});

/* NODES */
const nodes = document.querySelectorAll(".node");
const info = document.getElementById("info");

nodes.forEach(n=>{
  n.onclick=()=>{
    const strength = Math.floor(Math.random()*40)+60;
    info.innerHTML = `
      <b>${n.dataset.name}</b><br>
      Status: ONLINE<br>
      Signal Strength: ${strength}%<br>
      Last Ping: ${Math.floor(Math.random()*5)}s ago
    `;
  };
});

/* DRAW LINES */
const svg = document.getElementById("lines");

function connect(a,b){
  const r1=a.getBoundingClientRect();
  const r2=b.getBoundingClientRect();
  const line=document.createElementNS("http://www.w3.org/2000/svg","line");
  line.setAttribute("x1",r1.left+r1.width/2);
  line.setAttribute("y1",r1.top+r1.height/2);
  line.setAttribute("x2",r2.left+r2.width/2);
  line.setAttribute("y2",r2.top+r2.height/2);
  line.setAttribute("stroke","#FF9F07");
  svg.appendChild(line);
}

setTimeout(()=>{
  connect(nodes[0],nodes[1]);
  connect(nodes[1],nodes[2]);
  connect(nodes[2],nodes[3]);
},100);

/* LOG FEED */
const logs = document.getElementById("logs");

function addLog(){
  const messages=[
    "PING SENT",
    "SIGNAL STABLE",
    "DATA PACKET RECEIVED",
    "RELAY ADJUSTED",
    "MINOR INTERFERENCE DETECTED"
  ];
  const div=document.createElement("div");
  div.className="log-line";
  div.textContent="> "+messages[Math.floor(Math.random()*messages.length)];
  logs.prepend(div);
}

setInterval(addLog,1500);

/* TERMINAL */
const cmd = document.getElementById("cmd");

cmd.addEventListener("keydown", e=>{
  if(e.key!=="Enter") return;

  const c = cmd.value.toLowerCase();

  switch(c){
    case "home": window.location="index.html"; break;
    case "users": window.location="users.html"; break;
    case "about": window.location="about.html"; break;
  }

  cmd.value="";
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Sector Map</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#FF9F07;
font-family:'Share Tech Mono', monospace;
overflow:hidden;
}

/* MAP */
#map{
position:fixed;
inset:0;
overflow:hidden;
}

/* GRID */
#grid{
position:absolute;
inset:0;
background-image:
linear-gradient(rgba(255,159,7,.07) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,159,7,.07) 1px, transparent 1px);
background-size:80px 80px;
}

/* SYSTEM (ZOOMS) */
#system{
position:absolute;
inset:0;
transition:transform 1.2s ease;
transform-origin:center center;
}

/* PLANET MARKERS */
.planet{
position:absolute;
width:6px;
height:6px;
border:1px solid #FF9F07;
border-radius:50%;
}

/* LABELS (LOCKED) */
.label{
position:absolute;
font-size:14px;
cursor:pointer;
}

.label:hover{
text-shadow:0 0 6px #FF9F07;
}

/* CRT */
#scanlines{
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.05) 0px,
rgba(255,255,255,.05) 2px,
transparent 5px,
transparent 9px
);
animation:flicker .12s infinite;
}

@keyframes flicker{
0%{opacity:.15}
50%{opacity:.08}
100%{opacity:.15}
}

#amber{
position:fixed;
inset:0;
background:rgba(255,159,7,.05);
pointer-events:none;
}
</style>
</head>

<body>

<div id="map">

<div id="grid"></div>

<div id="system">

<!-- SUN -->
<div class="planet" style="top:50%;left:50%;width:8px;height:8px;"></div>

<!-- ORBITS -->
<svg width="100%" height="100%" style="position:absolute;inset:0;">
<circle cx="50%" cy="50%" r="140" stroke="#FF9F07" fill="none" opacity=".3"/>
<circle cx="50%" cy="50%" r="220" stroke="#FF9F07" fill="none" opacity=".3"/>
<circle cx="50%" cy="50%" r="300" stroke="#FF9F07" fill="none" opacity=".3"/>
</svg>

<!-- PLANETS -->
<div class="planet" style="top:50%; left:calc(50% + 140px);" id="venusDot"></div>
<div class="planet" style="top:calc(50% - 220px); left:50%;" id="earthDot"></div>
<div class="planet" style="top:calc(50% - 240px); left:calc(50% + 20px);" id="moonDot"></div>
<div class="planet" style="top:50%; left:calc(50% - 300px);" id="marsDot"></div>

<!-- SCAN PING -->
<svg width="100%" height="100%" style="position:absolute;inset:0;">
<circle id="ping" cx="50%" cy="50%" r="0" stroke="#FF9F07" fill="none" opacity=".5"/>
</svg>

</div>

<!-- LABELS (DO NOT ZOOM) -->
<div class="label" id="venus" style="top:50%; left:calc(50% + 160px);">[VENUS]</div>
<div class="label" id="earth" style="top:calc(50% - 240px); left:50%;">[EARTH]</div>
<div class="label" id="moon"  style="top:calc(50% - 260px); left:calc(50% + 20px);">(MOON)</div>
<div class="label" id="mars"  style="top:50%; left:calc(50% - 330px);">{MARS}</div>

</div>

<div id="amber"></div>
<div id="scanlines"></div>

<script>

/* SCAN PING */
const ping = document.getElementById("ping");
let r = 0;

setInterval(()=>{
r += 2;
ping.setAttribute("r", r);
if(r > 500) r = 0;
},30);


/* ZOOM */
function zoom(x,y,link){
const system = document.getElementById("system");

system.style.transform =
`scale(2.3) translate(${x}px, ${y}px)`;

setTimeout(()=>{
window.location.href = link;
},900);
}

/* CLICK HANDLERS */
document.getElementById("earth").onclick = () => zoom(0,150,"earth.html");
document.getElementById("moon").onclick  = () => zoom(-20,170,"moon.html");
document.getElementById("mars").onclick  = () => zoom(200,0,"mars.html");
document.getElementById("venus").onclick = () => zoom(-140,0,"venus.html");

</script>

</body>
</html>

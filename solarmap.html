<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Map | U.I.C. Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
  margin:0; overflow:hidden; background:#111; font-family:'Share Tech Mono', monospace; color:#FF9F07;
}
#mapCanvas { display:block; background:#000; }
#sidePanel {
  position:absolute; right:0; top:0; width:300px; height:100%; background:rgba(0,0,0,0.8);
  border-left:1px solid #FF9F07; padding:10px; box-sizing:border-box;
  overflow-y:auto;
}
#controls { margin-bottom:15px; }
button { margin:2px; background:#111; border:1px solid #FF9F07; color:#FF9F07; padding:5px; cursor:pointer; font-family:'Share Tech Mono', monospace; }
button:hover { background:rgba(255,159,7,.2); }
</style>
</head>
<body>

<canvas id="mapCanvas"></canvas>

<div id="sidePanel">
  <div id="controls">
    <div>Time Multiplier:</div>
    <button onclick="timeSpeed=1">1x</button>
    <button onclick="timeSpeed=5">5x</button>
    <button onclick="timeSpeed=10">10x</button>
    <button onclick="timeSpeed=100">100x</button>
    <button onclick="resetTime()">Reset</button>
  </div>
  <div id="timeDisplay">Date: </div>
</div>

<script>
// Canvas setup
const canvas = document.getElementById('mapCanvas');
const ctx = canvas.getContext('2d');
let width = canvas.width = window.innerWidth;
let height = canvas.height = window.innerHeight;

// Solar system scale
const AU = 149597870.7; // km
const scale = 1/10000000; // scale down AU to canvas
const center = {x: width/2, y: height/2};
let zoom = 1;
let pan = {x:0, y:0};

// Time
let timeSpeed = 1;
let now = new Date(); // browser time
let simTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), now.getMinutes(), now.getSeconds());

// Planet & moon data (simplified, circular orbits)
const planets = [
  {name:"Mercury", radius:4, AU:0.39, color:"#aaa", period:88, moons:[]},
  {name:"Venus", radius:6, AU:0.72, color:"#f5deb3", period:225, moons:[]},
  {name:"Earth", radius:6, AU:1, color:"#0af", period:365.25, moons:[
    {name:"Moon", radius:2, AU:0.00257, color:"#888", period:27.3, stations:[]}
  ], stations:[
    {name:"ISS", radius:1, AU:0.00042, color:"#0f0", period:0.067} // orbit period in days
  ]},
  {name:"Mars", radius:5, AU:1.52, color:"#f50", period:687, moons:[
    {name:"Phobos", radius:1, AU:0.000062, color:"#ccc", period:0.3189, stations:[]},
    {name:"Deimos", radius:1, AU:0.000156, color:"#bbb", period:1.263, stations:[]}
  ], stations:[]},
  {name:"Jupiter", radius:12, AU:5.2, color:"#f0a", period:4333, moons:[
    {name:"Europa", radius:2, AU:0.00449, color:"#cef", period:3.55, stations:[]}
  ], stations:[]},
  {name:"Saturn", radius:10, AU:9.58, color:"#fc0", period:10759, moons:[], stations:[]},
  {name:"Uranus", radius:8, AU:19.2, color:"#0ff", period:30687, moons:[], stations:[]},
  {name:"Neptune", radius:8, AU:30.05, color:"#08f", period:60190, moons:[], stations:[]},
  {name:"Pluto", radius:3, AU:39.48, color:"#aaa", period:90560, moons:[], stations:[]}
];

// Mouse controls
let mouse = {x:0,y:0,down:false,lastX:0,lastY:0};
canvas.addEventListener("mousedown", e=>{mouse.down=true; mouse.lastX=e.clientX; mouse.lastY=e.clientY;});
canvas.addEventListener("mouseup", e=>{mouse.down=false;});
canvas.addEventListener("mousemove", e=>{
  mouse.x=e.clientX; mouse.y=e.clientY;
  if(mouse.down){ pan.x += (e.clientX - mouse.lastX); pan.y += (e.clientY - mouse.lastY); mouse.lastX=e.clientX; mouse.lastY=e.clientY;}
});
canvas.addEventListener("wheel", e=>{
  zoom *= e.deltaY>0?0.95:1.05;
});

// Helpers
function AUToCanvas(a){ return a*AU*scale*zoom; }

// Draw
function draw() {
  ctx.clearRect(0,0,width,height);

  // Sun
  ctx.beginPath();
  ctx.arc(center.x + pan.x, center.y + pan.y, 15, 0, 2*Math.PI);
  ctx.fillStyle="#ff0"; ctx.fill();

  planets.forEach(p=>{
    // Planet position (assume circular orbit)
    let daysSinceEpoch = (simTime - new Date(1989, simTime.getMonth(), simTime.getDate()))/86400000;
    let angle = 2*Math.PI*(daysSinceEpoch / p.period);
    let px = center.x + pan.x + AUToCanvas(p.AU)*Math.cos(angle);
    let py = center.y + pan.y + AUToCanvas(p.AU)*Math.sin(angle);

    // Orbit path
    ctx.beginPath();
    ctx.arc(center.x + pan.x, center.y + pan.y, AUToCanvas(p.AU), 0, 2*Math.PI);
    ctx.strokeStyle="rgba(255,159,7,0.2)";
    ctx.stroke();

    // Planet
    ctx.beginPath();
    ctx.arc(px, py, p.radius*zoom, 0, 2*Math.PI);
    ctx.fillStyle=p.color;
    ctx.fill();

    // Moons
    if(p.moons){
      p.moons.forEach(m=>{
        let mAngle = angle*365/m.period; // simplified orbit around planet
        let mx = px + AUToCanvas(m.AU)*Math.cos(mAngle);
        let my = py + AUToCanvas(m.AU)*Math.sin(mAngle);
        ctx.beginPath();
        ctx.arc(mx, my, m.radius*zoom,0,2*Math.PI);
        ctx.fillStyle=m.color;
        ctx.fill();

        // Stations
        if(m.stations) m.stations.forEach(s=>{
          let sAngle = mAngle*10/s.period;
          let sx = mx + AUToCanvas(s.AU)*Math.cos(sAngle);
          let sy = my + AUToCanvas(s.AU)*Math.sin(sAngle);
          ctx.beginPath();
          ctx.arc(sx, sy, s.radius*zoom,0,2*Math.PI);
          ctx.fillStyle=s.color;
          ctx.fill();
        });
      });
    }

    // Planet stations
    if(p.stations){
      p.stations.forEach(s=>{
        let sAngle = angle*365/s.period;
        let sx = px + AUToCanvas(s.AU)*Math.cos(sAngle);
        let sy = py + AUToCanvas(s.AU)*Math.sin(sAngle);
        ctx.beginPath();
        ctx.arc(sx, sy, s.radius*zoom,0,2*Math.PI);
        ctx.fillStyle=s.color;
        ctx.fill();
      });
    }
  });

  requestAnimationFrame(draw);
}

// Update simulated time
function updateTime() {
  simTime = new Date(simTime.getTime() + 1000*timeSpeed);
  document.getElementById("timeDisplay").innerText = "Date: "+simTime.toUTCString();
  setTimeout(updateTime,1000);
}

// Reset time to browser
function resetTime() {
  simTime = new Date();
}

// Resize
window.addEventListener("resize",()=>{width=canvas.width=window.innerWidth; height=canvas.height=window.innerHeight;});

updateTime();
draw();
<script>
// Canvas & drawing from Part 1 remain the same
// We'll reuse 'draw()' and 'updateTime()'

// State
let selectedBody = null;

// Search/filter input
const sidePanel = document.getElementById('sidePanel');
const searchInput = document.createElement('input');
searchInput.placeholder = "Search bodies/stations...";
searchInput.style.width = "100%";
searchInput.style.marginBottom = "10px";
searchInput.style.background = "#111";
searchInput.style.border = "1px solid #FF9F07";
searchInput.style.color = "#FF9F07";
searchInput.style.padding = "5px";
searchInput.style.fontFamily = "'Share Tech Mono', monospace";
sidePanel.insertBefore(searchInput, sidePanel.firstChild);

// Display selected body info
const bodyInfo = document.createElement('div');
sidePanel.appendChild(bodyInfo);

// Convert mouse to canvas space
function getMousePos(e){
  return {x:(e.clientX-pan.x-center.x)/zoom, y:(e.clientY-pan.y-center.y)/zoom};
}

// Check click on bodies
canvas.addEventListener("click", e=>{
  const mousePos = getMousePos(e);
  selectedBody = null;
  
  for(let p of planets){
    let angle = 2*Math.PI*((simTime - new Date(1989, simTime.getMonth(), simTime.getDate()))/86400000 / p.period);
    let px = AUToCanvas(p.AU)*Math.cos(angle);
    let py = AUToCanvas(p.AU)*Math.sin(angle);

    if(Math.hypot(mousePos.x - px, mousePos.y - py) < p.radius*3){
      selectedBody = p;
      break;
    }
    
    // Moons
    if(p.moons){
      for(let m of p.moons){
        let mAngle = angle*365/m.period;
        let mx = px + AUToCanvas(m.AU)*Math.cos(mAngle);
        let my = py + AUToCanvas(m.AU)*Math.sin(mAngle);
        if(Math.hypot(mousePos.x - mx, mousePos.y - my) < m.radius*3){
          selectedBody = m;
          break;
        }
      }
    }
  }

  if(selectedBody){
    showBodyInfo(selectedBody);
  } else {
    bodyInfo.innerHTML = "<i>No body selected</i>";
  }
});

// Display body info
function showBodyInfo(body){
  let html = `<h3>${body.name}</h3>`;
  if(body.AU) html += `<p>Orbit radius: ${body.AU} AU</p>`;
  if(body.period) html += `<p>Orbital period: ${body.period} days</p>`;
  if(body.moons && body.moons.length>0){
    html += "<p>Moons:</p><ul>";
    body.moons.forEach(m=>{html+=`<li>${m.name}</li>`});
    html += "</ul>";
  }
  if(body.stations && body.stations.length>0){
    html += "<p>Stations:</p><ul>";
    body.stations.forEach(s=>{html+=`<li>${s.name}</li>`});
    html += "</ul>";
  }
  html += `<button onclick="createManeuver()">Create Maneuver Node</button>`;
  bodyInfo.innerHTML = html;
}

// Placeholder maneuver node creation
function createManeuver(){
  if(selectedBody){
    const x = Math.random()*200-100; // placeholder position
    const y = Math.random()*200-100;
    alert(`Maneuver node created near ${selectedBody.name} at offset (${x.toFixed(1)}, ${y.toFixed(1)})`);
  }
}

// Search filter
searchInput.addEventListener("input", e=>{
  const val = searchInput.value.toLowerCase();
  let results = [];
  planets.forEach(p=>{
    if(p.name.toLowerCase().includes(val)) results.push(p.name);
    if(p.moons) p.moons.forEach(m=>{if(m.name.toLowerCase().includes(val)) results.push(m.name)});
    if(p.stations) p.stations.forEach(s=>{if(s.name.toLowerCase().includes(val)) results.push(s.name)});
  });
  bodyInfo.innerHTML = "<h4>Search Results:</h4><ul>"+results.map(r=>`<li>${r}</li>`).join("")+"</ul>";
});

// Update time & redraw from Part 1
function updateTime() {
  simTime = new Date(simTime.getTime() + 1000*timeSpeed);
  document.getElementById("timeDisplay").innerText = "Date: "+simTime.toUTCString();
  setTimeout(updateTime,1000);
}

// Redraw with selection highlight
function draw(){
  ctx.clearRect(0,0,width,height);

  // Sun
  ctx.beginPath();
  ctx.arc(center.x + pan.x, center.y + pan.y, 15, 0, 2*Math.PI);
  ctx.fillStyle="#ff0"; ctx.fill();

  planets.forEach(p=>{
    let daysSinceEpoch = (simTime - new Date(1989, simTime.getMonth(), simTime.getDate()))/86400000;
    let angle = 2*Math.PI*(daysSinceEpoch / p.period);
    let px = center.x + pan.x + AUToCanvas(p.AU)*Math.cos(angle);
    let py = center.y + pan.y + AUToCanvas(p.AU)*Math.sin(angle);

    // Orbit path
    ctx.beginPath();
    ctx.arc(center.x + pan.x, center.y + pan.y, AUToCanvas(p.AU), 0, 2*Math.PI);
    ctx.strokeStyle="rgba(255,159,7,0.2)";
    ctx.stroke();

    // Planet
    ctx.beginPath();
    ctx.arc(px, py, p.radius*zoom, 0, 2*Math.PI);
    ctx.fillStyle=p.color;
    ctx.fill();

    if(selectedBody && selectedBody.name===p.name){
      ctx.strokeStyle="#0f0";
      ctx.lineWidth=2;
      ctx.stroke();
      ctx.lineWidth=1;
    }

    // Moons
    if(p.moons){
      p.moons.forEach(m=>{
        let mAngle = angle*365/m.period;
        let mx = px + AUToCanvas(m.AU)*Math.cos(mAngle);
        let my = py + AUToCanvas(m.AU)*Math.sin(mAngle);
        ctx.beginPath();
        ctx.arc(mx, my, m.radius*zoom,0,2*Math.PI);
        ctx.fillStyle=m.color;
        ctx.fill();

        if(selectedBody && selectedBody.name===m.name){
          ctx.strokeStyle="#0f0";
          ctx.lineWidth=2;
          ctx.stroke();
          ctx.lineWidth=1;
        }

        if(m.stations) m.stations.forEach(s=>{
          let sAngle = mAngle*10/s.period;
          let sx = mx + AUToCanvas(s.AU)*Math.cos(sAngle);
          let sy = my + AUToCanvas(s.AU)*Math.sin(sAngle);
          ctx.beginPath();
          ctx.arc(sx, sy, s.radius*zoom,0,2*Math.PI);
          ctx.fillStyle=s.color;
          ctx.fill();
        });
      });
    }

    if(p.stations){
      p.stations.forEach(s=>{
        let sAngle = angle*365/s.period;
        let sx = px + AUToCanvas(s.AU)*Math.cos(sAngle);
        let sy = py + AUToCanvas(s.AU)*Math.sin(sAngle);
        ctx.beginPath();
        ctx.arc(sx, sy, s.radius*zoom,0,2*Math.PI);
        ctx.fillStyle=s.color;
        ctx.fill();
      });
    }
  });

  requestAnimationFrame(draw);
}

draw();
updateTime();
<script>
// --- MANEUVER NODES SYSTEM ---

let maneuverNodes = JSON.parse(localStorage.getItem("maneuverNodes") || "[]");
let activeNode = null;

// Draw maneuver nodes
function drawManeuverNodes() {
    maneuverNodes.forEach(node => {
        // Find planet/moon parent
        let body = planets.find(p=>p.name===node.body) || 
                   planets.flatMap(p=>p.moons||[]).find(m=>m.name===node.body);
        if(!body) return;
        // Compute current position
        let daysSinceEpoch = (simTime - new Date(1989, simTime.getMonth(), simTime.getDate()))/86400000;
        let angle = 2*Math.PI*(daysSinceEpoch / body.period);
        let px = center.x + pan.x + AUToCanvas(body.AU || 0)*Math.cos(angle);
        let py = center.y + pan.y + AUToCanvas(body.AU || 0)*Math.sin(angle);

        let nodeX = px + node.offsetX*zoom;
        let nodeY = py + node.offsetY*zoom;

        // Draw node
        ctx.beginPath();
        ctx.arc(nodeX, nodeY, 5*zoom, 0, 2*Math.PI);
        ctx.fillStyle="#0ff";
        ctx.fill();
        ctx.strokeStyle="#0ff";
        ctx.stroke();

        // If active node, draw delta-v vectors
        if(activeNode === node){
            ctx.strokeStyle="#f0f";
            ctx.beginPath();
            ctx.moveTo(nodeX, nodeY);
            ctx.lineTo(nodeX + node.dvPrograde*10, nodeY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(nodeX, nodeY);
            ctx.lineTo(nodeX, nodeY + node.dvNormal*10);
            ctx.stroke();
        }
    });
}

// Click to create maneuver
canvas.addEventListener("dblclick", e=>{
    if(!selectedBody) return;
    const pos = getMousePos(e);
    const offsetX = pos.x;
    const offsetY = pos.y;
    const node = {body:selectedBody.name, offsetX, offsetY, dvPrograde:0, dvNormal:0, dvRadial:0};
    maneuverNodes.push(node);
    activeNode = node;
    saveNodes();
});

// Drag to adjust delta-V
let dragging = false;
canvas.addEventListener("mousedown", e=>{
    const pos = getMousePos(e);
    activeNode = maneuverNodes.find(node=>{
        let body = planets.find(p=>p.name===node.body) || planets.flatMap(p=>p.moons||[]).find(m=>m.name===node.body);
        if(!body) return false;
        let daysSinceEpoch = (simTime - new Date(1989, simTime.getMonth(), simTime.getDate()))/86400000;
        let angle = 2*Math.PI*(daysSinceEpoch / body.period);
        let px = AUToCanvas(body.AU || 0)*Math.cos(angle) + pan.x + center.x;
        let py = AUToCanvas(body.AU || 0)*Math.sin(angle) + pan.y + center.y;
        return Math.hypot(px + node.offsetX - e.clientX, py + node.offsetY - e.clientY) < 10;
    });
    if(activeNode) dragging = true;
});
canvas.addEventListener("mouseup", e=>dragging=false);
canvas.addEventListener("mousemove", e=>{
    if(!dragging || !activeNode) return;
    const pos = getMousePos(e);
    activeNode.dvPrograde = (pos.x - activeNode.offsetX)/10;
    activeNode.dvNormal = (pos.y - activeNode.offsetY)/10;
    saveNodes();
});

// Save to localStorage
function saveNodes(){
    localStorage.setItem("maneuverNodes", JSON.stringify(maneuverNodes));
}

// Draw loop override to include nodes
function drawWithNodes(){
    draw();
    drawManeuverNodes();
    requestAnimationFrame(drawWithNodes);
}
drawWithNodes();

// Maneuver info panel
const maneuversPanel = document.createElement("div");
sidePanel.appendChild(maneuversPanel);
function updateManeuversPanel(){
    maneuversPanel.innerHTML = "<h4>Maneuver Nodes:</h4>"+maneuverNodes.map((n,i)=>`<p>Node ${i+1} on ${n.body}: ΔV P:${n.dvPrograde.toFixed(1)} N:${n.dvNormal.toFixed(1)}</p>`).join("");
    setTimeout(updateManeuversPanel, 500);
}
updateManeuversPanel();

// Reset nodes
function resetManeuvers(){
    maneuverNodes=[];
    saveNodes();
    activeNode=null;
}
</script>

</body>
</html>

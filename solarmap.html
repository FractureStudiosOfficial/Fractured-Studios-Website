<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.I.C. Map Sector</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
  perspective:1000px;
}

#crt-container {
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  align-items:center;
  padding:40px;
  transform-style:preserve-3d;
  transition:transform .08s ease-out;
}

#map-title {
  font-size:28px;
  margin-bottom:20px;
  color:#FF9F07;
  text-shadow: 0 0 8px #FF9F07;
}

#solar-system {
  position:relative;
  width:800px;
  height:600px;
  background:#111 url('solargrid.png') center center no-repeat;
  background-size:contain;
  border:1px solid rgba(255,159,7,.2);
}

.planet {
  position:absolute;
  border:2px solid #FF9F07;
  border-radius:50%;
  cursor:pointer;
  text-align:center;
  color:#FF9F07;
  font-size:12px;
  line-height:1;
  transition: transform 0.2s ease;
}

.planet:hover {
  transform: scale(1.2);
  box-shadow: 0 0 15px #FF9F07;
}

/* Planet positions */
#earth { width:40px; height:40px; top:250px; left:100px; }
#moon { width:15px; height:15px; top:220px; left:60px; }
#mars { width:35px; height:35px; top:200px; left:500px; }
#venus { width:38px; height:38px; top:350px; left:400px; }

#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}
</style>
</head>
<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">
  <div id="map-title">U.I.C. Solar System Map</div>
  <div id="solar-system">
    <div class="planet" id="earth">Earth</div>
    <div class="planet" id="moon">Moon</div>
    <div class="planet" id="mars">Mars</div>
    <div class="planet" id="venus">Venus</div>
  </div>
</div>

<script>
const planetLinks = {
  earth: 'earth.html',
  moon: 'moon.html',
  mars: 'mars.html',
  venus: 'venus.html'
};

for (let id in planetLinks) {
  document.getElementById(id).addEventListener('click', () => {
    window.location.href = planetLinks[id];
  });
}

// Optional 3D tilt effect
document.addEventListener("mousemove", e => {
  const container = document.getElementById("crt-container");
  const os = container;
  const x = (window.innerWidth/2 - e.clientX)/1000;
  const y = (window.innerHeight/2 - e.clientY)/1000;
  container.style.transform = `rotateX(${y}deg) rotateY(${x}deg)`;
});
</script>

</body>
</html>

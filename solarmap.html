<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Map | U.I.C. Systems</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
  margin:0; background:#111; color:#FF9F07;
  font-family:'Share Tech Mono', monospace; overflow:hidden;
}
#canvas { display:block; background:#111; }
#side-panel {
  position:absolute; top:10px; right:10px;
  background:rgba(0,0,0,.3); padding:10px;
  border:1px solid #FF9F07; width:220px;
}
button { background:#111; border:1px solid #FF9F07; color:#FF9F07; margin:2px; cursor:pointer; }
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="side-panel">
  <div>Current Date: <span id="current-date"></span></div>
  <div>Time Speed:</div>
  <button onclick="setTimeFactor(1)">1x</button>
  <button onclick="setTimeFactor(5)">5x</button>
  <button onclick="setTimeFactor(10)">10x</button>
  <button onclick="setTimeFactor(100)">100x</button>
  <button onclick="pauseTime()">Pause</button>
  <button onclick="resetTime()">Reset</button>
</div>

<script>
// Canvas setup
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

// Zoom and pan
let zoom = 1;
let pan = {x:0, y:0};
let isDragging = false, lastPos = {x:0, y:0};
canvas.addEventListener('mousedown', e=>{ isDragging=true; lastPos={x:e.clientX, y:e.clientY}; });
canvas.addEventListener('mousemove', e=>{ if(isDragging){ pan.x += e.clientX - lastPos.x; pan.y += e.clientY - lastPos.y; lastPos={x:e.clientX, y:e.clientY}; }});
canvas.addEventListener('mouseup', ()=>{isDragging=false;});
canvas.addEventListener('wheel', e=>{ zoom *= e.deltaY<0?1.1:0.9; });

// Utilities
const AU_SCALE = 50; // 1 AU = 50px
function AUToCanvas(au){ return au*AU_SCALE*zoom; }

// Planets data (simplified)
const planets = [
  {name:'Mercury', AU:0.39, period:88, color:'#aaa', moons:[]},
  {name:'Venus', AU:0.72, period:225, color:'#ffb366', moons:[]},
  {name:'Earth', AU:1, period:365, color:'#3399ff', moons:[{name:'Moon', AU:0.00257, color:'#ccc'}], stations:[
    {name:'ISS', orbitAU:0.000042, orbitPeriod:0.07},
    {name:'Skylab', orbitAU:0.00003, orbitPeriod:0.05}
  ]},
  {name:'Mars', AU:1.52, period:687, color:'#ff6633', moons:[{name:'Phobos', AU:0.00006, color:'#999'}, {name:'Deimos', AU:0.00015, color:'#bbb'}]},
  {name:'Jupiter', AU:5.2, period:4333, color:'#ff9966', moons:[{name:'Europa', AU:0.0045, color:'#ddd'}]},
  {name:'Saturn', AU:9.58, period:10759, color:'#ffcc99', moons:[]},
  {name:'Uranus', AU:19.2, period:30687, color:'#99ccff', moons:[]},
  {name:'Neptune', AU:30.05, period:60190, color:'#3366ff', moons:[]},
  {name:'Pluto', AU:39.48, period:90560, color:'#999', moons:[]},
];

// Time simulation
let simTime = new Date();
let timeFactor = 1;
function setTimeFactor(f){ timeFactor=f; }
function pauseTime(){ timeFactor=0; }
function resetTime(){ simTime = new Date(); }

// Maneuver nodes
let maneuverNodes = [];

// Update date display
function updateDateDisplay(){
  document.getElementById('current-date').textContent = simTime.toDateString();
}

// Main draw loop
const center = {x:canvas.width/2, y:canvas.height/2};
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Orbits
  for(const p of planets){
    const r = AUToCanvas(p.AU);
    ctx.beginPath();
    ctx.arc(center.x+pan.x, center.y+pan.y, r, 0, Math.PI*2);
    ctx.strokeStyle='rgba(255,159,7,0.2)';
    ctx.stroke();
  }

  // Planets & moons
  for(const p of planets){
    const daysSince = (simTime - new Date(1989, simTime.getMonth(), simTime.getDate()))/86400000;
    const angle = 2*Math.PI*(daysSince/p.period);
    const px = center.x+pan.x+AUToCanvas(p.AU)*Math.cos(angle);
    const py = center.y+pan.y+AUToCanvas(p.AU)*Math.sin(angle);

    const planetRadius = Math.max(6, 4*zoom);
    ctx.beginPath();
    ctx.arc(px, py, planetRadius, 0, 2*Math.PI);
    ctx.fillStyle = p.color;
    ctx.fill();
    ctx.strokeStyle = '#FF9F07';
    ctx.stroke();

    // Moons
    for(const m of p.moons || []){
      const mAngle = angle*10;
      const mx = px+AUToCanvas(m.AU)*Math.cos(mAngle);
      const my = py+AUToCanvas(m.AU)*Math.sin(mAngle);
      const moonRadius = Math.max(4,3*zoom);
      ctx.beginPath();
      ctx.arc(mx,my,moonRadius,0,Math.PI*2);
      ctx.fillStyle = m.color;
      ctx.fill();
      ctx.strokeStyle='#FF9F07';
      ctx.stroke();
    }

    // Stations
    for(const s of p.stations || []){
      const sAngle = angle*5;
      const sx = px+AUToCanvas(s.orbitAU)*Math.cos(sAngle);
      const sy = py+AUToCanvas(s.orbitAU)*Math.sin(sAngle);
      const radius = Math.max(4,2*zoom);
      ctx.beginPath();
      ctx.arc(sx,sy,radius,0,Math.PI*2);
      ctx.fillStyle='#00FFFF';
      ctx.fill();
      ctx.strokeStyle='#FF9F07';
      ctx.stroke();
    }
  }

  // Maneuver nodes
  for(const n of maneuverNodes){
    const radius = Math.max(5,3*zoom);
    ctx.beginPath();
    ctx.arc(n.x,n.y,radius,0,Math.PI*2);
    ctx.fillStyle='#FF00FF';
    ctx.fill();
    ctx.strokeStyle='#FF9F07';
    ctx.stroke();
  }

  updateDateDisplay();
  requestAnimationFrame(draw);
}

// Simulate time
function stepTime(){
  simTime = new Date(simTime.getTime()+1000*timeFactor);
  setTimeout(stepTime, 1000);
}
stepTime();
draw();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC Map Sector</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
}

#ascii-map {
  position:fixed;
  inset:0;
  white-space:pre;
  font-size:14px;
  line-height:1.15em;
  padding:20px;
  box-sizing:border-box;
}

/* clickable planets */
.planet {
  position:absolute;
  cursor:pointer;
  color:#FF9F07;
}

.planet:hover {
  text-shadow:0 0 8px #FF9F07;
}

/* positions (tweak if needed) */
#earth { top:60%; left:20%; }
#moon  { top:55%; left:16%; }
#mars  { top:35%; left:70%; }
#venus { top:70%; left:55%; }

/* CRT overlays */
#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
}

@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}
</style>
</head>

<body>

<div id="amber"></div>
<div id="scanlines"></div>

<div id="ascii-map">
.      .         *        .       .         .       *        .
     *        .        .      .      *           .        .
 .        .        *        .         .      .        .
        .       .         .       *        .       .
   *         .       .       .        .          *
 .        .       .        *         .        .       .
       .        .        .        .       *        .
    .        .       .        .        .       .
        .        .        .       .        .       .
 .       .       .      *       .       .       .
</div>

<!-- ASCII planets -->
<div class="planet" id="earth">[EARTH]</div>
<div class="planet" id="moon"> (MOON)</div>
<div class="planet" id="mars"> {MARS}</div>
<div class="planet" id="venus"> <VENUS></div>

<script>
const planetLinks = {
  earth: "earth.html",
  moon: "moon.html",
  mars: "mars.html",
  venus: "venus.html"
};

for (let id in planetLinks) {
  document.getElementById(id).onclick = () => {
    window.location.href = planetLinks[id];
  };
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>U.I.C. Map Sector</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  background:#111;
  color:#FF9F07;
  font-family:'Share Tech Mono', monospace;
  overflow:auto;
}

#crt-container {
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

#map-title {
  font-size:28px;
  margin-bottom:20px;
  text-shadow: 0 0 8px #FF9F07;
}

#ascii-map {
  white-space: pre;
  font-size:14px;
  line-height:1.2em;
  cursor:default;
  color:#FF9F07;
  border:1px solid rgba(255,159,7,.2);
  padding:20px;
  background:rgba(0,0,0,0.25);
  position:relative;
}

/* Clickable planets */
.planet {
  position:absolute;
  cursor:pointer;
  color:#FF9F07;
  font-weight:bold;
}
#earth { top:120px; left:50px; }
#moon { top:100px; left:35px; }
#mars { top:80px; left:300px; }
#venus { top:150px; left:200px; }

#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
}
@keyframes flicker {
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}

#amber {
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.04);
  pointer-events:none;
}
</style>
</head>
<body>
<div id="amber"></div>
<div id="scanlines"></div>

<div id="crt-container">
  <div id="map-title">U.I.C. Solar System ASCII Map</div>

  <div id="ascii-map">
    .       .       *        .       .       *    .   .       .
      .   *     .       .       .       *       .
    .         .       *     oEarth    .       .
       *   .       .     OMoon          .       .
    .       *         .        .      *        .
        .      *         *        .       oMars
     *       .    *        .   *           .
          .       .     oVenus       *       .
    *      .       .      *        .       *    .
  </div>

  <!-- Planet clickable overlays -->
  <div class="planet" id="earth">⊙</div>
  <div class="planet" id="moon">○</div>
  <div class="planet" id="mars">⊕</div>
  <div class="planet" id="venus">⊗</div>

</div>

<script>
// Planet links
const planetLinks = {
  earth: 'earth.html',
  moon: 'moon.html',
  mars: 'mars.html',
  venus: 'venus.html'
};

for (let id in planetLinks) {
  document.getElementById(id).addEventListener('click', () => {
    window.location.href = planetLinks[id];
  });
}
</script>
</body>
</html>

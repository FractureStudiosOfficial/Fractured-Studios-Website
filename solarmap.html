<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Sector Map</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  overflow:hidden;
  font-family:'Share Tech Mono', monospace;
  background:#000;
  color:#FF9F07;
}

/* CRT overlay */
#scanlines {
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:100;
}
@keyframes flicker{
  0%{opacity:.15}
  50%{opacity:.07}
  100%{opacity:.15}
}
#amber{
  position:fixed;
  inset:0;
  background:rgba(255,159,7,.05);
  pointer-events:none;
}

/* Map container */
#map {
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* Solar system container */
#system {
  position:relative;
  width:100%;
  height:100%;
  transition: transform 1s ease;
}

/* Orbits */
.orbit {
  position:absolute;
  border:1px dashed rgba(255,159,7,.25);
  border-radius:50%;
  transform:translate(-50%,-50%);
  top:50%;
  left:50%;
}

/* Sun */
#sun {
  position:absolute;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#FF9F07;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:10;
}

/* Planets */
.planet {
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  border:1px solid #FF9F07;
  background:black;
  cursor:pointer;
  transform:translate(-50%,-50%);
}

/* Planet labels */
.label {
  position:absolute;
  font-size:13px;
  text-align:center;
  pointer-events:none;
}
.label.above { transform:translate(-50%,-150%); }
.label.below { transform:translate(-50%,150%); }

/* Zoom return button */
#returnBtn {
  position:fixed;
  top:20px;
  left:20px;
  padding:6px 12px;
  border:1px solid #FF9F07;
  background:black;
  color:#FF9F07;
  cursor:pointer;
  display:none;
}
#returnBtn:hover {
  background:#FF9F07;
  color:black;
}

/* Scan radar ping */
#ping {
  position:absolute;
  top:50%;
  left:50%;
  border:1px solid #FF9F07;
  border-radius:50%;
  width:0;
  height:0;
  transform:translate(-50%,-50%);
  opacity:.5;
}
</style>
</head>

<body>

<div id="map">
  <div id="system">
    <!-- Orbits -->
    <div class="orbit" style="width:80px;height:80px;"></div>
    <div class="orbit" style="width:120px;height:120px;"></div>
    <div class="orbit" style="width:160px;height:160px;"></div>
    <div class="orbit" style="width:210px;height:210px;"></div>
    <div class="orbit" style="width:260px;height:260px;"></div>
    <div class="orbit" style="width:320px;height:320px;"></div>
    <div class="orbit" style="width:380px;height:380px;"></div>
    <div class="orbit" style="width:440px;height:440px;"></div>

    <!-- Sun -->
    <div id="sun"></div>

    <!-- Planets -->
    <div class="planet" id="mercury" style="top:50%;left:calc(50% + 80px)"></div>
    <div class="planet" id="venus" style="top:calc(50% - 120px);left:50%"></div>
    <div class="planet" id="earth" style="top:50%;left:calc(50% - 160px)"></div>
    <div class="planet" id="moon" style="top:50%;left:calc(50% - 180px);width:6px;height:6px"></div>
    <div class="planet" id="mars" style="top:calc(50% + 210px);left:50%"></div>
    <div class="planet" id="jupiter" style="top:50%;left:calc(50% + 260px)"></div>
    <div class="planet" id="saturn" style="top:calc(50% - 320px);left:50%"></div>
    <div class="planet" id="uranus" style="top:50%;left:calc(50% - 380px)"></div>
    <div class="planet" id="neptune" style="top:calc(50% + 440px);left:50%"></div>

    <!-- Labels -->
    <div class="label above" data-target="mercury" style="top:calc(50% - 10px);left:calc(50% + 80px)">MERCURY</div>
    <div class="label above" data-target="venus" style="top:calc(50% - 10px);left:50%">VENUS</div>
    <div class="label below" data-target="earth" style="top:calc(50% + 10px);left:calc(50% - 160px)">EARTH</div>
    <div class="label below" data-target="moon" style="top:calc(50% + 10px);left:calc(50% - 180px)">MOON</div>
    <div class="label above" data-target="mars" style="top:calc(50% - 10px);left:50%">MARS</div>
    <div class="label below" data-target="jupiter" style="top:calc(50% + 10px);left:calc(50% + 260px)">JUPITER</div>
    <div class="label above" data-target="saturn" style="top:calc(50% - 10px);left:50%">SATURN</div>
    <div class="label below" data-target="uranus" style="top:calc(50% + 10px);left:calc(50% - 380px)">URANUS</div>
    <div class="label above" data-target="neptune" style="top:calc(50% - 10px);left:50%">NEPTUNE</div>

    <!-- Scan ping -->
    <div id="ping"></div>
  </div>
</div>

<div id="returnBtn">RETURN TO SYSTEM</div>
<div id="amber"></div>
<div id="scanlines"></div>

<script>
// Scan ping animation
let r=0;
setInterval(()=>{
  r+=4;
  document.getElementById("ping").style.width = r+"px";
  document.getElementById("ping").style.height = r+"px";
  if(r>900) r=0;
},30);

const system = document.getElementById("system");
const labels = document.querySelectorAll(".label");
const returnBtn = document.getElementById("returnBtn");

const planetLinks = {
  mercury: "mercury.html",
  venus: "venus.html",
  earth: "earth.html",
  moon: "moon.html",
  mars: "mars.html",
  jupiter: "jupiter.html",
  saturn: "saturn.html",
  uranus: "uranus.html",
  neptune: "neptune.html"
};

// Zoom function
function zoomToPlanet(id){
  const planet = document.getElementById(id);
  const rect = planet.getBoundingClientRect();
  const centerX = window.innerWidth/2;
  const centerY = window.innerHeight/2;

  const offsetX = centerX - rect.left;
  const offsetY = centerY - rect.top;

  system.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(2.5)`;

  labels.forEach(l=>{
    if(l.dataset.target !== id) l.style.display="none";
    else l.style.display="block";
  });

  returnBtn.style.display="block";

  planet.onclick = ()=> window.location.href = planetLinks[id];
}

// Labels click
labels.forEach(label=>{
  label.onclick = ()=> zoomToPlanet(label.dataset.target);
});

// Return button
returnBtn.onclick = ()=>{
  system.style.transform = "scale(1)";
  labels.forEach(l=>l.style.display="block");
  returnBtn.style.display="none";
};
</script>
</body>
</html>

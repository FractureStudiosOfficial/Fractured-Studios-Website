   DATA SYSTEM
========================= */

const ships = [
{ name:"Orbital Shuttle", dv:1.8 },
{ name:"Explorer Mk I", dv:3.2 },
{ name:"Heavy Transport", dv:5.4 },
{ name:"Deep Space Cruiser", dv:9.2 }
];

const bodies = {
Earth:{},
Moon:{},
Mars:{},
Phobos:{},

Europa:{},

/* =========================
   STATE
========================= */

let selectedShip = null;
let selectedBody = null;

/* =========================

========================= */

const shipDropdown = document.getElementById("shipDropdown");

const bodyDropdown = document.getElementById("bodyDropdown");
const bodyList = document.getElementById("bodyList");

/* TOGGLE DROPDOWNS */
shipDropdown.onclick = () => {
shipList.style.display =
shipList.style.display === "block" ? "none" : "block";
};

bodyDropdown.onclick = () => {

div.onclick = () => {
selectedShip = ship;
shipDropdown.querySelector(".dropdown-title").textContent =
ship.name + " ▼";

updateUI();
};

shipList.appendChild(div);
});

/* =========================
   POPULATE BODIES
========================= */

Object.keys(bodies).forEach(body => {
const div = document.createElement("div");
div.className = "dropdown-item";
div.textContent = body;

div.onclick = () => {
selectedBody = body;
bodyDropdown.querySelector(".dropdown-title").textContent =
body + " ▼";

updateUI();
};

bodyList.appendChild(div);
});

/* =========================
   UI STATE UPDATE
========================= */

function updateUI(){

document.getElementById("debug").innerHTML = `
Ship: ${selectedShip ? selectedShip.name : "NONE"}<br>
Δv: ${selectedShip ? selectedShip.dv : 0} km/s<br><br>
Body: ${selectedBody ? selectedBody : "NONE"}
`;

if(selectedShip && selectedBody){
document.getElementById("status").textContent =
"MISSION CONFIGURED - READY FOR ΔV CALCULATION (PART 2)";
}
}

/* =========================

========================= */

document.addEventListener("click", (e) => {
if(!shipDropdown.contains(e.target)){
shipList.style.display = "none";
}
if(!bodyDropdown.contains(e.target)){
bodyList.style.display = "none";
}
});

<script>

/* =========================
   SHIPS
========================= */

const ships = [
{ name:"Orbital Shuttle", dv:1.8 },
{ name:"Explorer Mk I", dv:3.2 },
{ name:"Heavy Transport", dv:5.4 },
{ name:"Deep Space Cruiser", dv:9.2 }
];

/* =========================
   CELESTIAL BODY DATA
   μ in km^3/s^2, radius in km
========================= */

const bodies = {
Mercury:{ mu:22032, radius:2439 },
Venus:{ mu:324859, radius:6051 },
Earth:{ mu:398600, radius:6371 },
Moon:{ mu:4902.8, radius:1737 },
Mars:{ mu:42828, radius:3389 },
Phobos:{ mu:0.000711, radius:11 },
Deimos:{ mu:0.0000985, radius:6 },
Jupiter:{ mu:126686534, radius:69911 },
Europa:{ mu:3202.7, radius:1560 },
Saturn:{ mu:37931187, radius:58232 },
Uranus:{ mu:5793939, radius:25362 },
Neptune:{ mu:6836529, radius:24622 }
};

/* =========================
   STATE
========================= */

let selectedShip = null;
let selectedBody = null;

/* =========================
   DOM
========================= */

const shipDropdown = document.getElementById("shipDropdown");
const shipList = document.getElementById("shipList");

const bodyDropdown = document.getElementById("bodyDropdown");
const bodyList = document.getElementById("bodyList");

/* =========================
   DROPDOWNS (same as Part 1)
========================= */

ships.forEach(ship => {
const div = document.createElement("div");
div.className = "dropdown-item";
div.textContent = `${ship.name} (${ship.dv} km/s)`;

div.onclick = () => {
selectedShip = ship;
shipDropdown.querySelector(".dropdown-title").textContent =
ship.name + " ▼";
calculateMission();
};

shipList.appendChild(div);
});

Object.keys(bodies).forEach(body => {
const div = document.createElement("div");
div.className = "dropdown-item";
div.textContent = body;

div.onclick = () => {
selectedBody = body;
bodyDropdown.querySelector(".dropdown-title").textContent =
body + " ▼";
calculateMission();
};

bodyList.appendChild(div);
});

/* =========================
   ORBITAL MATH
========================= */

function orbitalVelocity(mu, r){
return Math.sqrt(mu / r);
}

function escapeVelocity(mu, r){
return Math.sqrt(2 * mu / r);
}

function hohmannTransfer(mu, r1, r2){

const v1 = Math.sqrt(mu / r1);
const v2 = Math.sqrt(mu / r2);

const transferA = Math.sqrt(mu * (2/r1 - 1/((r1+r2)/2)));
const transferB = Math.sqrt(mu * (2/r2 - 1/((r1+r2)/2)));

return Math.abs(transferA - v1) + Math.abs(v2 - transferB);
}

/* =========================
   MISSION ENGINE
========================= */

function calculateMission(){

if(!selectedShip || !selectedBody) return;

const body = bodies[selectedBody];

const altitude = 200; // default LEO / base orbit (km)

const r = body.radius + altitude;

/* Core calculations */
const orbitDV = orbitalVelocity(body.mu, r);
const escapeDV = escapeVelocity(body.mu, r);

/* simple mission model */
const surfaceToOrbit = orbitDV;
const escapeBurn = escapeDV - orbitDV;

/* total mission Δv (basic chain) */
const totalDV = surfaceToOrbit + Math.max(escapeBurn,0);

/* update UI */
updateUI(totalDV);
}

/* =========================
   UI UPDATE
========================= */

function updateUI(totalDV){

document.getElementById("debug").innerHTML = `
Ship: ${selectedShip.name} (${selectedShip.dv} km/s)<br>
Body: ${selectedBody}<br><br>

Required Δv: ${totalDV.toFixed(2)} km/s<br>
Ship Δv: ${selectedShip.dv} km/s
`;

const status = document.getElementById("status");

if(selectedShip.dv >= totalDV){
status.textContent = "MISSION POSSIBLE";
status.style.color = "#00FF9C";
} else {
status.textContent = "INSUFFICIENT ΔV";
status.style.color = "#FF3A3A";
}

}

/* =========================
   CLOSE DROPDOWNS
========================= */

document.addEventListener("click", (e) => {
if(!shipDropdown.contains(e.target)) shipList.style.display = "none";
if(!bodyDropdown.contains(e.target)) bodyList.style.display = "none";
});

<script>

/* =========================
   SHIPS
========================= */

const ships = [
{ name:"Orbital Shuttle", dv:1.8 },
{ name:"Explorer Mk I", dv:3.2 },
{ name:"Heavy Transport", dv:5.4 },
{ name:"Deep Space Cruiser", dv:9.2 }
];

/* =========================
   CELESTIAL BODIES
========================= */

const bodies = {
Mercury:{ mu:22032, radius:2439 },
Venus:{ mu:324859, radius:6051 },
Earth:{ mu:398600, radius:6371 },
Moon:{ mu:4902.8, radius:1737 },
Mars:{ mu:42828, radius:3389 },
Phobos:{ mu:0.000711, radius:11 },
Deimos:{ mu:0.0000985, radius:6 },
Jupiter:{ mu:126686534, radius:69911 },
Europa:{ mu:3202.7, radius:1560 },
Saturn:{ mu:37931187, radius:58232 },
Uranus:{ mu:5793939, radius:25362 },
Neptune:{ mu:6836529, radius:24622 }
};

/* =========================
   STATE
========================= */

let selectedShip = null;
let selectedBody = null;

let burns = [];

/* =========================
   DOM
========================= */

const shipDropdown = document.getElementById("shipDropdown");
const shipList = document.getElementById("shipList");

const bodyDropdown = document.getElementById("bodyDropdown");
const bodyList = document.getElementById("bodyList");

const burnContainer = document.getElementById("burnContainer");

/* =========================
   DROPDOWNS
========================= */

ships.forEach(ship => {
const div = document.createElement("div");
div.className = "dropdown-item";
div.textContent = `${ship.name} (${ship.dv} km/s)`;

div.onclick = () => {
selectedShip = ship;
shipDropdown.querySelector(".dropdown-title").textContent =
ship.name + " ▼";
calculateMission();
};

shipList.appendChild(div);
});

Object.keys(bodies).forEach(body => {
const div = document.createElement("div");
div.className = "dropdown-item";
div.textContent = body;

div.onclick = () => {
selectedBody = body;
bodyDropdown.querySelector(".dropdown-title").textContent =
body + " ▼";
calculateMission();
};

bodyList.appendChild(div);
});

/* =========================
   BURN SYSTEM
========================= */

function addBurn(){

if(!selectedBody) return;

burns.push({
type:"Orbit Insertion",
alt:200
});

renderBurns();
calculateMission();
}

function removeBurn(i){
burns.splice(i,1);
renderBurns();
calculateMission();
}

function renderBurns(){

burnContainer.innerHTML = "";

burns.forEach((b,i)=>{

const div = document.createElement("div");
div.className = "burn";

div.innerHTML = `
<div>Burn ${i+1}</div>

<select onchange="updateBurnType(${i},this.value)">
<option>Orbit Insertion</option>
<option>Hohmann Transfer</option>
<option>Escape Burn</option>
<option>Surface Launch</option>
</select>

<input type="number" value="${b.alt}" 
onchange="updateBurnAlt(${i},this.value)" />

<button onclick="removeBurn(${i})">X</button>
`;

burnContainer.appendChild(div);

});

}

/* =========================
   BURN UPDATES
========================= */

window.updateBurnType = (i,val)=>{
burns[i].type = val;
calculateMission();
};

window.updateBurnAlt = (i,val)=>{
burns[i].alt = parseFloat(val);
calculateMission();
};

/* =========================
   PHYSICS
========================= */

function orbitalVelocity(mu,r){
return Math.sqrt(mu / r);
}

function escapeVelocity(mu,r){
return Math.sqrt(2 * mu / r);
}

/* =========================
   TOTAL MISSION CALC
========================= */

function calculateMission(){

if(!selectedShip || !selectedBody) return;

const body = bodies[selectedBody];

let totalDV = 0;

/* evaluate burns */
burns.forEach(b => {

const r = body.radius + (b.alt || 200);

if(b.type === "Surface Launch"){
totalDV += orbitalVelocity(body.mu, r);
}

if(b.type === "Orbit Insertion"){
totalDV += orbitalVelocity(body.mu, r);
}

if(b.type === "Escape Burn"){
totalDV += escapeVelocity(body.mu, r) - orbitalVelocity(body.mu, r);
}

if(b.type === "Hohmann Transfer"){
totalDV += orbitalVelocity(body.mu, r) * 1.25;
}

});

/* UI */
updateUI(totalDV);
}

/* =========================
   UI
========================= */

function updateUI(totalDV){

document.getElementById("debug").innerHTML = `
Ship: ${selectedShip.name} (${selectedShip.dv} km/s)<br>
Body: ${selectedBody}<br><br>

Burns: ${burns.length}<br>
Total Δv: ${totalDV.toFixed(2)} km/s<br>
Ship Δv: ${selectedShip.dv} km/s
`;

const status = document.getElementById("status");

if(selectedShip.dv >= totalDV){
status.textContent = "MISSION POSSIBLE";
status.style.color = "#00FF9C";
} else {
status.textContent = "INSUFFICIENT ΔV";
status.style.color = "#FF3A3A";
}

}

<script>

/* =========================
   SHIPS
========================= */

const ships = [
{ name:"Orbital Shuttle", dv:1.8 },
{ name:"Explorer Mk I", dv:3.2 },
{ name:"Heavy Transport", dv:5.4 },
{ name:"Deep Space Cruiser", dv:9.2 },
{ name:"Interplanetary Vessel", dv:12.5 }
];

/* =========================
   BODIES
========================= */

const bodies = {
Mercury:{ mu:22032, radius:2439 },
Venus:{ mu:324859, radius:6051 },
Earth:{ mu:398600, radius:6371 },
Moon:{ mu:4902.8, radius:1737 },
Mars:{ mu:42828, radius:3389 },

Europa:{ mu:3202.7, radius:1560 },
Saturn:{ mu:37931187, radius:58232 },
Uranus:{ mu:5793939, radius:25362 },
Neptune:{ mu:6836529, radius:24622 }
};

/* =========================
   STATE
========================= */

let selectedShip = null;
let selectedBody = null;
let burns = [];

/* =========================
   DOM
========================= */

const shipDropdown = document.getElementById("shipDropdown");
const shipList = document.getElementById("shipList");

const bodyDropdown = document.getElementById("bodyDropdown");

/* =========================

ships.forEach(ship => {

div.textContent = `${ship.name} (${ship.dv} km/s)`;

div.onclick = () => {

ship.name + " ▼";
calculateMission();
};

shipList.appendChild(div);
});

Object.keys(bodies).forEach(body => {
const div = document.createElement("div");

bodyList.appendChild(div);

/* =========================
   PHYSICS
========================= */

function orbitalVelocity(mu,r){
return Math.sqrt(mu / r);
}

function escapeVelocity(mu,r){

}

/* =========================

========================= */

function addBurn(){
if(!selectedBody) return;

burns.push({
type:"Orbit Insertion",
alt:200
});

renderBurns();
calculateMission();
}

function removeBurn(i){
burns.splice(i,1);
renderBurns();
calculateMission();
}

window.updateBurnType = (i,val)=>{

/* =========================

function renderBurns(){

burnContainer.innerHTML = "";

burns.forEach((b,i)=>{

const div = document.createElement("div");
div.className = "burn";

div.innerHTML = `

<option ${b.type==="Escape Burn"?"selected":""}>Escape Burn</option>

<input type="number" value="${b.alt}" min="50" max="5000"

<button onclick="removeBurn(${i})">X</button>

<div id="dv-${i}"></div>
`;

burnContainer.appendChild(div);

});

/* =========================
   CORE MISSION ENGINE
========================= */

function calculateMission(){

if(!selectedShip || !selectedBody) return;

const body = bodies[selectedBody];

let totalDV = 0;

/* per-burn calc */
burns.forEach((b,i)=>{

const r = body.radius + (b.alt || 200);
let dv = 0;

if(b.type === "Surface Launch"){
dv = orbitalVelocity(body.mu,r);
}

if(b.type === "Orbit Insertion"){
dv = orbitalVelocity(body.mu,r) * 0.9;
}

if(b.type === "Escape Burn"){
dv = escapeVelocity(body.mu,r) - orbitalVelocity(body.mu,r);
}

if(b.type === "Hohmann Transfer"){
dv = orbitalVelocity(body.mu,r) * 1.3;
}

totalDV += dv;

/* live burn display */
const el = document.getElementById(`dv-${i}`);
if(el) el.textContent = `Δv: ${dv.toFixed(2)} km/s`;

});

/* margin */
const margin = selectedShip.dv - totalDV;

/* ship recommendation */
const recommended = ships
.filter(s => s.dv >= totalDV)
.sort((a,b)=>a.dv-b.dv)[0];

/* UI */
updateUI(totalDV, margin, recommended);
}

/* =========================
   UI
========================= */

function updateUI(totalDV, margin, recommended){

document.getElementById("debug").innerHTML = `
Ship: ${selectedShip.name} (${selectedShip.dv} km/s)<br>
Body: ${selectedBody}<br><br>

Total Mission Δv: ${totalDV.toFixed(2)} km/s<br>
Remaining Margin: ${margin.toFixed(2)} km/s<br><br>

Recommended Ship: ${recommended ? recommended.name : "NONE"}
`;

const status = document.getElementById("status");

if(margin > selectedShip.dv * 0.2){
status.textContent = "MISSION POSSIBLE";
status.style.color = "#00FF9C";
}
else if(margin > 0){
status.textContent = "TIGHT MARGIN";
status.style.color = "#00E5FF";
}
else{
status.textContent = "INSUFFICIENT ΔV";
status.style.color = "#FF3A3A";
}

}

/* =========================
   SAVE / LOAD
========================= */

function saveMission(){
localStorage.setItem("missionData", JSON.stringify({
ship:selectedShip,
body:selectedBody,
burns
}));
}

function loadMission(){
const data = JSON.parse(localStorage.getItem("missionData"));
if(!data) return;

selectedShip = data.ship;
selectedBody = data.body;
burns = data.burns;

renderBurns();
calculateMission();
}

/* =========================
   EXPORT REPORT
========================= */

function exportMission(){

const report = {
ship:selectedShip,
body:selectedBody,
burns,
timestamp:new Date().toISOString()
};

const blob = new Blob([JSON.stringify(report,null,2)],{
type:"application/json"
});

const a = document.createElement("a");
a.href = URL.createObjectURL(blob);
a.download = "mission_report.json";
a.click();
}

/* =========================
   INIT HELPERS (call from HTML buttons)
========================= */

window.addBurn = addBurn;
window.saveMission = saveMission;
window.loadMission = loadMission;
window.exportMission = exportMission;

</script>

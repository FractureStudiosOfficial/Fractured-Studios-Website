<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ORBITAL SIGNAL TRIANGULATION // CLASSIFIED</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
color:#FF9F07;
}

#hud{
position:fixed;
top:10px;
left:10px;
width:280px;
z-index:10;
}

.panel{
border:1px solid rgba(255,159,7,0.3);
background:rgba(0,0,0,0.6);
padding:10px;
margin-bottom:8px;
}

#status{
color:#00FF9C;
margin-top:5px;
}

#scanlines{
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03) 0px,
rgba(255,255,255,0.03) 2px,
transparent 4px,
transparent 7px
);
}
</style>
</head>

<body>

<div id="hud">

<div class="panel">
<b>ORBITAL SIGNAL MAP</b>
<div>STATUS: SCANNING...</div>
<div id="status">NO TRIANGULATION</div>
</div>

<div class="panel">
<div>INSTRUCTIONS:</div>
<div>• Align signal sources</div>
<div>• Wait for pulse sync</div>
<div>• Decode transmission</div>
</div>

<div class="panel">
<div id="message">---</div>
</div>

</div>

<div id="scanlines"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* =========================
   SCENE SETUP
========================= */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60, window.innerWidth/window.innerHeight, 0.1, 1000
);

camera.position.z = 14;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.PointLight(0xffffff,1.2));

/* =========================
   CENTRAL BODY (Earth)
========================= */

const earth = new THREE.Mesh(
new THREE.SphereGeometry(1,32,32),
new THREE.MeshStandardMaterial({color:0x2244ff})
);

scene.add(earth);

/* =========================
   SIGNAL CLASS
========================= */

class Signal {
constructor(radius, speed, phaseOffset, color){

this.radius = radius;
this.speed = speed;
this.phase = phaseOffset;

this.mesh = new THREE.Mesh(
new THREE.SphereGeometry(0.12,12,12),
new THREE.MeshBasicMaterial({color})
);

scene.add(this.mesh);

/* pulse glow */
this.baseScale = 1;

}

update(time){

this.phase += this.speed;

/* orbit motion */
this.mesh.position.x = Math.cos(this.phase) * this.radius;
this.mesh.position.z = Math.sin(this.phase) * this.radius;

/* pulsing signal */
const pulse = Math.sin(time*2 + this.radius) * 0.5 + 1;

this.mesh.scale.set(
this.baseScale * pulse,
this.baseScale * pulse,
this.baseScale * pulse
);

}
}

/* =========================
   SIGNALS
========================= */

const signals = [
new Signal(3, 0.01, 0, 0xFF3A3A),
new Signal(5, 0.008, 1, 0x00FF9C),
new Signal(7, 0.006, 2, 0xFF9F07),
new Signal(9, 0.005, 3, 0x00A8FF)
];

/* =========================
   TRIANGULATION LOGIC
========================= */

function checkAlignment(){

let aligned = true;
let refAngle = null;

signals.forEach(s=>{

const angle = Math.atan2(s.mesh.position.z, s.mesh.position.x);

/* normalize */
const norm = Math.round(angle * 10) / 10;

if(refAngle === null) refAngle = norm;
else if(Math.abs(refAngle - norm) > 0.2) aligned = false;

});

/* pulse sync check */
const pulse = Math.sin(Date.now()*0.002) > 0.95;

if(aligned && pulse){
document.getElementById("status").innerText = "TRIANGULATION LOCKED";
document.getElementById("message").innerText =
"TRANSMISSION: // 7A-DELTA-ORBIT // ORIGIN UNKNOWN";
}
}

/* =========================
   ANIMATE
========================= */

function animate(){
requestAnimationFrame(animate);

const t = Date.now()*0.001;

signals.forEach(s=>s.update(t));

earth.rotation.y += 0.001;

checkAlignment();

renderer.render(scene,camera);
}

animate();

/* =========================
   RESIZE
========================= */

window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

</script>

</body>
</html>

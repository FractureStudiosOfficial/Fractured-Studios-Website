<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UIC SECURITY CORE</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#111;
color:#FF9F07;
font-family:'Share Tech Mono', monospace;
overflow:hidden;
}

#crt{
position:fixed;
inset:0;
background:rgba(255,159,7,.04);
pointer-events:none;
}

#scan{
position:fixed;
inset:0;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.04) 0px,
rgba(255,255,255,.04) 2px,
transparent 4px,
transparent 8px
);
opacity:.15;
pointer-events:none;
animation:flicker .12s infinite;
}

@keyframes flicker{
0%{opacity:.12}
50%{opacity:.05}
100%{opacity:.12}
}

#grid{
display:grid;
grid-template-columns:repeat(4,1fr);
grid-template-rows:repeat(3,1fr);
gap:10px;
padding:20px;
height:100vh;
box-sizing:border-box;
}

.panel{
border:1px solid rgba(255,159,7,.2);
background:rgba(0,0,0,.25);
padding:8px;
font-size:12px;
position:relative;
}

.bar{
height:6px;
background:#222;
margin-top:4px;
}

.fill{
height:100%;
background:#FF9F07;
width:50%;
}

.slider{
width:100%;
}

#logs{
height:100%;
overflow:hidden;
font-size:10px;
line-height:1.2em;
}

.dial{
width:60px;
height:60px;
border:2px solid #FF9F07;
border-radius:50%;
margin:auto;
position:relative;
cursor:pointer;
}

.dial:after{
content:'';
position:absolute;
width:2px;
height:25px;
background:#FF9F07;
left:50%;
top:5px;
transform-origin:bottom;
}

.warning{
color:#ff4444;
animation:blink .5s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:.2}
100%{opacity:1}
}

</style>
</head>

<body>

<div id="crt"></div>
<div id="scan"></div>

<div id="grid">

<div class="panel">
POWER GRID
<div class="bar"><div id="power" class="fill"></div></div>
</div>

<div class="panel">
THERMAL LOAD
<div class="bar"><div id="temp" class="fill"></div></div>
</div>

<div class="panel">
CPU OVERLOAD
<div class="bar"><div id="cpu" class="fill"></div></div>
</div>

<div class="panel">
SIGNAL STABILITY
<div class="bar"><div id="signal" class="fill"></div></div>
</div>

<div class="panel">
POWER ROUTING
<input type="range" id="s1" class="slider" min="0" max="100">
</div>

<div class="panel">
COOLANT FLOW
<input type="range" id="s2" class="slider" min="0" max="100">
</div>

<div class="panel">
CORE BALANCE
<input type="range" id="s3" class="slider" min="0" max="100">
</div>

<div class="panel">
SIGNAL FILTER
<input type="range" id="s4" class="slider" min="0" max="100">
</div>

<div class="panel">
CIPHER DIAL
<div id="dial" class="dial"></div>
</div>

<div class="panel warning" id="alert">
SYSTEM INSTABILITY DETECTED
</div>

<div class="panel" style="grid-column: span 2;">
SYSTEM LOG
<div id="logs"></div>
</div>

</div>

<script>

let power=60
let temp=40
let cpu=50
let signal=45
let dial=0

const logs=document.getElementById("logs")

function updateBars(){
power+=Math.random()*2-1
temp+=Math.random()*1.5
cpu+=Math.random()*2-1
signal+=Math.random()*2-1

power+= (s1.value-50)*.01
temp-= (s2.value-50)*.02
cpu-= (s3.value-50)*.01
signal+= (s4.value-50)*.01

power=Math.max(0,Math.min(100,power))
temp=Math.max(0,Math.min(100,temp))
cpu=Math.max(0,Math.min(100,cpu))
signal=Math.max(0,Math.min(100,signal))

document.getElementById("power").style.width=power+"%"
document.getElementById("temp").style.width=temp+"%"
document.getElementById("cpu").style.width=cpu+"%"
document.getElementById("signal").style.width=signal+"%"

checkSolution()
}

function log(msg){
logs.innerHTML=msg+"<br>"+logs.innerHTML
}

setInterval(()=>{
updateBars()

if(Math.random()>.7){
log("ERROR "+Math.floor(Math.random()*9000))
}

},200)

const s1=document.getElementById("s1")
const s2=document.getElementById("s2")
const s3=document.getElementById("s3")
const s4=document.getElementById("s4")

const dialEl=document.getElementById("dial")

dialEl.onclick=()=>{
dial=(dial+30)%360
dialEl.style.transform="rotate("+dial+"deg)"
}

function checkSolution(){

if(
power>48 && power<52 &&
temp>30 && temp<35 &&
cpu>40 && cpu<44 &&
signal>60 && signal<64 &&
s1.value==73 &&
s2.value==21 &&
s3.value==55 &&
s4.value==88 &&
dial==180
){
log("SYSTEM STABILIZED")
setTimeout(()=>{
window.location="classified.html"
},1500)
}

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CLASSIFIED CONTROL DECK // SYSTEM FAILURE MODE</title>

<style>
body{
margin:0;
background:black;
font-family:monospace;
color:#FF9F07;
overflow:hidden;
}

/* scanlines */
#scanlines{
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03) 0px,
rgba(255,255,255,0.03) 2px,
transparent 4px,
transparent 7px
);
animation:flicker .12s infinite;
}

@keyframes flicker{
0%{opacity:0.15}
50%{opacity:0.07}
100%{opacity:0.15}
}

/* layout */
#grid{
display:grid;
grid-template-columns: repeat(4, 1fr);
grid-template-rows: repeat(3, 1fr);
height:100vh;
width:100vw;
gap:8px;
padding:10px;
box-sizing:border-box;
}

.panel{
border:1px solid rgba(255,159,7,0.3);
background:rgba(0,0,0,0.6);
padding:10px;
position:relative;
overflow:hidden;
}

.title{
font-size:12px;
opacity:0.8;
margin-bottom:8px;
}

.value{
font-size:18px;
margin-top:5px;
}

.slider{
width:100%;
}

/* status colors */
.ok{ color:#00FF9C; }
.warn{ color:#FF9F07; }
.bad{ color:#FF3A3A; }

#center{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
pointer-events:none;
opacity:0.8;
}

#access{
margin-top:10px;
font-size:14px;
}

button{
background:black;
color:#FF9F07;
border:1px solid #FF9F07;
padding:5px;
cursor:pointer;
width:100%;
}

</style>
</head>

<body>

<div id="center">
<div>CORE INTEGRITY</div>
<div id="core">100%</div>
<div id="access">NO ACCESS VECTOR</div>
</div>

<div id="grid">

<!-- NAV -->
<div class="panel">
<div class="title">NAVIGATION MATRIX</div>
<input class="slider" type="range" min="0" max="100" value="80" id="nav">
<div class="value" id="navv">80</div>
</div>

<!-- COMMS -->
<div class="panel">
<div class="title">COMMUNICATIONS ARRAY</div>
<input class="slider" type="range" min="0" max="100" value="40" id="com">
<div class="value" id="comv">40</div>
</div>

<!-- POWER -->
<div class="panel">
<div class="title">POWER DISTRIBUTION</div>
<input class="slider" type="range" min="0" max="100" value="60" id="pow">
<div class="value" id="powv">60</div>
</div>

<!-- MEMORY -->
<div class="panel">
<div class="title">MEMORY BANKS</div>
<input class="slider" type="range" min="0" max="100" value="77" id="mem">
<div class="value" id="memv">77</div>
</div>

<!-- ORBIT -->
<div class="panel">
<div class="title">ORBITAL CONTROL</div>
<input class="slider" type="range" min="0" max="100" value="55" id="orb">
<div class="value" id="orbv">55</div>
</div>

<!-- SIGNAL -->
<div class="panel">
<div class="title">SIGNAL FILTER</div>
<input class="slider" type="range" min="0" max="100" value="30" id="sig">
<div class="value" id="sigv">30</div>
</div>

<!-- THERMAL -->
<div class="panel">
<div class="title">THERMAL LOAD</div>
<input class="slider" type="range" min="0" max="100" value="50" id="therm">
<div class="value" id="thermv">50</div>
</div>

</div>

<div id="scanlines"></div>

<script>

/* =========================
   SYSTEM STATE
========================= */

const state = {
nav:80,
com:40,
pow:60,
mem:77,
orb:55,
sig:30,
therm:50
};

const core = document.getElementById("core");
const access = document.getElementById("access");

/* =========================
   UPDATE CORE LOGIC
========================= */

function evaluate(){

/* hidden ARG solution state (VERY specific) */
const success =
state.nav >= 62 && state.nav <= 68 &&
state.com <= 35 &&
state.pow >= 55 && state.pow <= 65 &&
state.mem === 77 &&
state.orb >= 50 && state.orb <= 60 &&
state.sig <= 33 &&
state.therm >= 45 && state.therm <= 55;

if(success){
access.innerHTML = "ACCESS VECTOR FOUND → /NODE-07/";
access.className = "ok";
core.innerHTML = "STABLE";
}
else{

/* fake stability deception */
const avg =
(state.nav+state.com+state.pow+state.mem+state.orb+state.sig+state.therm)/7;

core.innerHTML = Math.floor(avg) + "%";

if(avg > 70) access.innerHTML = "STABLE (UNCERTIFIED)";
else if(avg > 40) access.innerHTML = "DEGRADED";
else access.innerHTML = "CRITICAL";
}
}

/* =========================
   SLIDERS
========================= */

function bind(id){

const el = document.getElementById(id);
const val = document.getElementById(id+"v");

el.oninput = () => {
state[id] = parseInt(el.value);
val.innerHTML = el.value;
evaluate();
};

}

/* bind all */
["nav","com","pow","mem","orb","sig","therm"].forEach(bind);

/* =========================
   DEGRADATION ENGINE
========================= */

function drift(){

state.nav += (Math.random()-0.5)*4;
state.com += (Math.random()-0.5)*3;
state.pow += (Math.random()-0.5)*2;
state.mem += (Math.random()-0.5)*1;
state.orb += (Math.random()-0.5)*3;
state.sig += (Math.random()-0.5)*2;
state.therm += (Math.random()-0.5)*3;

/* clamp */
for(let k in state){
state[k] = Math.max(0,Math.min(100,state[k]));
document.getElementById(k).value = state[k];
document.getElementById(k+"v").innerHTML = Math.floor(state[k]);
}

evaluate();
}

/* =========================
   LOOP
========================= */

setInterval(drift, 2500);

evaluate();

</script>

</body>
</html>

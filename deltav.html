<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ΔV MISSION CORE // 3D</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:monospace;
color:#FF9F07;
}

/* CRT overlay */
#scanlines{
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03) 0px,
rgba(255,255,255,0.03) 2px,
transparent 4px,
transparent 7px
);
}

#hud{
position:fixed;
top:10px;
left:10px;
z-index:10;
}

.panel{
margin-top:8px;
padding:8px;
border:1px solid rgba(255,159,7,0.3);
background:rgba(0,0,0,0.4);
width:260px;
}

select, button{
width:100%;
margin-top:5px;
background:black;
color:#FF9F07;
border:1px solid #FF9F07;
font-family:monospace;
}

.status-ok{ color:#00FF9C; }
.status-bad{ color:#FF3A3A; }
</style>
</head>

<body>

<div id="hud">

<div class="panel">
<div>SHIP</div>
<select id="shipSelect"></select>
</div>

<div class="panel">
<div>BODY</div>
<select id="bodySelect"></select>
</div>

<div class="panel">
<div>MISSION STATUS</div>
<div id="status">NO DATA</div>
</div>

</div>

<div id="scanlines"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* =========================
   DATA
========================= */

const ships = [
{ name:"Orbital Shuttle", dv:1.8 },
{ name:"Explorer Mk I", dv:3.2 },
{ name:"Heavy Transport", dv:5.4 },
{ name:"Deep Space Cruiser", dv:9.2 }
];

const bodies = {
Earth:{ mu:398600, radius:6371 },
Moon:{ mu:4902.8, radius:1737 },
Mars:{ mu:42828, radius:3389 },
Europa:{ mu:3202.7, radius:1560 }
};

/* =========================
   UI SETUP
========================= */

const shipSelect = document.getElementById("shipSelect");
const bodySelect = document.getElementById("bodySelect");

ships.forEach(s=>{
const opt = document.createElement("option");
opt.value = s.dv;
opt.textContent = `${s.name} (${s.dv} km/s)`;
shipSelect.appendChild(opt);
});

Object.keys(bodies).forEach(b=>{
const opt = document.createElement("option");
opt.value = b;
opt.textContent = b;
bodySelect.appendChild(opt);
});

/* =========================
   THREE.JS SCENE
========================= */

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60, window.innerWidth/window.innerHeight, 0.1, 1000
);

camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

/* LIGHT */
scene.add(new THREE.PointLight(0xffffff,1.2));

/* EARTH */
const planetGeo = new THREE.SphereGeometry(1,32,32);
const planetMat = new THREE.MeshStandardMaterial({ color:0x2244ff });
const planet = new THREE.Mesh(planetGeo, planetMat);
scene.add(planet);

/* ORBIT */
const orbitGeo = new THREE.RingGeometry(1.6,1.62,128);
const orbitMat = new THREE.MeshBasicMaterial({
color:0xFF9F07,
side:THREE.DoubleSide
});

const orbit = new THREE.Mesh(orbitGeo, orbitMat);
orbit.rotation.x = Math.PI/2;
scene.add(orbit);

/* SHIP */
const shipGeo = new THREE.SphereGeometry(0.05,12,12);
const shipMat = new THREE.MeshBasicMaterial({ color:0x00FF9C });
const ship = new THREE.Mesh(shipGeo, shipMat);
scene.add(ship);

/* =========================
   PHYSICS
========================= */

function orbitalVelocity(mu,r){
return Math.sqrt(mu/r);
}

/* =========================
   MISSION CALC
========================= */

function calculate(){

const shipDV = parseFloat(shipSelect.value);
const body = bodies[bodySelect.value];

const r = body.radius + 200;

const requiredDV = orbitalVelocity(body.mu,r);

/* status */
const status = document.getElementById("status");

if(shipDV >= requiredDV){
status.textContent = `MISSION POSSIBLE (${requiredDV.toFixed(2)} km/s required)`;
status.className = "status-ok";
} else {
status.textContent = `INSUFFICIENT ΔV (${requiredDV.toFixed(2)} km/s required)`;
status.className = "status-bad";
}

}

/* =========================
   EVENTS
========================= */

shipSelect.onchange = calculate;
bodySelect.onchange = calculate;

/* =========================
   ANIMATION
========================= */

let t = 0;

function animate(){
requestAnimationFrame(animate);

t += 0.01;

/* orbit motion */
ship.position.x = Math.cos(t) * 1.6;
ship.position.z = Math.sin(t) * 1.6;

planet.rotation.y += 0.001;

renderer.render(scene,camera);
}

animate();

/* resize */
window.addEventListener("resize",()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

/* init */
calculate();

</script>

</body>
</html>

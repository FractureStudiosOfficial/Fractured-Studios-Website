<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CLASSIFIED SYSTEM // LIVE FAULTING NODE</title>

<style>
body{
margin:0;
background:black;
font-family:monospace;
color:#FF9F07;
overflow:hidden;
}

/* CRT scanlines */
#scanlines{
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.03) 0px,
rgba(255,255,255,0.03) 2px,
transparent 4px,
transparent 7px
);
animation:flicker 0.12s infinite;
}

@keyframes flicker{
0%{opacity:0.15}
50%{opacity:0.07}
100%{opacity:0.15}
}

/* layout */
#hud{
position:fixed;
top:10px;
left:10px;
width:320px;
z-index:10;
}

.panel{
border:1px solid rgba(255,159,7,0.3);
padding:10px;
margin-bottom:8px;
background:rgba(0,0,0,0.6);
}

.module{
padding:6px;
margin-top:6px;
border:1px solid rgba(255,159,7,0.2);
cursor:pointer;
transition:0.2s;
}

.module:hover{
background:rgba(255,159,7,0.1);
}

.bad{
color:#FF3A3A;
}

.ok{
color:#00FF9C;
}

.warn{
color:#FF9F07;
}

</style>
</head>

<body>

<div id="hud">

<div class="panel">
<b>LIVE FAULTING SYSTEM</b><br>
STATUS: <span id="status">STABLE</span><br>
INTEGRITY: <span id="integrity">100%</span>
</div>

<div class="panel">
<div>SUBSYSTEMS</div>

<div class="module" onclick="stabilize(this,'NAV')">
NAVIGATION CORE: <span class="state warn">DEGRADED</span>
</div>

<div class="module" onclick="stabilize(this,'COM')">
COMMS ARRAY: <span class="state bad">FAULTED</span>
</div>

<div class="module" onclick="stabilize(this,'ORB')">
ORBITAL TRACKING: <span class="state warn">DEGRADED</span>
</div>

<div class="module" onclick="stabilize(this,'MEM')">
MEMORY BANKS: <span class="state bad">CORRUPT</span>
</div>

</div>

<div class="panel">
<div>EVENT LOG</div>
<div id="log">System initializing...</div>
</div>

</div>

<div id="scanlines"></div>

<script>

/* =========================
   SYSTEM STATE
========================= */

let integrity = 100;

const logEl = document.getElementById("log");
const integrityEl = document.getElementById("integrity");
const statusEl = document.getElementById("status");

function log(msg){
logEl.innerHTML = msg;
}

/* =========================
   RANDOM FAULT ENGINE
========================= */

const faults = [
"UNSTABLE SIGNAL DETECTED",
"MEMORY DESYNC OCCURRED",
"ORBITAL DRIFT EXCEEDS LIMITS",
"UNKNOWN PROCESS SPAWNED",
"DATA FRAGMENTATION IN PROGRESS",
"NONSTANDARD INPUT STREAM"
];

function randomFault(){

const msg = faults[Math.floor(Math.random()*faults.length)];
log("⚠ " + msg);

/* degrade system */
integrity -= Math.random()*6;

if(integrity < 0) integrity = 0;

updateUI();

}

/* =========================
   STABILIZE MODULE
========================= */

function stabilize(el,type){

let gain = 5 + Math.random()*5;
integrity += gain;

if(integrity > 100) integrity = 100;

/* hidden ARG trigger */
if(type === "MEM" && integrity > 85){
log(">> ENCRYPTED SECTOR ACCESS GRANTED: /NODE-7X/");
statusEl.innerHTML = "ACCESS VECTOR FOUND";
statusEl.className = "ok";
}

updateUI();

el.querySelector(".state").innerHTML = "STABILIZED";
el.querySelector(".state").className = "state ok";

}

/* =========================
   UI UPDATE
========================= */

function updateUI(){

integrityEl.innerHTML = Math.floor(integrity) + "%";

if(integrity > 70){
statusEl.innerHTML = "STABLE";
statusEl.className = "ok";
}
else if(integrity > 30){
statusEl.innerHTML = "DEGRADED";
statusEl.className = "warn";
}
else{
statusEl.innerHTML = "CRITICAL";
statusEl.className = "bad";
}

}

/* =========================
   LOOP
========================= */

setInterval(()=>{
randomFault();
}, 4000);

/* init */
updateUI();

</script>

</body>
</html>

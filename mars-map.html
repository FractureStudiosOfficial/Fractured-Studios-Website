<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mars Tactical Map</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
margin:0;
overflow:hidden;
background:#000;
color:#FF9F07;
font-family:'Share Tech Mono', monospace;
}

/* CRT overlays */
#amber{
position:fixed;
inset:0;
background:rgba(255,159,7,.05);
pointer-events:none;
}

#scanlines{
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.05) 0px,
rgba(255,255,255,.05) 2px,
transparent 5px,
transparent 9px
);
animation:flicker .12s infinite;
}

@keyframes flicker{
0%{opacity:.15}
50%{opacity:.07}
100%{opacity:.15}
}

#hud{
position:fixed;
top:10px;
left:15px;
font-size:12px;
opacity:.7;
letter-spacing:1px;
}
</style>
</head>
<body>

<div id="amber"></div>
<div id="scanlines"></div>
<div id="hud">MARS SURFACE SCAN — DRAG ROTATE — SCROLL ZOOM — CLICK POI</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
/* scene */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000,1);
document.body.appendChild(renderer.domElement);

/* wireframe mars */
const geometry = new THREE.SphereGeometry(1, 32, 32);
const material = new THREE.MeshBasicMaterial({
color:0xFF9F07,
wireframe:true
});

const mars = new THREE.Mesh(geometry, material);
scene.add(mars);

/* subtle rotation */
let autoRotate = true;

/* controls (simple) */
let dragging = false;
let prevX = 0;
let prevY = 0;

window.addEventListener("mousedown", e=>{
dragging = true;
prevX = e.clientX;
prevY = e.clientY;
});

window.addEventListener("mouseup", ()=> dragging=false);

window.addEventListener("mousemove", e=>{
if(!dragging) return;

const dx = (e.clientX - prevX) * 0.005;
const dy = (e.clientY - prevY) * 0.005;

mars.rotation.y += dx;
mars.rotation.x += dy;

prevX = e.clientX;
prevY = e.clientY;
});

/* zoom */
window.addEventListener("wheel", e=>{
camera.position.z += e.deltaY * 0.001;
camera.position.z = Math.max(1.5, Math.min(6, camera.position.z));
});

/* POI helper */
function latLonToVector3(lat, lon, radius){
const phi = (90 - lat) * (Math.PI/180);
const theta = (lon + 180) * (Math.PI/180);

return new THREE.Vector3(
-(radius * Math.sin(phi) * Math.cos(theta)),
(radius * Math.cos(phi)),
(radius * Math.sin(phi) * Math.sin(theta))
);
}

/* POIs */
const poiData = [
{
name:"Olympus Mons",
lat:18.65,
lon:-133.8,
link:"olympus-mons.html"
},
{
name:"Valles Marineris",
lat:-14,
lon:-60,
link:"valles-marineris.html"
},
{
name:"Gale Crater",
lat:-5.4,
lon:137.8,
link:"gale-crater.html"
},
{
name:"U.I.C Landing Site",
lat:10,
lon:40,
link:"uic-landing.html"
}
];

const poiObjects = [];

poiData.forEach(poi=>{
const pos = latLonToVector3(poi.lat, poi.lon, 1.02);

const geom = new THREE.SphereGeometry(0.02,8,8);
const mat = new THREE.MeshBasicMaterial({color:0xFF9F07});
const marker = new THREE.Mesh(geom, mat);

marker.position.copy(pos);
marker.userData = poi;

mars.add(marker);
poiObjects.push(marker);
});

/* raycaster */
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

window.addEventListener("click", e=>{
mouse.x = (e.clientX/window.innerWidth)*2-1;
mouse.y = -(e.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(mouse, camera);

const intersects = raycaster.intersectObjects(poiObjects);

if(intersects.length>0){
window.location = intersects[0].object.userData.link;
}
});

/* hover highlight */
window.addEventListener("mousemove", e=>{
mouse.x = (e.clientX/window.innerWidth)*2-1;
mouse.y = -(e.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(mouse, camera);

const intersects = raycaster.intersectObjects(poiObjects);

poiObjects.forEach(p=>p.scale.set(1,1,1));

if(intersects.length>0){
intersects[0].object.scale.set(1.6,1.6,1.6);
}
});

/* animate */
function animate(){
requestAnimationFrame(animate);

if(autoRotate){
mars.rotation.y += 0.001;
}

renderer.render(scene, camera);
}

animate();

/* resize */
window.addEventListener("resize", ()=>{
camera.aspect = window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>

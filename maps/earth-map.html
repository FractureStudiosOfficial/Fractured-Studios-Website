<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Earth Orbital Map</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
margin:0;
overflow:hidden;
background:#000;
color:#FF9F07;
font-family:'Share Tech Mono', monospace;
}

/* CRT overlays */
#amber{
position:fixed;
inset:0;
background:rgba(255,159,7,.05);
pointer-events:none;
}

#scanlines{
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.05) 0px,
rgba(255,255,255,.05) 2px,
transparent 5px,
transparent 9px
);
animation:flicker .12s infinite;
}

@keyframes flicker{
0%{opacity:.15}
50%{opacity:.07}
100%{opacity:.15}
}

/* SIDE PANEL */
#panel{
position:absolute;
left:0;
top:0;
bottom:0;
width:260px;
background:rgba(0,0,0,.85);
border-right:1px solid rgba(255,159,7,.2);
padding:15px;
box-sizing:border-box;
overflow-y:auto;
}

#planetName{
font-size:20px;
margin-bottom:10px;
}

.section{
margin-top:15px;
padding-top:10px;
border-top:1px solid rgba(255,159,7,.2);
}

.station{
cursor:pointer;
padding:6px 4px;
display:flex;
align-items:center;
gap:8px;
}

.station:hover{
background:rgba(255,159,7,.08);
}

canvas{
position:absolute;
left:260px;
top:0;
}
</style>
</head>
<body>

<div id="panel">
<div id="planetName">MARS</div>

<div class="section">
<div>Atmosphere: Thin CO₂</div>
<div>Day Length: 24.6h</div>
<div>Orbit: 687 days</div>
<div>Gravity: 0.38g</div>
</div>

<div class="section">
<div>STATIONS</div>
<div id="stationList"></div>
</div>
</div>

<div id="amber"></div>
<div id="scanlines"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

/* CONFIG */
const TEXTURE = "2k_earth_daymap.jpg";// "mars-outline.png" to enable texture

const stations = [
{ name:"UIC Alpha", lat:12, lon:33, icon:"🛰", link:"uic-alpha.html" },
{ name:"Olympus Base", lat:18.6, lon:-133.8, icon:"⛰", link:"olympus.html" },
{ name:"Gale Station", lat:-5.4, lon:137.8, icon:"⚙", link:"gale.html" }
];

/* scene */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(
60,
(window.innerWidth-260)/window.innerHeight,
0.1,
1000
);

camera.position.z = 3;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth-260, window.innerHeight);
renderer.setClearColor(0x000000,1);
renderer.domElement.style.left="260px";
document.body.appendChild(renderer.domElement);

/* planet group */
const planetGroup = new THREE.Group();
scene.add(planetGroup);

/* texture sphere */
if(TEXTURE){
const tex = new THREE.TextureLoader().load(TEXTURE);
const mat = new THREE.MeshBasicMaterial({
map: tex,
transparent:true,
color:0xFF9F07,
side: THREE.FrontSide
});
const geo = new THREE.SphereGeometry(1,64,64);
const mesh = new THREE.Mesh(geo,mat);
planetGroup.add(mesh);
}

/* quad wireframe */
const grid = new THREE.Group();

const latLines = 18;
const lonLines = 36;

for(let i=0;i<=latLines;i++){
const lat = (i/latLines)*Math.PI - Math.PI/2;
const points=[];
for(let j=0;j<=64;j++){
const lon = (j/64)*Math.PI*2;
points.push(new THREE.Vector3(
Math.cos(lat)*Math.cos(lon),
Math.sin(lat),
Math.cos(lat)*Math.sin(lon)
));
}
const geo = new THREE.BufferGeometry().setFromPoints(points);
const line = new THREE.Line(geo,new THREE.LineBasicMaterial({
color:0xFF9F07,
depthTest:false,
transparent:true,
opacity:.8
}));
grid.add(line);
}

for(let i=0;i<lonLines;i++){
const lon = (i/lonLines)*Math.PI*2;
const points=[];
for(let j=0;j<=64;j++){
const lat = (j/64)*Math.PI - Math.PI/2;
points.push(new THREE.Vector3(
Math.cos(lat)*Math.cos(lon),
Math.sin(lat),
Math.cos(lat)*Math.sin(lon)
));
}
const geo = new THREE.BufferGeometry().setFromPoints(points);
const line = new THREE.Line(geo,new THREE.LineBasicMaterial({
color:0xFF9F07,
depthTest:false,
transparent:true,
opacity:.8
}));
grid.add(line);
}

planetGroup.add(grid);

/* helpers */
function latLonToVec(lat,lon,r=1.01){
const phi = (90-lat)*(Math.PI/180);
const theta = (lon+180)*(Math.PI/180);

return new THREE.Vector3(
-(r*Math.sin(phi)*Math.cos(theta)),
(r*Math.cos(phi)),
(r*Math.sin(phi)*Math.sin(theta))
);
}

/* POIs */
const poiMeshes=[];
stations.forEach(s=>{
const pos = latLonToVec(s.lat,s.lon);

const mesh = new THREE.Mesh(
new THREE.SphereGeometry(0.02,8,8),
new THREE.MeshBasicMaterial({color:0xFF9F07})
);

mesh.position.copy(pos);
mesh.userData=s;

planetGroup.add(mesh);
poiMeshes.push(mesh);
});

/* station list UI */
const stationList=document.getElementById("stationList");

stations.forEach((s,i)=>{
const div=document.createElement("div");
div.className="station";
div.innerHTML=`<span>${s.icon}</span> <span>${s.name}</span>`;
div.onclick=()=>focusStation(s);
stationList.appendChild(div);
});

/* rotate to station */
function focusStation(st){
const target = latLonToVec(st.lat,st.lon);

const q = new THREE.Quaternion().setFromUnitVectors(
target.clone().normalize(),
new THREE.Vector3(0,0,1)
);

planetGroup.quaternion.slerp(q,0.1);
}

/* controls */
let dragging=false;
let px=0,py=0;

window.addEventListener("mousedown",e=>{
dragging=true;px=e.clientX;py=e.clientY;
});
window.addEventListener("mouseup",()=>dragging=false);

window.addEventListener("mousemove",e=>{
if(!dragging) return;

const dx=(e.clientX-px)*0.005;
const dy=(e.clientY-py)*0.005;

planetGroup.rotation.y+=dx;
planetGroup.rotation.x+=dy;

px=e.clientX;py=e.clientY;
});

/* zoom */
window.addEventListener("wheel",e=>{
camera.position.z+=e.deltaY*0.001;
camera.position.z=Math.max(1.5,Math.min(6,camera.position.z));
});

/* raycaster */
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();

window.addEventListener("click",e=>{
mouse.x=((e.clientX-260)/(window.innerWidth-260))*2-1;
mouse.y=-(e.clientY/window.innerHeight)*2+1;

raycaster.setFromCamera(mouse,camera);
const hit=raycaster.intersectObjects(poiMeshes);

if(hit.length){
window.location=hit[0].object.userData.link;
}
});

/* animate */
function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}
animate();

/* resize */
window.addEventListener("resize",()=>{
camera.aspect=(window.innerWidth-260)/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth-260,window.innerHeight);
});

</script>
</body>
</html>

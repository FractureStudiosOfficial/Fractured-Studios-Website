<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar System Map | U.I.C. Systems</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">

<style>
body{
margin:0;
background:#000;
color:#FF9F07;
font-family:'Share Tech Mono', monospace;
overflow:hidden;
}

#amber{
position:fixed;
inset:0;
background:rgba(255,159,7,.05);
pointer-events:none;
}

#scanlines{
position:fixed;
inset:0;
pointer-events:none;
background:repeating-linear-gradient(
to bottom,
rgba(255,255,255,.05) 0px,
rgba(255,255,255,.05) 2px,
transparent 5px,
transparent 9px
);
animation:flicker .12s infinite;
}

@keyframes flicker{
0%{opacity:.15}
50%{opacity:.07}
100%{opacity:.15}
}

canvas{
display:block;
}

#hud{
position:fixed;
top:10px;
left:15px;
font-size:13px;
opacity:.7;
}
</style>
</head>
<body>

<div id="amber"></div>
<div id="scanlines"></div>
<div id="hud">SOLAR NAVIGATION — DRAG TO PAN — SCROLL TO ZOOM</div>

<canvas id="space"></canvas>

<script>
const canvas = document.getElementById("space");
const ctx = canvas.getContext("2d");

function resize(){
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* camera */
let camX = 0;
let camY = 0;
let zoom = 1;

/* drag */
let dragging = false;
let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown", e=>{
dragging = true;
lastX = e.clientX;
lastY = e.clientY;
});

window.addEventListener("mouseup", ()=> dragging=false);

window.addEventListener("mousemove", e=>{
if(!dragging) return;
camX += (e.clientX - lastX)/zoom;
camY += (e.clientY - lastY)/zoom;
lastX = e.clientX;
lastY = e.clientY;
});

/* zoom */
canvas.addEventListener("wheel", e=>{
const scale = 1.1;
if(e.deltaY < 0) zoom *= scale;
else zoom /= scale;
});

/* bodies */
const bodies = {

sun:{ r:12, orbit:0, speed:0, name:"Sun" },

mercury:{ r:3, orbit:40, speed:4.15, name:"Mercury", link:"maps/mercury-map.html" },
venus:{ r:4, orbit:60, speed:1.62, name:"Venus", link:"maps/venus-map.html" },
earth:{ r:5, orbit:80, speed:1, name:"Earth", link:"maps/earth-map.html" },
mars:{ r:4, orbit:105, speed:0.53, name:"Mars", link:"maps/mars-map.html" },
jupiter:{ r:9, orbit:150, speed:0.084, name:"Jupiter", link:"maps/jupiter-map.html" },
saturn:{ r:8, orbit:190, speed:0.034, name:"Saturn", link:"maps/saturn-map.html" },
uranus:{ r:7, orbit:225, speed:0.012, name:"Uranus", link:"maps/uranus-map.html" },
neptune:{ r:7, orbit:255, speed:0.006, name:"Neptune", link:"maps/neptune-map.html" }

};

/* moons */
const moons = [
{ parent:"earth", r:2, orbit:10, speed:8, name:"Moon", link:"moon-map.html" },
{ parent:"mars", r:1.5, orbit:6, speed:12, name:"Phobos", link:"phobos-map.html" },
{ parent:"mars", r:1.2, orbit:10, speed:7, name:"Deimos", link:"deimos-map.html" },
{ parent:"jupiter", r:2, orbit:14, speed:3, name:"Europa", link:"europa-map.html" }
];

let time = 0;

/* click detection */
canvas.addEventListener("click", e=>{
const mx = (e.clientX - canvas.width/2)/zoom - camX;
const my = (e.clientY - canvas.height/2)/zoom - camY;

for(const name in bodies){
const b = bodies[name];
if(!b.pos || !b.link) continue;
const dx = mx - b.pos.x;
const dy = my - b.pos.y;
if(Math.hypot(dx,dy) < b.r+3){
window.location = b.link;
}
}

moons.forEach(m=>{
if(!m.pos) return;
const dx = mx - m.pos.x;
const dy = my - m.pos.y;
if(Math.hypot(dx,dy) < m.r+3){
window.location = m.link;
}
});
});

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.save();

ctx.translate(canvas.width/2, canvas.height/2);
ctx.scale(zoom, zoom);
ctx.translate(camX, camY);

/* orbit lines */
ctx.strokeStyle="rgba(255,159,7,.15)";
ctx.lineWidth=1;

for(const name in bodies){
const b = bodies[name];
if(b.orbit === 0) continue;
ctx.beginPath();
ctx.arc(0,0,b.orbit,0,Math.PI*2);
ctx.stroke();
}

/* planets */
for(const name in bodies){

const b = bodies[name];

let x = 0;
let y = 0;

if(b.orbit !== 0){
const angle = time * b.speed * 0.0001;
x = Math.cos(angle) * b.orbit;
y = Math.sin(angle) * b.orbit;
}

b.pos = {x,y};

/* body */
ctx.beginPath();
ctx.fillStyle="#FF9F07";
ctx.arc(x,y,b.r,0,Math.PI*2);
ctx.fill();

/* label */
ctx.font = "6px Share Tech Mono";
ctx.fillStyle="rgba(255,159,7,.8)";
ctx.textAlign="center";
ctx.fillText(b.name, x, y + b.r + 10);
}

/* moons */
moons.forEach(m=>{
const parent = bodies[m.parent];
const angle = time * m.speed * 0.0001;

const x = parent.pos.x + Math.cos(angle)*m.orbit;
const y = parent.pos.y + Math.sin(angle)*m.orbit;

m.pos = {x,y};

/* orbit */
ctx.strokeStyle="rgba(255,159,7,.08)";
ctx.beginPath();
ctx.arc(parent.pos.x,parent.pos.y,m.orbit,0,Math.PI*2);
ctx.stroke();

/* moon */
ctx.beginPath();
ctx.fillStyle="#FF9F07";
ctx.arc(x,y,m.r,0,Math.PI*2);
ctx.fill();

/* label */
ctx.font = "4px Share Tech Mono";
ctx.fillStyle="rgba(255,159,7,.7)";
ctx.textAlign="center";
ctx.fillText(m.name, x, y + m.r + 8);

});

ctx.restore();

time += 1;
requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>

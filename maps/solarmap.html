<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Navigation | U.I.C. Systems</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">

<style>
:root{
  --amber:#FF9F07;
  --amberBright:#FFC861;
  --amberDim:#B36700;
  --amberSoft:rgba(255,159,7,.15);
  --amberMid:rgba(255,159,7,.25);
}

*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{
  background:#050505;
  color:var(--amber);
  font-family:'Share Tech Mono', monospace;
  overflow:hidden;
}

/* CRT FX */
#amber{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center, rgba(255,159,7,.05), transparent 70%);
  pointer-events:none;
  z-index:1000;
}

#scanlines{
  position:fixed;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,.05) 0px,
    rgba(255,255,255,.05) 2px,
    transparent 5px,
    transparent 9px
  );
  animation:flicker .12s infinite;
  z-index:1001;
  mix-blend-mode:overlay;
}

@keyframes flicker{
  0%{opacity:.15;}
  50%{opacity:.07;}
  100%{opacity:.15;}
}

#vignette{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:999;
  background:radial-gradient(ellipse 90% 90% at 50% 50%,transparent 55%,rgba(0,0,0,.45) 85%,rgba(0,0,0,.85) 100%);
}

/* MAIN FRAME */
#ui-shell{
  position:fixed;
  inset:20px;
  border:2px solid var(--amber);
  box-shadow:
    0 0 25px rgba(255,159,7,.08),
    inset 0 0 30px rgba(255,159,7,.03);
  display:flex;
  flex-direction:column;
  background:rgba(0,0,0,.35);
}

/* INNER FRAME */
#ui-shell::before{
  content:"";
  position:absolute;
  inset:12px;
  border:1px solid rgba(255,159,7,.15);
  pointer-events:none;
  z-index:2;
}

/* HEADER */
#header{
  height:64px;
  border-bottom:1px solid var(--amberSoft);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px;
  letter-spacing:.2em;
  font-size:14px;
  background:linear-gradient(to bottom, rgba(255,159,7,.05), transparent);
  z-index:2;
}

#header-left{
  text-shadow:0 0 4px rgba(255,159,7,.6),0 0 12px rgba(255,140,0,.35);
}

#header-right{
  opacity:.65;
  font-size:12px;
}

/* MAP AREA */
#map-wrap{
  position:relative;
  flex:1;
  padding:16px;
}

#canvas-frame{
  position:relative;
  width:100%;
  height:100%;
  border:1px solid var(--amberSoft);
  background:
    radial-gradient(circle at center, rgba(255,159,7,.03), transparent 70%),
    rgba(0,0,0,.55);
  overflow:hidden;
  box-shadow:
    inset 0 0 25px rgba(255,159,7,.03);
}

canvas{
  display:block;
  width:100%;
  height:100%;
}

/* HUD PANELS */
.hud-panel{
  position:absolute;
  padding:10px 14px;
  font-size:12px;
  border:1px solid var(--amberSoft);
  background:rgba(0,0,0,.55);
  backdrop-filter:blur(4px);
  box-shadow:0 0 15px rgba(255,159,7,.04);
  z-index:3;
  line-height:1.6;
}

#controls{ top:20px; left:20px; }
#legend{ top:20px; right:20px; text-align:right; }

#legend .tag{
  display:inline-block;
  font-size:10px;
  color:var(--amberBright);
  letter-spacing:.2em;
  padding:1px 6px;
  border:1px solid rgba(255,159,7,.4);
  margin-top:6px;
  animation:tag-blink 1.8s steps(2) infinite;
}
@keyframes tag-blink{50%{opacity:.35;}}

/* focus readout, bottom-left */
#focus-panel{
  bottom:20px; left:20px;
  min-width:190px;
}
#focus-name{
  font-size:15px;
  letter-spacing:.14em;
  color:var(--amberBright);
  text-shadow:0 0 6px rgba(255,159,7,.5);
}
#focus-sub{
  font-size:11px;
  opacity:.6;
  margin-top:2px;
}
#focus-bar{
  margin-top:8px;
  height:2px;
  background:rgba(255,159,7,.15);
  position:relative;
  overflow:hidden;
}
#focus-bar::after{
  content:"";
  position:absolute;
  inset:0;
  width:40%;
  background:var(--amber);
  box-shadow:0 0 8px var(--amber);
  animation:scan-bar 2.4s ease-in-out infinite;
}
@keyframes scan-bar{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(250%);}
}

/* speed panel bottom right */
#speed-panel{
  bottom:20px; right:20px;
  text-align:right;
}
#speed-panel input[type=range]{
  -webkit-appearance:none;
  width:120px;
  height:2px;
  background:rgba(255,159,7,.3);
  outline:none;
  margin-top:8px;
}
#speed-panel input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:10px;height:10px;
  background:var(--amber);
  box-shadow:0 0 8px var(--amber);
  cursor:pointer;
}

/* Tooltip */
#tooltip{
  position:absolute;
  pointer-events:none;
  padding:10px 14px;
  font-size:12px;
  border:1px solid var(--amberSoft);
  background:rgba(0,0,0,.88);
  box-shadow:0 0 20px rgba(255,159,7,.12);
  opacity:0;
  transform:translateY(6px);
  transition:.15s ease;
  z-index:10;
  white-space:nowrap;
}
#tooltip .tt-name{ color:var(--amberBright); letter-spacing:.14em; }
#tooltip .tt-sub{ opacity:.55; font-size:10px; margin-top:2px; }

/* CSS2D labels rendered by three.js */
.body-label{
  font-family:'Share Tech Mono', monospace;
  font-size:11px;
  color:rgba(255,159,7,.85);
  text-shadow:0 0 6px rgba(255,159,7,.5);
  letter-spacing:.12em;
  pointer-events:none;
  white-space:nowrap;
  transform:translateY(6px);
}
.body-label.moon-label{
  font-size:9px;
  color:rgba(255,159,7,.6);
  text-shadow:none;
}

/* Footer */
#footer{
  height:34px;
  border-top:1px solid var(--amberSoft);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 16px;
  font-size:12px;
  opacity:.7;
  z-index:2;
}

/* CORNER ACCENTS */
.corner{
  position:absolute;
  width:28px;
  height:28px;
  border-color:var(--amber);
  border-style:solid;
  z-index:5;
  pointer-events:none;
}
.c1{top:-2px;left:-2px;border-width:3px 0 0 3px;}
.c2{top:-2px;right:-2px;border-width:3px 3px 0 0;}
.c3{bottom:-2px;left:-2px;border-width:0 0 3px 3px;}
.c4{bottom:-2px;right:-2px;border-width:0 3px 3px 0;}

/* loading veil */
#boot{
  position:fixed;inset:0;background:#050505;z-index:5000;
  display:flex;align-items:center;justify-content:center;
  color:var(--amber);font-size:13px;letter-spacing:.3em;
  transition:opacity .6s ease;
}
#boot span{ animation:tag-blink 1s steps(2) infinite; }
</style>
</head>

<body>

<div id="boot">INITIALIZING DEEP SPACE ARRAY<span>_</span></div>

<div id="amber"></div>
<div id="scanlines"></div>
<div id="vignette"></div>

<div id="ui-shell">

<div class="corner c1"></div>
<div class="corner c2"></div>
<div class="corner c3"></div>
<div class="corner c4"></div>

<div id="header">
<div id="header-left">SOLAR NAVIGATION ARRAY // 3D</div>
<div id="header-right">UIC DEEP SPACE CARTOGRAPHY SYSTEM</div>
</div>

<div id="map-wrap">

<div id="controls" class="hud-panel">
DRAG TO ORBIT<br>
RIGHT-DRAG TO PAN<br>
SCROLL TO ZOOM
</div>

<div id="legend" class="hud-panel">
CLICK PLANETS / MOONS<br>
TO ACCESS LOCAL MAPS
<div class="tag">LIVE FEED</div>
</div>

<div id="focus-panel" class="hud-panel">
<div id="focus-name">— — —</div>
<div id="focus-sub">// HOVER OR SELECT A BODY //</div>
<div id="focus-bar"></div>
</div>

<div id="speed-panel" class="hud-panel">
SIM SPEED
<div><input id="speed-slider" type="range" min="0" max="4" step="0.05" value="1"></div>
</div>

<div id="canvas-frame">
<div id="tooltip"><div class="tt-name"></div><div class="tt-sub"></div></div>
</div>

</div>

<div id="footer">
<div>U.I.C. ORBITAL MAPPING INTERFACE</div>
<div>UIC OS v1.0.4</div>
</div>

</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const AMBER = 0xFF9F07;
const AMBER_BRIGHT = 0xFFC861;

const frame = document.getElementById('canvas-frame');
const tooltip = document.getElementById('tooltip');
const ttName = tooltip.querySelector('.tt-name');
const ttSub = tooltip.querySelector('.tt-sub');
const focusName = document.getElementById('focus-name');
const focusSub = document.getElementById('focus-sub');
const speedSlider = document.getElementById('speed-slider');
const boot = document.getElementById('boot');

/* ---------- renderer / scene / camera ---------- */
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(50, frame.clientWidth/frame.clientHeight, 0.1, 5000);
camera.position.set(0, 140, 280);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(frame.clientWidth, frame.clientHeight);
renderer.setClearColor(0x000000, 0);
frame.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(frame.clientWidth, frame.clientHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.left = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
frame.appendChild(labelRenderer.domElement);

const controls = new OrbitControls(camera, labelRenderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 20;
controls.maxDistance = 1400;
controls.screenSpacePanning = true;

function resize(){
  const w = frame.clientWidth, h = frame.clientHeight;
  camera.aspect = w/h;
  camera.updateProjectionMatrix();
  renderer.setSize(w,h);
  labelRenderer.setSize(w,h);
}
window.addEventListener('resize', resize);

/* ---------- starfield ---------- */
function buildStars(){
  const count = 2400;
  const positions = new Float32Array(count*3);
  for(let i=0;i<count;i++){
    const r = 900 + Math.random()*1400;
    const theta = Math.random()*Math.PI*2;
    const phi = Math.acos((Math.random()*2)-1);
    positions[i*3]   = r*Math.sin(phi)*Math.cos(theta);
    positions[i*3+1] = r*Math.cos(phi);
    positions[i*3+2] = r*Math.sin(phi)*Math.sin(theta);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  const mat = new THREE.PointsMaterial({ color:0xFFC861, size:1.1, transparent:true, opacity:.55 });
  scene.add(new THREE.Points(geo, mat));
}
buildStars();

/* ---------- ecliptic reference grid ---------- */
function buildGrid(){
  const grid = new THREE.PolarGridHelper(300, 16, 8, 96, AMBER, AMBER);
  grid.material.transparent = true;
  grid.material.opacity = 0.06;
  scene.add(grid);
}
buildGrid();

/* ---------- glow sprite factory ---------- */
function makeGlowTexture(){
  const size = 128;
  const cnv = document.createElement('canvas');
  cnv.width = cnv.height = size;
  const ctx = cnv.getContext('2d');
  const g = ctx.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
  g.addColorStop(0, 'rgba(255,200,120,0.9)');
  g.addColorStop(0.35, 'rgba(255,159,7,0.4)');
  g.addColorStop(1, 'rgba(255,159,7,0)');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,size,size);
  return new THREE.CanvasTexture(cnv);
}
const glowTex = makeGlowTexture();

function addGlow(target, scale){
  const mat = new THREE.SpriteMaterial({ map:glowTex, transparent:true, depthWrite:false, blending:THREE.AdditiveBlending });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(scale, scale, 1);
  target.add(sprite);
  return sprite;
}

/* ---------- orbit ring ---------- */
function addOrbitRing(radius){
  const pts = [];
  const seg = 128;
  for(let i=0;i<=seg;i++){
    const a = (i/seg)*Math.PI*2;
    pts.push(new THREE.Vector3(Math.cos(a)*radius, 0, Math.sin(a)*radius));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({ color:AMBER, transparent:true, opacity:.18 });
  scene.add(new THREE.Line(geo, mat));
}

/* ---------- label helper ---------- */
function makeLabel(text, cssClass){
  const div = document.createElement('div');
  div.className = 'body-label' + (cssClass ? ' '+cssClass : '');
  div.textContent = text;
  return new CSS2DObject(div);
}

/* ---------- bodies ---------- */
const bodyData = [
  { key:'sun',     name:'Sun',     r:9,   orbit:0,   speed:0,     offset:0,   color:0xFFDD88, link:null, info:'STAR // CLASS G2V' },
  { key:'mercury', name:'Mercury', r:1.6, orbit:26,  speed:4.15,  offset:0.3, color:0xB8977A, link:'mercury-map.html', info:'ROCKY // NO ATMOSPHERE' },
  { key:'venus',   name:'Venus',   r:2.3, orbit:38,  speed:1.62,  offset:1.2, color:0xE0C27A, link:'venus-map.html',   info:'ROCKY // DENSE CO2 ATM' },
  { key:'earth',   name:'Earth',   r:2.5, orbit:52,  speed:1,     offset:2.5, color:0x8FD3FF, link:'earth-map.html',   info:'ROCKY // HOME WORLD' },
  { key:'mars',    name:'Mars',    r:2.0, orbit:68,  speed:.53,   offset:0.9, color:0xFF7A4D, link:'mars-map.html',    info:'ROCKY // THIN ATMOSPHERE' },
  { key:'jupiter', name:'Jupiter', r:6.5, orbit:98,  speed:.084,  offset:4.2, color:0xE0B98C, link:'jupiter-map.html', info:'GAS GIANT // 95 MOONS' },
  { key:'saturn',  name:'Saturn',  r:5.6, orbit:130, speed:.034,  offset:3.1, color:0xE8D6A8, link:'saturn-map.html',  info:'GAS GIANT // RING SYSTEM', ring:true },
  { key:'uranus',  name:'Uranus',  r:4.2, orbit:158, speed:.012,  offset:5.3, color:0x9FE8E0, link:'uranus-map.html',  info:'ICE GIANT // TILTED AXIS' },
  { key:'neptune', name:'Neptune', r:4.1, orbit:184, speed:.006,  offset:2.1, color:0x6C8CFF, link:'neptune-map.html', info:'ICE GIANT // SUPERSONIC WINDS' }
];

const moonData = [
  { parent:'earth',   name:'Moon',   r:.7,  orbit:5,  speed:8,  offset:.5, link:'moon-map.html',   info:'NATURAL SATELLITE' },
  { parent:'mars',    name:'Phobos', r:.4,  orbit:3.5,speed:12, offset:2,  link:'phobos-map.html', info:'IRREGULAR MOONLET' },
  { parent:'mars',    name:'Deimos', r:.35, orbit:4.6,speed:7,  offset:4,  link:'deimos-map.html', info:'IRREGULAR MOONLET' },
  { parent:'jupiter', name:'Europa', r:.9,  orbit:9,  speed:3,  offset:1.5,link:'europa-map.html', info:'ICE-CRUSTED MOON' }
];

const pivots = {};    // key -> orbit pivot (Object3D at sun, rotates)
const bodies  = {};   // key -> { mesh, data, glow }
const clickable = [];

bodyData.forEach(b=>{
  const pivot = new THREE.Object3D();
  pivot.rotation.y = b.offset;
  scene.add(pivot);
  pivots[b.key] = pivot;

  if(b.orbit > 0) addOrbitRing(b.orbit);

  const geo = new THREE.SphereGeometry(b.r, 32, 32);
  const mat = new THREE.MeshBasicMaterial({ color:b.color, wireframe:false });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(b.orbit, 0, 0);

  // wireframe overlay for that "tactical readout" look
  const wireGeo = new THREE.SphereGeometry(b.r*1.12, 12, 8);
  const wireMat = new THREE.MeshBasicMaterial({ color:AMBER, wireframe:true, transparent:true, opacity:.25 });
  mesh.add(new THREE.Mesh(wireGeo, wireMat));

  addGlow(mesh, b.r*6);

  if(b.ring){
    const ringGeo = new THREE.RingGeometry(b.r*1.4, b.r*2.2, 48);
    const ringMat = new THREE.MeshBasicMaterial({ color:AMBER, side:THREE.DoubleSide, transparent:true, opacity:.25, wireframe:true });
    const ringMesh = new THREE.Mesh(ringGeo, ringMat);
    ringMesh.rotation.x = Math.PI/2.4;
    mesh.add(ringMesh);
  }

  const label = makeLabel(b.name.toUpperCase(), b.key==='sun' ? null : null);
  label.position.set(0, b.r+3, 0);
  mesh.add(label);

  pivot.add(mesh);
  mesh.userData = { key:b.key, name:b.name, info:b.info, link:b.link, isMoon:false };
  clickable.push(mesh);
  bodies[b.key] = { mesh, data:b, pivot };
});

const moonPivots = [];
moonData.forEach(m=>{
  const parent = bodies[m.parent].mesh;
  const pivot = new THREE.Object3D();
  pivot.rotation.y = m.offset;
  parent.add(pivot);

  const geo = new THREE.SphereGeometry(m.r, 16, 16);
  const mat = new THREE.MeshBasicMaterial({ color:0xCFAF8C });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.set(m.orbit, 0, 0);
  addGlow(mesh, m.r*7);

  const label = makeLabel(m.name.toUpperCase(), 'moon-label');
  label.position.set(0, m.r+1.6, 0);
  mesh.add(label);

  pivot.add(mesh);
  mesh.userData = { key:m.name.toLowerCase(), name:m.name, info:m.info, link:m.link, isMoon:true };
  clickable.push(mesh);
  moonPivots.push({ pivot, m });
});

/* Sun light + point glow already covered via basic material (unlit style keeps CRT flatness) */

/* ---------- raycasting ---------- */
const raycaster = new THREE.Raycaster();
raycaster.params.Sprite = { threshold: 1 };
const mouse = new THREE.Vector2();
let hovered = null;
let selected = null;

function setPointer(e){
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
}

function pickBody(){
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickable, false);
  return hits.length ? hits[0].object : null;
}

renderer.domElement.addEventListener('mousemove', e=>{
  setPointer(e);
  const hit = pickBody();
  hovered = hit;
  if(hit){
    tooltip.style.opacity = '1';
    tooltip.style.transform = 'translateY(0)';
    tooltip.style.left = (e.clientX - frame.getBoundingClientRect().left + 18)+'px';
    tooltip.style.top = (e.clientY - frame.getBoundingClientRect().top + 18)+'px';
    ttName.textContent = hit.userData.name.toUpperCase();
    ttSub.textContent = hit.userData.info;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    tooltip.style.opacity = '0';
    tooltip.style.transform = 'translateY(6px)';
    renderer.domElement.style.cursor = 'default';
  }
});

renderer.domElement.addEventListener('click', ()=>{
  const hit = pickBody();
  if(!hit) return;
  selected = hit;
  focusName.textContent = hit.userData.name.toUpperCase();
  focusSub.textContent = '// ' + hit.userData.info + ' //';
  if(hit.userData.link){
    setTimeout(()=>{ window.location = hit.userData.link; }, 140);
  }
});

/* ---------- simulation loop ---------- */
let simSpeed = 1;
speedSlider.addEventListener('input', ()=>{ simSpeed = parseFloat(speedSlider.value); });

let t = 0;
function animate(){
  requestAnimationFrame(animate);
  t += 0.006 * simSpeed;

  bodyData.forEach(b=>{
    if(b.speed) pivots[b.key].rotation.y = b.offset + t*b.speed;
    bodies[b.key].mesh.rotation.y += 0.01;
  });
  moonPivots.forEach(({pivot, m})=>{
    pivot.rotation.y = m.offset + t*m.speed*2;
  });

  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

setTimeout(()=>{ boot.style.opacity = '0'; setTimeout(()=>boot.remove(), 650); }, 500);
animate();
</script>

</body>
</html>
